<!-- Seamly v15 | PROD | 15 Jul 2026 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Seamly — Family Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5e8b62">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Seamly">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#5e8b62;--sage-mid:#8ab88e;--sage-light:#d4e8d6;
  --terra:#b85c38;--terra-light:#f2ddd4;
  --sky:#3a7ca5;--sky-light:#d0e4f0;
  --plum:#7c5c8a;--plum-light:#e8d8f0;
  --honey:#c4892a;--honey-light:#f5e4c4;
  --rose:#b85070;--rose-light:#f0d4de;
  --ink:#1e1b16;--muted:#7a7060;--border:#e0d8cc;
  --bg:#f5f2ed;--surface:#fff;--parchment:#ede8df;
}
html,body{height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);-webkit-tap-highlight-color:transparent}
button,input,select,textarea{font-family:inherit}
input:focus,textarea:focus,select:focus{outline:2px solid var(--sage);outline-offset:1px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#c8bfb0;border-radius:4px}
#root{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.top-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50}
.top-logo{font-family:'Playfair Display',serif;font-weight:600;font-size:18px;color:var(--sage);display:flex;align-items:center;gap:6px}
.nav-wordmark{display:none;font-family:'Playfair Display',serif;font-weight:600;font-size:19px;color:var(--sage);align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding-bottom:72px}
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 12px;flex-shrink:0;position:sticky;bottom:0;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent}
.nav-btn.active{color:var(--sage)}
.nav-dot{width:0;height:3px;border-radius:2px;background:var(--sage);transition:width .2s;margin-top:1px}
.nav-btn.active .nav-dot{width:18px}
.page{display:none;flex-direction:column}
.page.active{display:flex}
.page-header{padding:14px 16px 0;flex-shrink:0}
.family-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.page-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);display:flex;align-items:center;justify-content:space-between}
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.05)}
.btn{border:none;border-radius:10px;font-weight:700;font-size:13px;padding:8px 16px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.8}
.btn-primary{background:var(--sage);color:#fff}
.btn-secondary{background:var(--parchment);color:var(--muted);border:1px solid var(--border)}
.btn-danger{background:var(--rose-light);color:var(--rose);border:1px solid #b8507044}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-lg{padding:12px 24px;font-size:14px}
.btn-full{width:100%;justify-content:center}
.inp{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--ink);width:100%;background:var(--surface);-webkit-appearance:none}
.sel{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--ink);width:100%;background:var(--surface)}
.lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.modal-bg{position:fixed;inset:0;background:rgba(20,18,14,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.22,.68,0,1.2)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px 11px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink)}
.modal-close{background:var(--parchment);border:none;border-radius:8px;width:30px;height:30px;font-size:18px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{overflow-y:auto;padding:15px 18px 32px;flex:1}
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-card{background:var(--surface);border-radius:20px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.1)}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;background:var(--bg)}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin .7s linear infinite}
.chip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;display:inline-flex;align-items:center}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;padding:0 16px}
.tab{padding:10px 14px;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--muted);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;margin-bottom:-1px;transition:color .2s}
.tab.active{color:var(--sage);border-bottom-color:var(--sage)}
.tbl{width:100%;border-collapse:collapse;min-width:640px}
.tbl th{padding:8px 7px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;text-align:left;border-bottom:1px solid var(--border);background:var(--parchment);white-space:nowrap}
.tbl td{padding:8px 7px;font-size:13px;color:var(--ink);border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:nth-child(even) td{background:#faf8f466}
.note-card{border-radius:13px;padding:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:transform .15s;overflow:hidden;word-break:break-word}
.note-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.note-card:active{transform:scale(.97)}
.ob-bg{position:fixed;inset:0;background:rgba(20,18,14,.7);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s ease}
.ob-card{background:var(--surface);border-radius:22px;padding:26px;max-width:380px;width:100%}
.ob-dots{display:flex;gap:5px;justify-content:center;margin-bottom:20px}
.ob-dot{height:6px;border-radius:99px;background:var(--border);transition:all .3s}
.ob-dot.active{background:var(--sage);width:18px}
.ob-dot:not(.active){width:6px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:fadeUp .3s ease;pointer-events:none;white-space:nowrap}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
/* ── Rich-text note editor (v7) ─────────────────────────────── */
.note-editor{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--ink);width:100%;background:var(--surface);min-height:80px;outline:none;line-height:1.6}
.note-editor:focus{outline:2px solid var(--sage);outline-offset:1px}
.note-editor b,.note-editor strong{font-weight:700}
.note-editor i,.note-editor em{font-style:italic}
.note-editor u{text-decoration:underline}
.note-editor ul,.note-editor ol{margin:4px 0 4px 18px}
.note-fmt-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;padding:5px 8px;background:var(--parchment);border-radius:8px;border:1px solid var(--border)}
.note-fmt-btn{background:#fff;border:1px solid var(--border);border-radius:5px;width:28px;height:28px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink);flex-shrink:0;transition:background .15s}
.note-fmt-btn:hover{background:var(--sage-light)}
.note-fmt-btn.active{background:var(--sage-light);border-color:var(--sage)}
/* ── PWA offline banner (v8) ───────────────────────────────────────────────── */
.offline-banner{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#b85c38;color:#fff;text-align:center;font-size:12px;font-weight:700;padding:8px 16px;z-index:9999;letter-spacing:.02em;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.offline-banner.visible{display:block}
/* ── Notification bell & badge (v8) ──────────────────────── */
/* v12: profile-btn replaces the old notif-btn (bell); profile-dot replaces
   notif-badge — a plain unread dot instead of a numeric count, since the
   button now opens the consolidated My Profile menu, not just Notifications. */
#profile-btn{position:relative;background:none;border:none;font-size:20px;cursor:pointer;padding:2px 6px;color:var(--muted);-webkit-tap-highlight-color:transparent}
#profile-dot{position:absolute;top:1px;right:3px;background:var(--rose);border-radius:99px;width:9px;height:9px;display:none;box-sizing:border-box}
/* ── Feedback floating action button (V8) ───────────────────────── */
.feedback-fab{position:fixed;bottom:80px;right:16px;z-index:100;width:44px;height:44px;border-radius:50%;background:var(--sage);color:#fff;border:none;font-size:18px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent}
.feedback-fab:active{transform:scale(.93);box-shadow:0 2px 8px rgba(0,0,0,.15)}
@media (min-width:768px){
  #root{max-width:none;margin:0}
  .bottom-nav{position:fixed;top:0;left:0;bottom:0;width:220px;flex-direction:column;justify-content:flex-start;align-items:stretch;border-top:none;border-right:1px solid var(--border);box-shadow:none;padding:16px 0;z-index:60;overflow-y:auto}
  .nav-wordmark{display:flex;padding:0 20px 20px}
  .top-logo{display:none}
  .nav-btn{flex-direction:row;align-items:center;justify-content:flex-start;gap:12px;padding:11px 20px;font-size:13px;text-transform:none;letter-spacing:0;border-radius:0 20px 20px 0;margin-right:12px}
  .nav-btn.active{background:var(--sage-light)}
  .nav-dot{display:none}
  .top-bar{margin-left:220px;justify-content:flex-end}
  .content{margin-left:220px;padding-bottom:24px}
  .note-grid{grid-template-columns:repeat(3,1fr)}
  .modal-bg{align-items:center}
  .modal-sheet{border-radius:20px;max-width:680px;max-height:85vh;animation:fadeIn .2s ease}
  #notif-root .modal-sheet{max-width:480px}
}
@media (min-width:1200px){
  .bottom-nav{width:240px}
  .top-bar{margin-left:240px}
  .content{margin-left:240px}
  .note-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<div id="offline-banner" class="offline-banner" role="alert" aria-live="polite">
  📵 You're offline — data cannot be loaded or saved
</div>

<div id="loading-screen" class="loading-screen">
  <svg width="60" height="60" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="border-radius:14px">
    <rect width="512" height="512" rx="115" fill="#5e8b62"/>
    <rect x="196" y="148" width="16" height="40" rx="8" fill="#3d5c40"/>
    <rect x="300" y="148" width="16" height="40" rx="8" fill="#3d5c40"/>
    <rect x="136" y="168" width="240" height="224" rx="28" fill="#f5f2ed"/>
    <rect x="136" y="168" width="240" height="54" rx="28" fill="#3d5c40"/>
    <rect x="136" y="196" width="240" height="26" fill="#3d5c40"/>
    <rect x="164" y="250" width="184" height="14" rx="7" fill="#8ab88e"/>
    <rect x="164" y="288" width="184" height="14" rx="7" fill="#b85c38"/>
    <rect x="164" y="326" width="184" height="14" rx="7" fill="#8ab88e"/>
    <path transform="translate(394,148)" fill="#ffffff" d="M0,-48 C10,-10 10,-10 48,0 C10,10 10,10 0,48 C-10,10 -10,10 -48,0 C-10,-10 -10,-10 0,-48 Z"/>
  </svg>
  <div style="font-family:'Playfair Display',serif;font-size:24px;color:var(--sage)">Seamly</div>
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted)">Loading your family hub…</div>
</div>

<div id="auth-screen" class="auth-screen" style="display:none">
  <div class="auth-card">
    <div style="font-family:'Playfair Display',serif;font-size:26px;color:var(--sage);text-align:center;margin-bottom:4px">Seamly</div>
    <div style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:26px">Your family's all-in-one hub</div>
    <div style="text-align:center;color:var(--muted);font-size:10px;margin-bottom:10px;opacity:0.5">v15 — Jul 2026</div>
    <div id="auth-login">
      <div class="form-row"><label class="lbl">Email</label><input class="inp" type="email" id="a-email" placeholder="your@email.com" autocomplete="email"></div>
      <div class="form-row"><label class="lbl">Password</label><input class="inp" type="password" id="a-pass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn btn-primary btn-full btn-lg" style="margin-bottom:10px" onclick="doLogin()">Sign In</button>
      <button class="btn btn-secondary btn-full" style="margin-bottom:8px" onclick="switchAuth('signup')">Create account</button>
      <div style="display:flex;align-items:center;gap:8px;margin:8px 0">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:11px;color:var(--muted);font-weight:600">OR</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <button class="btn btn-full" style="background:#fff;border:1.5px solid var(--border);color:var(--ink);font-size:13px;font-weight:600;padding:10px;margin-bottom:8px" onclick="doGoogleAuth()">
        <svg width="18" height="18" viewBox="0 0 48 48" style="margin-right:8px;vertical-align:middle"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
      <button class="btn btn-full" style="background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer" onclick="switchAuth('forgot')">Forgot password?</button>
      <div id="a-msg" style="margin-top:10px;font-size:13px;color:var(--rose);text-align:center;min-height:18px"></div>
    </div>
    <div id="auth-forgot" style="display:none">
      <div class="form-row"><label class="lbl">Your email address</label><input class="inp" type="email" id="f-email" placeholder="your@email.com" autocomplete="email"></div>
      <button class="btn btn-primary btn-full btn-lg" style="margin-bottom:10px" onclick="doForgot()">Send Reset Link</button>
      <button class="btn btn-secondary btn-full" onclick="switchAuth('login')">← Back to Sign In</button>
      <div id="f-msg" style="margin-top:10px;font-size:13px;color:var(--sage);text-align:center;min-height:18px"></div>
    </div>
    <div id="auth-signup" style="display:none">
      <div class="form-row"><label class="lbl">Your Name</label><input class="inp" type="text" id="s-name" placeholder="Your name" autocomplete="name"></div>
      <div class="form-row"><label class="lbl">Email</label><input class="inp" type="email" id="s-email" placeholder="your@email.com" autocomplete="email"></div>
      <div class="form-row"><label class="lbl">Password</label><input class="inp" type="password" id="s-pass" placeholder="min 6 characters" autocomplete="new-password"></div>
      <button class="btn btn-primary btn-full btn-lg" style="margin-bottom:10px" onclick="doSignup()">Create Account</button>
      <button class="btn btn-secondary btn-full" onclick="switchAuth('login')">Already have an account</button>
      <div id="s-msg" style="margin-top:10px;font-size:13px;color:var(--rose);text-align:center;min-height:18px"></div>
    </div>
  </div>
</div>

<div id="root" style="display:none">
  <div class="top-bar">
    <div class="top-logo">
      <svg width="26" height="26" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="border-radius:6px;flex-shrink:0">
        <rect width="512" height="512" rx="115" fill="#5e8b62"/>
        <rect x="196" y="148" width="16" height="40" rx="8" fill="#3d5c40"/>
        <rect x="300" y="148" width="16" height="40" rx="8" fill="#3d5c40"/>
        <rect x="136" y="168" width="240" height="224" rx="28" fill="#f5f2ed"/>
        <rect x="136" y="168" width="240" height="54" rx="28" fill="#3d5c40"/>
        <rect x="136" y="196" width="240" height="26" fill="#3d5c40"/>
        <rect x="164" y="250" width="184" height="14" rx="7" fill="#8ab88e"/>
        <rect x="164" y="288" width="184" height="14" rx="7" fill="#b85c38"/>
        <rect x="164" y="326" width="184" height="14" rx="7" fill="#8ab88e"/>
        <path transform="translate(394,148)" fill="#ffffff" d="M0,-48 C10,-10 10,-10 48,0 C10,10 10,10 0,48 C-10,10 -10,10 -48,0 C-10,-10 -10,-10 0,-48 Z"/>
      </svg>
      <span>Seamly</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <button id="sample-btn" onclick="A.family?toggleSampleMode():goTo('settings')" style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;background:var(--honey-light);color:var(--honey);border:1px solid var(--honey)44;cursor:pointer;display:none">📋 Sample</button>
      <span id="fam-badge" style="font-size:11px;font-weight:700;color:var(--muted)"></span>
      <!-- v12: consolidated Notifications + Settings + Sign out into one My Profile entry point -->
      <button id="profile-btn" onclick="openProfileMenu()" title="My Profile" style="display:none">
        <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" style="vertical-align:middle">
          <circle cx="12" cy="8" r="3.6"/>
          <path d="M4.5 20C4.5 16.3 7.8 13.5 12 13.5C16.2 13.5 19.5 16.3 19.5 20"/>
        </svg>
        <span id="profile-dot"></span>
      </button>
    </div>
  </div>
  <div class="content" id="content">
    <div id="page-home" class="page"></div>
    <div id="page-calendar" class="page active"></div>
    <div id="page-notebook" class="page"></div>
    <div id="page-meds" class="page"></div>
    <div id="page-inventory" class="page"></div>
    <div id="page-meals" class="page"></div>
    <div id="page-insights" class="page"></div>
    <div id="page-settings" class="page"></div>
  </div>
  <nav class="bottom-nav">
    <div class="nav-wordmark">

  if(!email||!pass){msg.textContent='Please fill in all fields.';return;}
  msg.textContent='Signing in…';

async function doSignup(){

  const email=document.getElementById('s-email').value.trim();
  const pass=document.getElementById('s-pass').value;
  const msg=document.getElementById('s-msg');

async function doPasswordReset(){
  const pass=document.getElementById('r-pass')?.value;
  const pass2=document.getElementById('r-pass2')?.value;
  const msg=document.getElementById('r-msg');
  if(!pass||pass.length<6){if(msg){msg.textContent='Password must be at least 6 characters.';msg.style.color='var(--rose)';}return;}
  if(pass!==pass2){if(msg){msg.textContent='Passwords do not match.';msg.style.color='var(--rose)';}return;}
  if(msg){msg.textContent='Saving…';msg.style.color='var(--muted)';}
  const{error}=await sb.auth.updateUser({password:pass});
  if(error){if(msg){msg.textContent=error.message;msg.style.color='var(--rose)';}}
  else{
    if(msg){msg.textContent='Password updated! Signing you in…';msg.style.color='var(--sage)';}
    setTimeout(()=>location.reload(),1500);
  }
}
window.doPasswordReset=doPasswordReset;

async function doSignOut(){
  // Bypass Supabase network entirely — clear session from localStorage directly
  // This is safe: Supabase reads auth state from localStorage on page load
  try {
    // Clear all Supabase auth keys from localStorage
    Object.keys(localStorage).forEach(k => {
      if(k.startsWith('sb-') || k.includes('supabase')) localStorage.removeItem(k);
    });
  } catch(_) {}
  location.reload();
}

async function loadAll(){
  const[fam,mems,evts,ngrps,nts,dm,ip,sl,mp]=await Promise.all([
    sb.from('families').select('*').maybeSingle(),
    sb.from('family_members').select('*').order('created_at'),
    sb.from('events').select('*').order('date'),
    sb.from('note_groups').select('*').order('created_at'),
    sb.from('notes').select('*').order('created_at'),
    sb.from('daily_meds').select('*').order('created_at'),
    sb.from('inventory_products').select('*').order('created_at'),
    sb.from('shopping_lists').select('*').order('created_at'),
    // v7: fetch as array (UNIQUE constraint now in place) then take first row.
    // Previously used .maybeSingle() which would throw when 2+ rows existed
    // before the dedup migration was run.
    // v8 fix: order by updated_at DESC instead of created_at — the meal_plans
    // table was originally created without a created_at column, causing this
    // query to fail silently and show a blank Meal Planner grid. created_at
    // was added via ALTER TABLE on 19 Jun 2026 as an immediate hotfix, but
    // updated_at is the semantically correct sort field here anyway.
    sb.from('meal_plans').select('*').order('updated_at', {ascending: false}).limit(1),
  ]);
  if(fam.data){A.family=fam.data;}
  A.members=mems.data||[];
  A.events=evts.data||[];
  A.noteGroups=ngrps.data||[];
  A.notes=nts.data||[];
  A.dailyMeds=dm.data||[];
  A.invProducts=ip.data||[];
  A.shoppingLists=sl.data||[];
  // mp.data is now an array (from .limit(1)); take the first element or null.
  A.mealPlan=(mp.data&&mp.data.length>0)?mp.data[0]:null;
}

// ── ONE-TIME CLEANUP: remove old Meals-generated Notebook groups (v6) ─────────
// Pre-v6, the Meals page auto-created Notebook groups/notes for shopping lists
// and meal ideas. v6 moves Meals to its own tables, so these are deleted once
// per family. Runs silently — no user action needed.
async function cleanupOldMealsGroups(){
  if(!A.family)return;
  const OLD_GROUP_NAMES=['🛒 Shopping','📅 Weekly Menu','🌅 Breakfast','☀️ Lunch','🌙 Dinner','🍎 Snacks'];
  const toRemove=A.noteGroups.filter(g=>OLD_GROUP_NAMES.includes(g.name));
  if(!toRemove.length)return;
  const groupIds=toRemove.map(g=>g.id);
  // v10 (UX hardening): sbWrite() for idle-safety on both silent cleanup writes.
  // Delete notes inside these groups (group_id is ON DELETE SET NULL, so notes
  // would otherwise survive — we want them gone, they're Meals-only data)
  await sbWrite(()=>sb.from('notes').delete().in('group_id',groupIds));
  await sbWrite(()=>sb.from('note_groups').delete().in('id',groupIds));
  A.notes=A.notes.filter(n=>!groupIds.includes(n.group_id));
  A.noteGroups=A.noteGroups.filter(g=>!groupIds.includes(g.id));
}

async function initApp(user){
  A.user=user;
  document.getElementById('loading-screen').style.display='none';
  try{await loadAll();}catch(e){console.error('Load error',e);}

  // Seed Medical group if family exists and group doesn't yet
  if(A.family && !A.noteGroups.find(g=>g.name==='🏥 Medical Reference')){
    try { await seedMedicalGroup(); } catch(e){ console.warn('Medical group seed error',e); }
  }

  // One-time cleanup: remove old Meals-generated Notebook groups (v6)
  if(A.family && !localStorage.getItem('ks_meals_cleanup_v6_'+A.family.id)){
    try { await cleanupOldMealsGroups(); } catch(e){ console.warn('Meals cleanup error',e); }
    try { localStorage.setItem('ks_meals_cleanup_v6_'+A.family.id,'1'); } catch(_) {}
  }

  // ALWAYS check for unlinked family_members rows matching this user's email
  // This covers: invited users who already had an account, users added after signup
  try {
    const {data:unlinked, error:ule} = await sb.from('family_members')
      .select('id,family_id')
      .ilike('email', user.email)
      .is('user_id', null);
    console.log('Unlinked members check:', unlinked, ule);
    if(unlinked && unlinked.length > 0) {
      const {error:upe} = await sb.from('family_members')
        .update({user_id: user.id})
        .ilike('email', user.email)
        .is('user_id', null);
      console.log('Update result:', upe ? 'ERROR: '+upe.message : 'OK — '+unlinked.length+' rows linked');
      if(!upe) {
        try{await loadAll();}catch(e){console.error('Reload error',e);}
      }
    }
  } catch(e) { console.error('User link error', e); }

  if(!A.family){
    // No family found — new user with no invite
    const isFirstLogin = !localStorage.getItem('ks_ob_seen_' + user.id);
    A.showOB = isFirstLogin;
    A.obFlow = 'new';
  } else {
    // Has a family (own or linked via invite)
    const isFirstLogin = !localStorage.getItem('ks_ob_seen_' + user.id);
    A.showOB = isFirstLogin;
    A.obFlow = null;
  }
  document.getElementById('root').style.display='flex';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('fam-badge').textContent=A.family?.name||'';
  const sBtn = document.getElementById('sample-btn');
  if (!A.family) {
    // No family yet — Sample is the placeholder. Auto-activate it.
    if (sBtn) sBtn.style.display = 'block';
    if (!_sampleMode) toggleSampleMode();
  } else {
    // Has a real family — hide Sample, exit sample mode if active
    if (sBtn) sBtn.style.display = 'none';
    if (_sampleMode) toggleSampleMode();
  }

  // v12: show My Profile button only when the user has a family
  // (was the notification bell pre-v12 — same condition, new target id)
  const profileBtn = document.getElementById('profile-btn');
  if (profileBtn) profileBtn.style.display = A.family ? 'block' : 'none';

  // v8: load initial notifications and start a polling interval (60s)
  if (A.family && !isSampleMode()) {
    loadNotifications();
    clearInterval(A._notifInterval);
    A._notifInterval = setInterval(loadNotifications, 60000);
  }

  // v8: handle PWA shortcut query param (?shortcut=calendar etc.)
  // Must run after goTo() so the correct page renders.
  const _shortcutParam = new URLSearchParams(window.location.search).get('shortcut');

  // Only jump to Home on the very first app load. If initApp runs again later
  // (e.g. a Supabase client reset during a connection retry re-fires a SIGNED_IN
  // event), stay on whichever page the user was already on instead of resetting
  // to Home — just refresh that page's data.
  if (!A._appInitialized) {
    A._appInitialized = true;
    if (_shortcutParam && ['calendar','meals','notebook'].includes(_shortcutParam)) {
      // v9: the "meals" shortcut is labelled "Shopping" on the home screen —
      // it must always land on the Shopping tab, regardless of the fact that
      // Meal Planner is now the default tab when opening Meals normally.
      if (_shortcutParam === 'meals') { A.mealsTab = 'shopping'; }
      // Open the page requested by the PWA shortcut
      goTo(_shortcutParam);
      // Clean the URL so refreshing doesn't re-trigger the shortcut
      try { history.replaceState({}, '', window.location.pathname); } catch(_) {}
    } else {
      goTo('home');
    }
  } else {
    goTo(A.page);
  }
  if(A.showOB)renderOB();
  // v13: check for an unfinished event form draft saved before a page reload
  // Delay 1.5s so the home page renders first before showing the banner
  setTimeout(checkAndOfferEvDraft,1500);
  // v14: same check for Notebook and Meal Planner drafts
  setTimeout(checkAndOfferNoteDraft,1500);
  setTimeout(checkAndOfferMealDraft,1500);
}

// v14: global background-flush safety net for in-progress Notebook and Meal
// Planner drafts. Mobile browsers can pause or fully discard JS execution the
// moment a tab/PWA is backgrounded (screen lock, app switch, etc.) — often
// before a multi-second debounce timer ever gets a chance to fire — so this
// forces an immediate localStorage snapshot (plus a best-effort remote save
// attempt) right as that's about to happen. Registered once, globally, since
// it needs to catch backgrounding regardless of which page is on screen.
function _flushDraftsOnHide(){
  if(document.getElementById('ne-editor')&&A._noteDirty){
    saveNoteDraftLS();
    // Best-effort remote save too — not guaranteed to finish if the page is
    // actually being discarded rather than just hidden, but worth attempting.
    // The localStorage snapshot above is the real safety net either way.
    _doNoteAutoSave();
  }
  if(document.getElementById('meal-plan-table')&&A._mealPlanDirty){
    saveMealPlanDraftLS();
    saveMealPlan(true);
  }
}
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') _flushDraftsOnHide(); });
window.addEventListener('pagehide',_flushDraftsOnHide);

// ── NAV ───────────────────────────────────────────────────────────────────────
function goTo(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  A.page=page;
  ({home:renderHome,calendar:renderCal,notebook:renderNB,meds:renderMeds,inventory:renderInventory,meals:renderMeals,insights:renderInsights,settings:renderSettings}[page])?.();
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function showModal(title,body){
  // Push history state so back button can close modal
  try {
    if(!history.state?.modalOpen) history.pushState({modalOpen:true},'');
  } catch(_) {}
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-bg" id="mbg" onclick="if(event.target.id==='mbg')_closeModalDOM()">
      <div class="modal-sheet">
        <div class="modal-head">
          <div class="modal-title">${title}</div>
          <button class="modal-close" onclick="_closeModalDOM()">×</button>
        </div>
        <div class="modal-body">${body}</div>
      </div>
    </div>`;
}
// DOM-only close — safe to call before running another function
function _closeModalDOM(){
  // v13: cancel any pending auto-save timers so they don't fire into a closed modal
  if(A._evDraftInterval){clearInterval(A._evDraftInterval);A._evDraftInterval=null;}
  clearTimeout(A._noteAutoSaveTimer);
  A._noteAutoSaveTimer=null;
  document.getElementById('modal-root').innerHTML='';
}
// Public closeModal — also handles history cleanup
function closeModal(){
  _closeModalDOM();
}
// Back button: close modal if open, otherwise let browser navigate back
window.addEventListener('popstate', () => {
  const modal = document.getElementById('modal-root');
  if(modal && modal.innerHTML.trim()){
    _closeModalDOM();
    // Re-push state so the next back press works correctly
    try { history.pushState({modalOpen:false},''); } catch(_) {}
  }
});

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function calNavBar(view,vY,vM,calDate){
  const P=T.parchment,B=T.border,I=T.ink,bt=(fn,label)=>`<button onclick="${fn}" style="background:${P};border:1px solid ${B};border-radius:9px;width:33px;height:33px;font-size:18px;cursor:pointer">${label}</button>`;
  if(view==='week'){
    const ws=new Date(calDate);ws.setDate(ws.getDate()-((ws.getDay()+6)%7));
    const we=new Date(ws);we.setDate(we.getDate()+6);
    const wn=Math.ceil((((ws-new Date(ws.getFullYear(),0,1))/86400000)+1)/7);
    const ml=ws.getMonth()===we.getMonth()?MN[ws.getMonth()]+' '+ws.getFullYear():MN[ws.getMonth()].slice(0,3)+' – '+MN[we.getMonth()].slice(0,3)+' '+we.getFullYear();
    return bt("const d=new Date(A.calDate);d.setDate(d.getDate()-7);A.calDate=d;renderCal()",'‹')
      +`<div style="text-align:center"><div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:${I}">Week ${wn}</div><div style="font-size:11px;color:${T.muted}">${ml}</div></div>`
      +bt("const d=new Date(A.calDate);d.setDate(d.getDate()+7);A.calDate=d;renderCal()",'›');
  }
  if(view==='year'){
    return bt(`A.calDate=new Date(${vY-1},${vM},1);renderCal()`,'‹')
      +`<button onclick="showMPicker()" style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:${I};background:none;border:none;cursor:pointer">${vY}</button>`
      +bt(`A.calDate=new Date(${vY+1},${vM},1);renderCal()`,'›');
  }
  return bt(`A.calDate=new Date(${vY},${vM-1},1);renderCal()`,'‹')
    +`<button onclick="showMPicker()" style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:${I};background:none;border:none;cursor:pointer">${MN[vM]} ${vY}</button>`
    +bt(`A.calDate=new Date(${vY},${vM+1},1);renderCal()`,'›');
}
window.calNavBar=calNavBar;

function renderCal(){
  const vY=A.calDate.getFullYear(),vM=A.calDate.getMonth();
  // Monday-first: shift getDay() so Monday=0, Sunday=6
  const rawFirst=new Date(vY,vM,1).getDay();
  const firstDay=(rawFirst+6)%7;
  const dIM=new Date(vY,vM+1,0).getDate();
  const cells=Array.from({length:Math.ceil((firstDay+dIM)/7)*7},(_,i)=>{const d=i-firstDay+1;return d>=1&&d<=dIM?d:null;});

  const filtered=getEvents().filter(e=>{
    if(A.calFType!=='all'&&e.type!==A.calFType)return false;
    if(A.calFMember!=='all'&&!(e.participants||[]).includes(A.calFMember)&&e.member_id!==A.calFMember)return false;
    if(A.calSearch){const q=A.calSearch.toLowerCase();if(![e.title,e.description,e.location,e.activity,...(e.tags||[])].filter(Boolean).join(' ').toLowerCase().includes(q))return false;}
    return true;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  const evOnDay=d=>filtered.filter(e=>isSameDay(e.date,new Date(vY,vM,d)));
  // Note: toISOLocal used in form to avoid UTC date shift

  let grid='';
  if(A.calView==='month'){
    grid=`<div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px">
      ${DN.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:${T.muted};padding:3px 0;text-transform:uppercase">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
      ${cells.map(d=>{
        if(!d)return'<div style="min-height:80px"></div>';
        const isT=isSameDay(new Date(vY,vM,d),todayD());
        const de=evOnDay(d);
        const shortT=e=>{const t=e.title||ET[e.type].label;const s=t.replace(/\s*[-–]\s*Wellness Log$/i,'').replace(/^Wellness Log$/i,'Log');return s.length>8?s.substring(0,7)+'\u2026':s;};
        const pillC=e=>{
          // Family-wide, unassigned, or multiple members = neutral grey
          if(e.participants_all_family || (!e.member_id && !(e.participants&&e.participants.length)))
            return '#9e9488';
          if((e.participants?.length||0)>1) return '#9e9488';
          const mid=e.member_id||(e.participants&&e.participants[0]);
          const mem=A.members.find(m=>m.id===mid);
          return mem?mem.color:'#9e9488';
        };
        const dayOfWeek=(new Date(vY,vM,d).getDay()+6)%7; // 0=Mon..6=Sun
        const isWeekend=dayOfWeek>=5;
        const dayBg=isT?T.sageLight:isWeekend?T.parchment+'bb':'#fff';
        const dt=new Date(vY,vM,d);
        // Continuation events — started before today, ends today or later
        const spanCont=filtered.filter(e=>{
          if(!e.end_date)return false;
          const eS=new Date(e.date);eS.setHours(0,0,0,0);
          const eE=new Date(e.end_date);eE.setHours(23,59,59,0);
          return dt>eS&&dt<=eE;
        });
        const isLastDay=e=>e.end_date&&isSameDay(e.end_date,dt);
        // Multi-day events that START on this day (span into future days)
        const multiDayStart=de.filter(e=>e.end_date&&!isSameDay(e.date,e.end_date)&&isSameDay(e.date,dt));
        // Regular events on this day (not continuations)
        const dayEvents=de.filter(e=>!spanCont.find(s=>s.id===e.id));
        // Multi-day starts (start today, end later)
        const isMultiStart=e=>e.end_date&&!isSameDay(e.date,e.end_date)&&isSameDay(e.date,dt);
        return`<div onclick="calClick(${d})" style="min-height:80px;padding:3px 2px 4px;border-radius:9px;background:${dayBg};border:1px solid ${isT?T.sageMid:T.border};cursor:pointer;overflow:hidden">
          <div style="width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${isT?T.sage:'transparent'};color:${isT?'#fff':T.ink};font-size:11px;font-weight:${isT?800:600};margin:0 auto 3px">${d}</div>
          <div style="display:flex;flex-direction:column;gap:2px">
            ${spanCont.slice(0,2).map(e=>{
              const pc=pillC(e);
              const isLast=isLastDay(e);
              return`<div onclick="event.stopPropagation();viewEv('${e.id}')" style="background:${pc};margin:0 -3px 0 -3px;padding:1px 3px;font-size:9px;font-weight:700;color:#fff;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-radius:${isLast?'0 3px 3px 0':'0'};cursor:pointer;display:block">${isLast?(e.series_id?'🔁 ':'')+shortT(e):' '}</div>`;
            }).join('')}
            ${dayEvents.slice(0,Math.max(0,3-spanCont.length)).map(e=>{
              const pc=pillC(e);
              const ms=isMultiStart(e);
              // Multi-day start: solid colour pill extending right; single-day: left-border pill
              // 🔁 takes the place of the type icon for recurring events — there's only
              // room for one symbol at this size, and "this repeats" is the more useful cue.
              return`<div onclick="event.stopPropagation();viewEv('${e.id}')" style="background:${ms?pc:pc+'22'};border-left:2px solid ${pc};border-radius:${ms?'4px 0 0 4px':'0 3px 3px 0'};margin:${ms?'0 -2px 0 0':'0'};padding:1px 2px;font-size:9px;font-weight:700;color:${ms?'#fff':pc};line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer" title="${e.title||ET[e.type].label}">${e.series_id?'🔁':ET[e.type].icon} ${shortT(e)}</div>`;
            }).join('')}
            ${dayEvents.length+spanCont.length>3?`<div style="font-size:8px;color:${T.muted};font-weight:700;text-align:center;padding-top:1px">+${dayEvents.length+spanCont.length-3} more</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  } else if(A.calView==='week'){
    const ws=new Date(A.calDate);const wd=ws.getDay();ws.setDate(ws.getDate()-((wd+6)%7));
    const fmtT=dt=>{if(!dt)return'';const x=new Date(dt);return x.getHours().toString().padStart(2,'0')+':'+x.getMinutes().toString().padStart(2,'0');};
    const wMc=e=>{if(e.participants_all_family||(!e.member_id&&!(e.participants?.length))||((e.participants?.length||0)>1))return '#9e9488';const mid=e.member_id||(e.participants?.[0]);const mem=getMembers().find(m=>m.id===mid);return mem?mem.color:'#9e9488';};
    grid=Array.from({length:7},(_,i)=>{

      return`<div style="display:flex;gap:10px;margin-bottom:10px">

        </div>
        <div style="flex:1;min-width:0">
          ${de.length?de.map(e=>{
            const mc=wMc(e);
            const timeLabel=e.all_day||e.type==='wellness'?'All day':fmtT(e.date)+(e.end_date&&!e.all_day?' → '+fmtT(e.end_date):'');
            return`<div onclick="viewEv('${e.id}')" style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9px;background:${mc}15;border-left:3px solid ${mc};margin-bottom:5px;cursor:pointer">
              <span style="font-size:14px;flex-shrink:0">${ET[e.type].icon}</span>
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:700;color:${T.ink};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.series_id?'🔁 ':''}${e.title||ET[e.type].label}</div>
                <div style="font-size:10px;color:${mc};font-weight:600;margin-top:1px">${timeLabel}</div>
              </div>
            </div>`;
          }).join(''):`<div style="font-size:12px;color:${T.muted};font-style:italic;padding:8px 0">No entries</div>`}
        </div>
      </div>`;
    }).join('');
  } else {
    // Year view with mini month grids
    grid=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      ${MN.map((mn,mi)=>{
        const mFirstDay=new Date(vY,mi,1).getDay();
        const mDIM=new Date(vY,mi+1,0).getDate();
        const mCells=Array.from({length:Math.ceil((mFirstDay+mDIM)/7)*7},(_,i)=>{const d=i-mFirstDay+1;return d>=1&&d<=mDIM?d:null;});
        const mEvs=filtered.filter(e=>new Date(e.date).getMonth()===mi&&new Date(e.date).getFullYear()===vY);
        const mEvDays=new Set(mEvs.map(e=>new Date(e.date).getDate()));
        return`<div onclick="A.calDate=new Date(${vY},${mi},1);A.calView='month';renderCal()" style="background:${T.surface};border-radius:12px;border:1px solid ${T.border};padding:10px;cursor:pointer">
          <div style="font-weight:700;font-size:13px;color:${T.ink};margin-bottom:6px;text-align:center">${mn.slice(0,3)} ${mEvs.length>0?`<span style="font-size:10px;color:${T.sage};font-weight:700">(${mEvs.length})</span>`:''}</div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">
            ${['S','M','T','W','T','F','S'].map(d=>`<div style="text-align:center;font-size:8px;font-weight:700;color:${T.muted}">${d}</div>`).join('')}
            ${mCells.map(d=>{
              if(!d)return'<div></div>';
              const isT=isSameDay(new Date(vY,mi,d),todayD());
              const hasEv=mEvDays.has(d);
              return`<div style="width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${isT?T.sage:hasEv?T.sageLight:'transparent'};font-size:8px;font-weight:${hasEv?700:400};color:${isT?'#fff':hasEv?T.sage:T.muted}">${d}</div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  const searchRes=''; // Results rendered dynamically by renderCalResults()

  document.getElementById('page-calendar').innerHTML=`

      <div class="page-title">Calendar <button class="btn btn-primary btn-sm" onclick="showPicker(null)">+ Add</button></div>

      </select>
    </div>
    <div style="padding:6px 16px 0">
      <div style="position:relative">
        <input class="inp" id="cal-search-inp" placeholder="🔍  Search entries…" value="${A.calSearch}"

(function initCalSwipe(){

    if(!pg?.classList.contains('active'))return;
    // Ignore touches that start on a button or input
    if(e.target.closest('button,input,select,textarea,.modal-bg'))return;
    tx=e.touches[0].clientX;
    ty=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    const pg=document.getElementById('page-calendar');
    if(!pg?.classList.contains('active'))return;
    if(e.target.closest('button,input,select,textarea,.modal-bg'))return;
    const dx=e.changedTouches[0].clientX-tx;
    const dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5)return; // too small or too vertical
    const vY=A.calDate.getFullYear(),vM=A.calDate.getMonth();
    if(A.calView==='month'){
      A.calDate=new Date(vY,vM+(dx<0?1:-1),1);
    } else if(A.calView==='week'){
      const d=new Date(A.calDate);d.setDate(d.getDate()+(dx<0?7:-7));A.calDate=d;
    } else if(A.calView==='year'){
      A.calDate=new Date(vY+(dx<0?1:-1),vM,1);
    }
    renderCal();
  },{passive:true});
})();

function calClick(d){
  const vY=A.calDate.getFullYear(),vM=A.calDate.getMonth();
  const dt=new Date(vY,vM,d);
  const applyFilters = e => {
    if(A.calFType!=='all' && e.type!==A.calFType) return false;
    if(A.calFMember!=='all' && !(e.participants||[]).includes(A.calFMember) && e.member_id!==A.calFMember) return false;
    return true;
  };
  const allEv=getEvents().filter(applyFilters);
  // Events that START on this day
  const startingHere=allEv.filter(e=>isSameDay(e.date,dt));
  // Multi-day events that SPAN through this day (started earlier)
  const spanning=allEv.filter(e=>{
    if(!e.end_date||isSameDay(e.date,dt))return false;
    const eS=new Date(e.date);eS.setHours(0,0,0,0);
    const eE=new Date(e.end_date);eE.setHours(23,59,59,0);
    return dt>eS&&dt<=eE;
  });
  const allOnDay=[...startingHere,...spanning].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(allOnDay.length)showDayModal(dt,allOnDay);
  else if(A.calFType==='all'&&A.calFMember==='all')showPicker(dt);
  else showDayModal(dt,[]); // filtered — show empty day modal not picker
}

// ── DATE OFFSET FIX ───────────────────────────────────────────────────────────
// toISO uses local date correctly - no UTC shift
function toISOLocal(d) {
  if (!d) return '';
  const x = new Date(d);
  const yr = x.getFullYear();
  const mo = String(x.getMonth()+1).padStart(2,'0');
  const dy = String(x.getDate()).padStart(2,'0');
  return `${yr}-${mo}-${dy}`;
}

// ── CUSTOM TIME PICKER (V13) ───────────────────────────────────────────────
// Replaces native <input type="time"> which renders as a full-screen clock
// dial on some Android skins (e.g. MIUI/Xiaomi). Two <select> dropdowns
// (hour + 5-min-step minute) give a consistent look on every device.
//
// baseId: the logical field id, e.g. 'ef-stime'. Renders two selects with
// ids `${baseId}-h` and `${baseId}-m`. value: optional "HH:MM" to preselect.
function buildTimeSelect(baseId, value) {
  const [vh, vm] = (value || '').split(':');
  const hh = vh !== undefined ? parseInt(vh, 10) : null;
  // Round minute to nearest 5 so any odd stored value still matches an option
  const mm = vm !== undefined ? Math.round(parseInt(vm, 10) / 5) * 5 % 60 : null;
  let hourOpts = '';
  for (let h = 0; h < 24; h++) {
    const hs = String(h).padStart(2, '0');
    hourOpts += `<option value="${hs}"${h === hh ? ' selected' : ''}>${hs}</option>`;
  }
  let minOpts = '';
  for (let m = 0; m < 60; m += 5) {
    const ms = String(m).padStart(2, '0');
    minOpts += `<option value="${ms}"${m === mm ? ' selected' : ''}>${ms}</option>`;
  }
  return `<div style="display:flex;align-items:center;gap:5px">
    <select class="sel" id="${baseId}-h" style="flex:1;text-align:center;padding:9px 4px">${hourOpts}</select>
    <span style="font-weight:700;color:${T.muted}">:</span>
    <select class="sel" id="${baseId}-m" style="flex:1;text-align:center;padding:9px 4px">${minOpts}</select>
  </div>`;
}
window.buildTimeSelect = buildTimeSelect;

// Reads the two selects for a given baseId and returns "HH:MM", or '' if not found.
function getTimeVal(baseId) {
  const h = document.getElementById(baseId + '-h')?.value;
  const m = document.getElementById(baseId + '-m')?.value;
  if (h === undefined || h === null || m === undefined || m === null) return '';
  return `${h}:${m}`;
}

// Sets the two selects for a given baseId from an "HH:MM" string.
function setTimeVal(baseId, value) {
  if (!value) return;
  const [h, m] = value.split(':');
  const hEl = document.getElementById(baseId + '-h');
  const mEl = document.getElementById(baseId + '-m');
  // Round minute to nearest 5 to match available options
  const roundedM = String(Math.round(parseInt(m, 10) / 5) * 5 % 60).padStart(2, '0');
  if (hEl) hEl.value = h;
  if (mEl) mEl.value = roundedM;
}

function addChecklistRow(containerId, text='', done=false, idx=null) {
  const cont = document.getElementById(containerId);
  if (!cont) return;
  const i = idx !== null ? idx : cont.children.length;
  const div = document.createElement('div');
  div.draggable = true;
  div.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:default';
  div.dataset.container = containerId;
  div.innerHTML = `<span class="drag-handle" style="cursor:grab;color:#c8bfb0;font-size:14px;flex-shrink:0;user-select:none;touch-action:none">⠿</span><input type="checkbox" id="cl-${containerId}-${i}" ${done?'checked':''}><input class="inp" id="ct-${containerId}-${i}" value="${text}" style="flex:1;font-size:13px;padding:6px 10px" placeholder="Action item…"><button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:${T.muted};font-size:16px;cursor:pointer;padding:4px;flex-shrink:0">×</button>`;
  // Enter key → new row
  div.querySelector('input:not([type="checkbox"])').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addChecklistRow(containerId); setTimeout(()=>{const rows=document.getElementById(containerId).querySelectorAll('input:not([type="checkbox"])');rows[rows.length-1]?.focus();},50); }
  });
  // Drag-to-reorder (mouse)
  div.addEventListener('dragstart', e => {
    e.dataTransfer.effectAllowed = 'move';
    div.style.opacity = '0.4';
    cont._dragging = div;
  });
  div.addEventListener('dragend', () => { div.style.opacity = '1'; cont._dragging = null; });
  div.addEventListener('dragover', e => {
    e.preventDefault();
    const dragging = cont._dragging;
    if (!dragging || dragging === div) return;
    const rect = div.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    if (e.clientY < mid) cont.insertBefore(dragging, div);
    else cont.insertBefore(dragging, div.nextSibling);
  });
  // Touch drag support
  let touchY = 0, touchClone = null;
  div.querySelector('.drag-handle').addEventListener('touchstart', e => {
    touchY = e.touches[0].clientY;
    div.style.opacity = '0.5';
    cont._dragging = div;
  }, {passive:true});
  div.querySelector('.drag-handle').addEventListener('touchmove', e => {
    e.preventDefault();
    const y = e.touches[0].clientY;
    const els = Array.from(cont.children);
    els.forEach(el => {
      if (el === cont._dragging) return;
      const rect = el.getBoundingClientRect();
      if (y > rect.top && y < rect.bottom) {
        const mid = rect.top + rect.height / 2;
        if (y < mid) cont.insertBefore(cont._dragging, el);
        else cont.insertBefore(cont._dragging, el.nextSibling);
      }
    });
  }, {passive:false});
  div.querySelector('.drag-handle').addEventListener('touchend', () => {
    div.style.opacity = '1';
    cont._dragging = null;
  });
  cont.appendChild(div);
  return div;
}
window.addChecklistRow = addChecklistRow;

function getChecklist(containerId) {

  const items = [];
  cont.querySelectorAll('div').forEach(row => {

  // Helper: link attachments

        <select class="sel" id="ef-mood"><option value="">No mood recorded</option>${MOODS.map(m=>`<option${source?.mood===m?' selected':''}>${m}</option>`).join('')}</select></div>
      <div class="grid2">
        <div class="form-row" style="margin:0"><label class="lbl">Energy (%)</label><input class="inp" type="number" min="0" max="100" id="ef-en" placeholder="75" value="${source?.energy||''}"></div>

    if (hType === 'Appointment') {

        <div class="grid2">

        ${attachmentField()}`;

    } else if (hType === 'Treatment') {
      fields = `
        <div class="form-row"><label class="lbl">Health Event Type</label>
          <select class="sel" id="ef-apt" onchange="reloadHealthForm(this.value,'${evId||''}',${dateTs||'null'})">
            ${['Appointment','Treatment','Illness'].map(t=>`<option${hType===t?' selected':''}>${t}</option>`).join('')}
          </select></div>
        <div class="form-row"><label class="lbl">Participants</label>${partButtons()}</div>

      delete A._evDraftRestore;

       'ef-desc','ef-mem','ef-rec','ef-recend-n','ef-recend-d',

function syncEndDate(newStart) {
  const ed = document.getElementById('ef-enddate');
  const sd = document.getElementById('ef-date');
  if (!ed || !newStart) return;
  const oldStart = sd.dataset.prevDate || newStart;
  const oldEnd = ed.value;
  if (!oldEnd || oldEnd <= oldStart) {
    // Single-day or no end: end = new start
    ed.value = newStart;
  } else {
    // Multi-day: preserve duration
    const durMs = new Date(oldEnd) - new Date(oldStart);
    if (durMs > 86400000) {
      const newEnd = new Date(new Date(newStart).getTime() + durMs);
      ed.value = newEnd.toISOString().split('T')[0];
    } else {
      ed.value = newStart;
    }
  }
  sd.dataset.prevDate = newStart;
}

// ── SUPABASE WRITE WRAPPER ────────────────────────────────────────────────────
// Wraps any Supabase operation with timeout + one automatic retry
// Fixes silent failures caused by stale HTTP/2 connections
async function sbWrite(operation) {
  const TIMEOUT_MS = 7000;
  const withTimeout = (fn) => Promise.race([
    fn(),
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), TIMEOUT_MS))
  ]);
  try {
    return await withTimeout(operation);
  } catch (e) {
    const isConn = ['timeout','fetch','network','Failed to fetch'].some(k=>e.message?.includes(k));
    if (isConn) {
      toast('Connection issue — retrying…');
      await new Promise(r => setTimeout(r, 1000));
      // Force fresh Supabase client to break out of stale HTTP/2 connection pool
      try {
        sb = supabase.createClient(SB_URL, SB_KEY, {
          auth: { persistSession: true, autoRefreshToken: true },
          global: { fetch: (...a) => fetch(...a) }
        });
      } catch(_) {}
      try { return await withTimeout(operation); }
      catch (e2) {
        toast('Save failed. Please refresh and try again.', true);
        return { error: { message: e2.message }, data: null };
      }
    }
    throw e;
  }
}

// Build a local datetime ISO string that preserves user's intended time
function localDT(dateStr, timeStr) {
  if (!dateStr) return new Date().toISOString();
  const t = timeStr || '12:00';
  // Create date in local time, then get ISO with offset
  const [y,m,d] = dateStr.split('-').map(Number);
  const [h,mi] = t.split(':').map(Number);
  const local = new Date(y, m-1, d, h, mi, 0);
  // Format as ISO preserving local time
  const off = -local.getTimezoneOffset();
  const sign = off >= 0 ? '+' : '-';
  const pad = n => String(Math.abs(n)).padStart(2,'0');
  return `${dateStr}T${pad(h)}:${pad(mi)}:00${sign}${pad(Math.floor(Math.abs(off)/60))}:${pad(Math.abs(off)%60)}`;
}
window.localDT = localDT;

        data.end_date = endDateV ? `${endDateV}T12:00:00` : null;
        data.all_day = true;
        data.symptoms = document.getElementById('ef-symptoms')?.value || null;
        data.cure = document.getElementById('ef-cure')?.value || null;
      }
    }

    // v8: privacy — stamp fields on data before generating recurrences
    // so every instance in a series inherits the same privacy setting.
    if (!evId) {
      // New event (or duplicate treated as new): record creator + preference.
      data.created_by_user_id = A.user?.id || null;
      data.is_private = document.getElementById('ef-private')?.checked || false;
    } else {
      // Edit: only update is_private when the current user is the creator.
      // created_by_user_id is never changed on edits.
      const _existEv = A.events.find(e => e.id === evId);
      if (_existEv?.created_by_user_id === A.user?.id) {
        data.is_private = document.getElementById('ef-private')?.checked || false;
      }
    }

    // v14: generateRecurrences() must ONLY ever run when creating a brand-new
    // event. Previously it ran unconditionally on every save — including
    // edits — which always stamped a fresh series_id onto the edited row
    // (silently detaching it from its series) and, further down, re-seeded a
    // whole duplicate set of future occurrences from the edited date. That
    // was the root cause of the recurring-event edit corruption bug. Edits
    // (single-occurrence OR full-series) never touch series membership or
    // generate new rows — they only update the row(s) that already exist.
    const eventsToSave = evId ? [data] : generateRecurrences(data);

    // Strip any undefined/null keys that aren't in schema to avoid DB errors
    const cleanData = obj => {
      const allowed = ['family_id','type','title','date','end_date','all_day','location',
        'description','recurrence','recurrence_end_type','recurrence_end_count','recurrence_end_date',
        'appt_type','member_id','participants','participants_all_family','tags',
        'weight','height','hydration','exercised','activity','activity_mins','mood','energy','sleep',
        'social_type','actions','doctor','specialty','cost','cost_currency',
        'symptoms','cure','recommended_by','administration','considerations','links','series_id',
        'is_private','created_by_user_id']; // v8: privacy fields
      const clean = {};
      allowed.forEach(k => { if (obj[k] !== undefined) clean[k] = obj[k]; });
      return clean;
    };
    const cleanedData = cleanData(data);
    const cleanedRecurrences = eventsToSave.map(cleanData);

    let savedFirst = null;
    if (evId) {
      const {family_id:_, ...updateData} = cleanedData;
      const res = await sbWrite(() => sb.from('events').update(updateData).eq('id', evId).select().single());
      if (res.error) {
        console.error('Update error', res.error);
        toast('Error saving: ' + (res.error.message||'unknown'), true);
        return;
      }
      A.events = A.events.map(e => e.id===evId ? res.data : e);
      savedFirst = res.data;

      // v14: "Edit full recurrence" — extended to apply EVERY edited field to
      // every sibling occurrence (not just a fixed subset), including
      // all_day, time-of-day, and a calendar-date shift. Date/end_date differ
      // per sibling (each keeps its own day unless the whole series is being
      // shifted), so this is a per-row update rather than one blanket UPDATE.
      if (editSeriesId) {
        const siblings = A.events.filter(e => e.series_id === editSeriesId && e.id !== evId);
        if (siblings.length) {
          // Everything except identity/date fields applies identically to
          // every occurrence. Date/end_date get their own per-occurrence
          // handling below (day-delta + time-of-day), so they're excluded here.
          const EXCLUDE_FROM_SHARED = new Set(['family_id','date','end_date','series_id','created_by_user_id','id']);
          const sharedUpdate = {};
          Object.keys(cleanedData).forEach(k => { if (!EXCLUDE_FROM_SHARED.has(k)) sharedUpdate[k] = cleanedData[k]; });

          // Calendar-day delta between the edited occurrence's ORIGINAL date
          // (captured at the top of this function, before the user's edits)
          // and its NEW date — applied to every sibling so the whole series
          // shifts together while preserving relative spacing. A pure
          // time-of-day change (no date change) produces a delta of 0, so
          // siblings keep their own day and only pick up the new time.
          const origDateOnly = _origEvForDelta ? new Date(_origEvForDelta.date) : new Date(cleanedData.date);
          origDateOnly.setHours(0,0,0,0);
          const newDateOnly = new Date(cleanedData.date);
          newDateOnly.setHours(0,0,0,0);
          const dayDeltaMs = newDateOnly - origDateOnly;
          const newDateObj = new Date(cleanedData.date);
          const newEndDateObj = cleanedData.end_date ? new Date(cleanedData.end_date) : null;

          const siblingUpdates = siblings.map(sib => {
            const shiftedDate = new Date(new Date(sib.date).getTime() + dayDeltaMs);
            if (cleanedData.all_day) shiftedDate.setHours(12,0,0,0);
            else shiftedDate.setHours(newDateObj.getHours(), newDateObj.getMinutes(), 0, 0);
            let shiftedEndDateIso = null;
            if (sib.end_date) {
              const shiftedEnd = new Date(new Date(sib.end_date).getTime() + dayDeltaMs);
              if (cleanedData.all_day) shiftedEnd.setHours(12,0,0,0);
              else if (newEndDateObj) shiftedEnd.setHours(newEndDateObj.getHours(), newEndDateObj.getMinutes(), 0, 0);
              shiftedEndDateIso = shiftedEnd.toISOString();
            }
            return { id: sib.id, payload: { ...sharedUpdate, date: shiftedDate.toISOString(), end_date: shiftedEndDateIso } };
          });

          // v10 (UX hardening) carried forward: sbWrite() + explicit error
          // handling on every sibling write — the primary event above already
          // saved successfully, so a failure here warns rather than blocks.
          const results = await Promise.all(siblingUpdates.map(u =>
            sbWrite(() => sb.from('events').update(u.payload).eq('id', u.id).select().single())
          ));
          const failed = results.filter(r => r.error);
          if (failed.length) {
            toast(`Entry saved, but ${failed.length} of ${siblings.length} other occurrence${siblings.length!==1?'s':''} failed to update — please try again.`, true);
            console.error('Series sibling update errors', failed.map(f => f.error));
          }
          const succeeded = results.filter(r => !r.error && r.data);
          if (succeeded.length) {
            const byId = {};
            succeeded.forEach(r => { byId[r.data.id] = r.data; });
            A.events = A.events.map(e => byId[e.id] ? byId[e.id] : e);
            seriesUpdateMsg = `Series updated! ✅ (${succeeded.length + 1} occurrence${succeeded.length+1!==1?'s':''})`;
          }
        }
      }
    } else {
      const res = await sbWrite(() => sb.from('events').insert(cleanedRecurrences).select());
      if (res.error) {
        console.error('Insert error', res.error);
        toast('Error: ' + (res.error.message||'unknown error'), true);
        return;
      }
      if (!res.data || res.data.length === 0) {
        console.error('Insert blocked silently — RLS or missing columns. Payload:', cleanedRecurrences[0]);
        toast('Save failed — please check you are signed in and try again.', true);
        return;
      }
      A.events.push(...res.data); savedFirst = res.data[0];
    }

    // Sync any new tags to family.tags so they appear in Settings
    if (data.tags?.length && A.family) {
      const existingTags = A.family.tags || [];
      const newTags = data.tags.filter(t => !existingTags.includes(t));
      if (newTags.length) {
        const merged = [...new Set([...existingTags, ...newTags])];
        sb.from('families').update({tags:merged}).eq('id',A.family.id).select().single()
          .then(({data:fd})=>{ if(fd) A.family=fd; });
      }
    }
    _saveOk = true;
    clearEvDraft(); // v13: event saved successfully — discard the localStorage draft
    _closeModalDOM();
    // v8: write activity notification so other family members are informed.
    // v14: private events must never generate a visible notification to other
    // family members — the notification trigger previously ignored is_private
    // entirely, even though Home/Calendar already hid private events from
    // everyone but the creator. The creator's own toast confirmation below is
    // unaffected either way — this only gates the cross-family notification.
    if (!data.is_private) {
      const _notifTitle = data.title || ET[type]?.label || '';
      writeNotif('event', evId ? 'updated' : 'created',
        evId ? `${getActorName()} updated an event` : `${getActorName()} added a new event`,
        _notifTitle
      );
    }
    toast(seriesUpdateMsg || (evId ? 'Entry updated! ✅' : `Entry added!${eventsToSave.length>1?' ('+eventsToSave.length+' occurrences created)':''}`));
    renderCal();
    renderHome();
  } catch(e) {
    console.error('saveEv error', e);
    toast('Something went wrong — please try again.', true);
  } finally {
    hideSavingToast();
    if (!_saveOk && _saveBtn) {
      _saveBtn.disabled = false;
      _saveBtn.textContent = _saveBtn.dataset.origText || (evId ? 'Save Changes' : 'Add Entry');
      _saveBtn.style.opacity = '';
    }
  }
}
window.saveEv = saveEv;

// ── GENERATE RECURRENCES ──────────────────────────────────────────────────────
function generateRecurrences(data) {
  const events = [data]; // first event is always included
  const rec = data.recurrence;
  if (!rec || rec === 'None') return events;

  // Stamp all occurrences with a shared series_id so they can be managed together
  const seriesId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2));
  events[0].series_id = seriesId;

  const endType = data.recurrence_end_type || 'none';
  // For 'count': total occurrences INCLUDING the first = recurrence_end_count
  // For 'date': repeat until that date
  // For 'none': repeat for 1 year (52 weekly max)
  const totalCount = endType === 'count' ? Math.max(1, data.recurrence_end_count || 1) : 365;
  const endDateLimit = endType === 'date' && data.recurrence_end_date
    ? new Date(data.recurrence_end_date + 'T23:59:59')
    : endType === 'none'
    ? new Date('2099-12-31') // repeat forever — capped at 2099 for DB safety
    : null;

  const baseDate = new Date(data.date);
  const baseEnd = data.end_date ? new Date(data.end_date) : null;
  const duration = baseEnd ? (baseEnd - baseDate) : 0;

  let generated = 0; // count of additional events (not counting base)
  let current = new Date(baseDate);

  while (generated < totalCount - 1) { // -1 because base event counts as 1
    let next = new Date(current);
    if (rec === 'Monthly') next.setMonth(next.getMonth() + 1);
    else if (rec === 'Yearly') next.setFullYear(next.getFullYear() + 1);
    else if (rec === 'Daily') next.setDate(next.getDate() + 1);
    else if (rec === 'Weekly') next.setDate(next.getDate() + 7);
    else if (rec === 'Bi-weekly') next.setDate(next.getDate() + 14);
    else break; // unknown recurrence

    if (endDateLimit && next > endDateLimit) break;
    if (generated > 200) break; // hard safety cap

    const recEvent = {...data};
    recEvent.date = next.toISOString();
    if (baseEnd) recEvent.end_date = new Date(next.getTime() + duration).toISOString();
    recEvent.series_id = seriesId; // link all occurrences to the same series
    delete recEvent.id; // ensure new ID on insert
    events.push(recEvent);
    current = next;
    generated++;
  }
  return events;
}

// ── EVENT FORM DRAFT (v13) ────────────────────────────────────────────────────
// Protects against iOS Safari silently reloading tabs and destroying unsaved event
// form data. A draft is written to localStorage every 5 seconds while any event
// form is open. On the next page load, a banner offers to restore the in-progress entry.
// Draft is cleared automatically when the event is successfully saved.

const _evDraftKey=()=>'ks_ev_draft_'+(A.user?.id||'anon');
const _evDraftMaxAge=2*60*60*1000; // discard drafts older than 2 hours

function saveEvDraft(){
  if(!A.user||!A.family) return;
  // Collect all possible form field values that exist in the DOM right now.
  // ef-stime/ef-etime are excluded here — v13's custom time picker made them
  // hour/minute select pairs rather than single inputs, so they're captured
  // separately below via getTimeVal().
  const fieldIds=[
    'ef-title','ef-date','ef-enddate','ef-allday',
    'ef-loc','ef-social-type','ef-desc','ef-mem','ef-rec',
    'ef-recend-type','ef-recend-n','ef-recend-d',
    'ef-wt','ef-ht','ef-hyd','ef-ex','ef-act','ef-actm','ef-mood','ef-en','ef-sl','ef-wcomment',
    'ef-apt','ef-doctor','ef-specialty','ef-cost','ef-cost-cur',
    'ef-symptoms','ef-cure','ef-recby','ef-considerations','ef-private'
  ];
  const fields={};
  fieldIds.forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    fields[id]=el.type==='checkbox'?el.checked:el.value;
  });
  // v13: capture the two time-picker fields via getTimeVal() instead of .value
  const stimeVal=getTimeVal('ef-stime');
  if(stimeVal) fields['ef-stime']=stimeVal;
  const etimeVal=getTimeVal('ef-etime');
  if(etimeVal) fields['ef-etime']=etimeVal;
  const participants=Array.from(document.querySelectorAll('#ef-parts button[data-sel="true"]')).map(b=>b.dataset.mid).filter(Boolean);
  const tags=Array.from(document.querySelectorAll('#ef-tags button[data-sel="true"]')).map(b=>b.dataset.tag).filter(Boolean);
  const draft={
    type:A._evDraftType||'social',
    apptType:document.getElementById('ef-apt')?.value||null,
    timestamp:Date.now(),
    fields,participants,tags,
  };
  try{localStorage.setItem(_evDraftKey(),JSON.stringify(draft));}catch(_){}
}
window.saveEvDraft=saveEvDraft;

function clearEvDraft(){
  try{localStorage.removeItem(_evDraftKey());}catch(_){}
  A._evDraftType=null;
}
window.clearEvDraft=clearEvDraft;

function checkAndOfferEvDraft(){
  if(!A.user||!A.family) return;
  let draft;
  try{
    const raw=localStorage.getItem(_evDraftKey());
    if(!raw) return;
    draft=JSON.parse(raw);
  }catch(_){return;}
  // Discard stale drafts
  if(!draft||!draft.timestamp||Date.now()-draft.timestamp>_evDraftMaxAge){
    clearEvDraft();return;
  }
  // Show a non-intrusive restoration banner at the bottom of the screen
  const existing=document.getElementById('ev-draft-banner');
  if(existing) existing.remove();
  const banner=document.createElement('div');
  banner.id='ev-draft-banner';
  banner.style.cssText='position:fixed;bottom:72px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:#1e1b16;color:#fff;border-radius:12px;padding:12px 14px;z-index:500;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fadeUp .3s ease';
  const evType=ET[draft.type]?.label||'entry';
  const evTitle=draft.fields?.['ef-title'];
  const draftDate=new Date(draft.timestamp);
  const tStr=draftDate.getHours().toString().padStart(2,'0')+':'+draftDate.getMinutes().toString().padStart(2,'0');
  banner.innerHTML=`
    <div style="min-width:0">
      <div style="font-weight:700;font-size:13px">📝 Unfinished ${evType}</div>
      <div style="font-size:11px;opacity:.75;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${evTitle?'"'+evTitle+'"':'No title yet'} · Draft from ${tStr}</div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="document.getElementById('ev-draft-banner')?.remove();clearEvDraft()" style="background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent">Discard</button>
      <button onclick="document.getElementById('ev-draft-banner')?.remove();restoreEvDraft()" style="background:#5e8b62;border:none;border-radius:8px;color:#fff;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent">Restore ✓</button>
    </div>`;
  document.body.appendChild(banner);
  setTimeout(()=>document.getElementById('ev-draft-banner')?.remove(),15000); // auto-dismiss
}
window.checkAndOfferEvDraft=checkAndOfferEvDraft;

function restoreEvDraft(){
  let draft;
  try{
    const raw=localStorage.getItem(_evDraftKey());
    if(!raw) return;
    draft=JSON.parse(raw);
  }catch(_){return;}
  if(!draft) return;
  // Queue the draft data, then open a fresh form — restoration happens inside openEvForm's setTimeout
  A._evDraftType=draft.type;
  A._evDraftRestore=draft;
  openEvForm(draft.type,null,null);
}
window.restoreEvDraft=restoreEvDraft;

// ── DELETE ENTIRE SERIES ──────────────────────────────────────────────────────
// Deletes all events with the given series_id from the DB and local state.
async function deleteEntireSeries(seriesId) {
  const toDelete = A.events.filter(e=>e.series_id===seriesId);
  if (!toDelete.length) { closeModal(); return; }
  // v10 (UX hardening): button-disable + saving toast + sbWrite() for idle-safety.
  // The series delete modal has exactly one danger button ("Delete all X
  // occurrences"), so this selector is reliable.
  const _delBtn=document.querySelector('.modal-body button.btn-danger');
  if(_delBtn){_delBtn.disabled=true;_delBtn.dataset.origText=_delBtn.textContent;_delBtn.textContent='Deleting…';_delBtn.style.opacity='0.7';}
  showSavingToast();
  let _delOk=false;
  try{
    const {error} = await sbWrite(() => sb.from('events').delete().eq('series_id', seriesId));
    if (error) { toast('Error deleting series.', true); console.error(error); return; }
    A.events = A.events.filter(e=>e.series_id!==seriesId);
    _delOk=true;
    closeModal();
    toast(`Series deleted — ${toDelete.length} occurrence${toDelete.length!==1?'s':''} removed.`);
    renderCal();
    renderHome();
  }catch(e){
    toast('Something went wrong — please try again.', true); console.error(e);
  }finally{
    hideSavingToast();
    if(!_delOk&&_delBtn){_delBtn.disabled=false;_delBtn.textContent=_delBtn.dataset.origText||'Delete';_delBtn.style.opacity='';}
  }
}
window.deleteEntireSeries = deleteEntireSeries;
