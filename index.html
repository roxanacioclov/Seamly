async function confirmCreateShoppingList(){
  if(!A.family)return;
  const name=document.getElementById('sl-new-name-inp')?.value?.trim();
  if(!name){toast('Please add a name.',true);return;}
  const _saveBtn=document.querySelector('.modal-body button.btn-primary');
  if(_saveBtn){_saveBtn.disabled=true;_saveBtn.dataset.origText=_saveBtn.textContent;_saveBtn.textContent='Creating…';_saveBtn.style.opacity='0.7';}
  let _saveOk=false;
  try{
    const{data,error}=await sbWrite(()=>sb.from('shopping_lists').insert({
      family_id:A.family.id,name,items:[]
    }).select().single());
    if(error){toast('Error creating list: '+(error.message||'unknown'),true);console.error(error);return;}

    renderMeals();

  }finally{
    if(!_saveOk&&_saveBtn){_saveBtn.disabled=false;_saveBtn.textContent=_saveBtn.dataset.origText||'Create';_saveBtn.style.opacity='';}
  }
}

async function confirmDeleteShoppingList(id){

function openShoppingList(id){

  renderShoppingModal(id);

function renderShoppingModal(id){
  // v9: capture scroll position before rebuilding the modal HTML, so any
  // action that re-renders (checking an item, adding an item, toggling
  // "Hide completed") doesn't reset the user back to the top of a long list.
  const _prevScrollTop=document.querySelector('.modal-body')?.scrollTop;
  const list=A.shoppingLists.find(l=>l.id===id);
  if(!list)return;
  const items=list.items||[];
  const doneCount=items.filter(i=>i.done).length;
  const hideDone=A._shopHideDone;
  const searchQ=(A._shopSearchQ||'').toLowerCase().trim();
  const itemRow=(item,idx)=>{
    if(hideDone&&item.done)return'';
    if(searchQ&&!(item.text||'').toLowerCase().includes(searchQ))return'';
    // v9: item text is now an editable input instead of a read-only span,
    // styled to visually match the old span (borderless, transparent,
    // strikethrough preserved when done). Saves silently on blur/Enter via
    // updateShoppingItemText — no re-render, so no scroll jump.
    return`<div class="shop-item-row" draggable="true" data-idx="${idx}" style="display:flex;align-items:center;gap:8px;margin-bottom:6px;background:#fff;border:1px solid ${T.border};border-radius:9px;padding:6px 8px">
      <span class="drag-handle" style="cursor:grab;color:#c8bfb0;font-size:14px;flex-shrink:0;user-select:none;touch-action:none">⠿</span>
      <input type="checkbox" ${item.done?'checked':''} onchange="toggleShoppingItem('${id}',${idx},this.checked)">
      <input type="text" value="${(item.text||'').replace(/"/g,'&quot;')}"
        style="flex:1;min-width:0;font-size:13px;border:none;background:transparent;padding:2px 0;font-family:inherit;color:${item.done?T.muted:T.ink};text-decoration:${item.done?'line-through':'none'}"
        onblur="updateShoppingItemText('${id}',${idx},this.value)"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">
      <button onclick="removeShoppingItem('${id}',${idx})" style="background:none;border:none;color:${T.muted};font-size:16px;cursor:pointer;padding:2px 4px">×</button>
    </div>`;
  };
  const rows=items.map((item,idx)=>itemRow(item,idx)).join('');
  // v15: visible count (for the empty-state message below) now accounts for
  // both the "Hide completed" toggle AND the per-list search filter.
  const visibleCount=items.filter(i=>(!hideDone||!i.done)&&(!searchQ||(i.text||'').toLowerCase().includes(searchQ))).length;
  const emptyMsg = items.length===0
    ? 'No items yet — add your first item below'
    : (searchQ ? `No items match "${A._shopSearchQ}"` : 'All items completed — toggle above to view');
  showModal(`🛒 ${list.name}`,`
    <label style="display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:${T.muted};margin-bottom:10px;cursor:pointer">
      <input type="checkbox" ${hideDone?'checked':''} onchange="A._shopHideDone=this.checked;renderShoppingModal('${id}')">
      👁 Hide completed (${doneCount})
    </label>
    ${items.length>4?`
    <div style="position:relative;margin-bottom:10px">
      <input class="inp" id="shop-search-list-inp" placeholder="🔍  Search this list…" value="${A._shopSearchQ||''}"
        style="padding-right:${A._shopSearchQ?'36px':'12px'}"
        oninput="A._shopSearchQ=this.value;clearTimeout(A._slT);A._slT=setTimeout(()=>renderShoppingModal('${id}'),250)">
      <button id="shop-search-list-x" onclick="A._shopSearchQ='';renderShoppingModal('${id}')"
        style="display:${A._shopSearchQ?'flex':'none'};position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:${T.muted};font-size:16px;cursor:pointer;width:24px;height:24px;align-items:center;justify-content:center;border-radius:50%">×</button>
    </div>`:''}
    <div id="shop-items-${id}">
      ${visibleCount?rows:`<div style="text-align:center;color:${T.muted};font-size:12px;padding:10px 0">${emptyMsg}</div>`}
    </div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <input class="inp" id="shop-new-item" placeholder="Add item…" style="flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();addShoppingItem('${id}');}">
      <button class="btn btn-primary btn-sm" onclick="addShoppingItem('${id}')">Add</button>
    </div>
    ${items.length?`<button class="btn btn-secondary btn-full" style="margin-top:10px" onclick="resetShoppingList('${id}')">↺ Uncheck all items</button>`:''}
  `);
  // v9: restore scroll position + init drag-to-reorder in the same tick
  // (both run in this one setTimeout — no extra async tick needed)
  setTimeout(()=>{
    initShoppingDrag(id);
    const mb=document.querySelector('.modal-body');
    if(mb&&_prevScrollTop)mb.scrollTop=_prevScrollTop;
  },50);
}
window.renderShoppingModal=renderShoppingModal;

// v9: silently saves an edited item's text without triggering a full modal
// re-render (which would reset scroll position). Reverts to the original
// text if the field is cleared; no-ops if the text is unchanged.
async function updateShoppingItemText(listId,idx,newText){
  const list=A.shoppingLists.find(l=>l.id===listId);
  if(!list)return;
  const items=list.items||[];
  const item=items[idx];
  if(!item)return;
  const trimmed=(newText||'').trim();
  if(!trimmed){
    // Cleared field — revert the input to the original text, don't save a blank item
    const inp=document.querySelector(`#shop-items-${listId} .shop-item-row[data-idx="${idx}"] input[type="text"]`);
    if(inp)inp.value=item.text;
    return;
  }
  if(trimmed===item.text)return; // unchanged — nothing to save
  const newItems=items.map((it,i)=>i===idx?{...it,text:trimmed}:it);
  list.items=newItems;
  const{error}=await sbWrite(()=>sb.from('shopping_lists').update({items:newItems}).eq('id',listId));
  if(error){toast('Error saving item.',true);console.error(error);}
}
window.updateShoppingItemText=updateShoppingItemText;

// Mouse + touch drag-to-reorder for shopping list items
function initShoppingDrag(listId){
  const cont=document.getElementById('shop-items-'+listId);
  if(!cont)return;
  let dragging=null;
  cont.querySelectorAll('.shop-item-row').forEach(row=>{
    row.addEventListener('dragstart',()=>{ row.style.opacity='0.4'; dragging=row; });
    row.addEventListener('dragend',()=>{ row.style.opacity='1'; if(dragging)reorderShoppingItems(listId,cont); dragging=null; });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      if(!dragging||dragging===row)return;
      const r=row.getBoundingClientRect();
      if(e.clientY<r.top+r.height/2)cont.insertBefore(dragging,row);
      else cont.insertBefore(dragging,row.nextSibling);
    });
    const handle=row.querySelector('.drag-handle');
    handle.addEventListener('touchstart',()=>{ row.style.opacity='0.5'; dragging=row; },{passive:true});
    handle.addEventListener('touchmove',e=>{
      e.preventDefault();
      const y=e.touches[0].clientY;
      cont.querySelectorAll('.shop-item-row').forEach(el=>{
        if(el===dragging)return;
        const r=el.getBoundingClientRect();
        if(y>r.top&&y<r.bottom){
          if(y<r.top+r.height/2)cont.insertBefore(dragging,el);
          else cont.insertBefore(dragging,el.nextSibling);
        }
      });
    },{passive:false});
    handle.addEventListener('touchend',()=>{ row.style.opacity='1'; if(dragging)reorderShoppingItems(listId,cont); dragging=null; });
  });
}
window.initShoppingDrag=initShoppingDrag;

// Persist new item order after a drag. Items currently hidden by "Hide completed"
// keep their relative order and are appended after the visible (reordered) items.
async function reorderShoppingItems(listId,cont){
  const list=A.shoppingLists.find(l=>l.id===listId);
  if(!list)return;
  const items=list.items||[];
  const shownIdx=Array.from(cont.querySelectorAll('.shop-item-row')).map(row=>parseInt(row.dataset.idx));
  const shownSet=new Set(shownIdx);
  const hiddenIdx=items.map((_,i)=>i).filter(i=>!shownSet.has(i));
  const finalOrder=[...shownIdx,...hiddenIdx];
  const newItems=finalOrder.map(i=>items[i]);
  list.items=newItems;
  // v10 (UX hardening): sbWrite() + error toast. No loading state — drag-to-
  // reorder should feel instant. Always re-render regardless of outcome.
  const{error}=await sbWrite(()=>sb.from('shopping_lists').update({items:newItems}).eq('id',listId));
  if(error){toast('Error saving new order.',true);console.error(error);}
  // v14: keep the Shopping tab page behind this modal in sync too — it was
  // previously only refreshed by leaving and returning to the Meals tab.
  renderMeals();
  renderShoppingModal(listId);
}
window.reorderShoppingItems=reorderShoppingItems;

async function addShoppingItem(listId){
  const inp=document.getElementById('shop-new-item');
  const text=inp?.value?.trim();
  if(!text)return;
  const list=A.shoppingLists.find(l=>l.id===listId);
  if(!list)return;
  const newItem={id:(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2),text,done:false};
  const items=[...(list.items||[]),newItem];
  // v10 (UX hardening): brief disable of the inline Add button + sbWrite().
  // Timing bug fix: local state (list.items) now only updates AFTER the DB
  // write is confirmed, so a failed write never leaves stale local state.
  const _addBtn=inp?.nextElementSibling;
  if(_addBtn){_addBtn.disabled=true;_addBtn.style.opacity='0.7';}
  try{
    const{error}=await sbWrite(()=>sb.from('shopping_lists').update({items}).eq('id',listId));
    if(error){toast('Error adding item.',true);console.error(error);return;}
    list.items=items;
    // v8: notify other family members
    writeNotif('shopping','updated',`${getActorName()} added to a shopping list`,text);
    // v14: keep the Shopping tab page behind this modal in sync too.
    renderMeals();
    renderShoppingModal(listId);
  }catch(e){
    toast('Something went wrong — please try again.',true);console.error(e);
  }finally{
    if(_addBtn){_addBtn.disabled=false;_addBtn.style.opacity='';}
  }
}
window.addShoppingItem=addShoppingItem;

async function removeShoppingItem(listId,idx){

}

// Toggling an item to "done" saves instantly and shows a 5-second Undo toast
async function toggleShoppingItem(listId,idx,checked){
  const list=A.shoppingLists.find(l=>l.id===listId);
  if(!list)return;
  const items=[...(list.items||[])];
  if(!items[idx])return;
  items[idx]={...items[idx],done:checked};
  // v10 (UX hardening): timing bug fix — local state only updates after a
  // confirmed DB write. On failure, re-render from the unchanged saved state
  // so the checkbox visually reverts instead of showing a state that was
  // never actually saved.
  const{error}=await sbWrite(()=>sb.from('shopping_lists').update({items}).eq('id',listId));
  if(error){
    toast('Error saving — please try again.',true);console.error(error);
    renderShoppingModal(listId);
    return;
  }
  list.items=items;
  if(checked) showShopUndoToast(listId,idx);
  // v14: keep the Shopping tab page behind this modal in sync too.
  renderMeals();
  renderShoppingModal(listId);
}
window.toggleShoppingItem=toggleShoppingItem;

  const{error}=await sbWrite(()=>sb.from('shopping_lists').update({items}).eq('id',listId));

// Save the entire grid as one JSON object — single shared row per family (upsert).
// v7: uses Postgres UPSERT via ON CONFLICT DO UPDATE (family_id has a UNIQUE
// constraint after the dedup migration). This is safer and simpler than the
// "update if exists, else insert" pattern used in v6.
async function saveMealPlan(isSilent=false){
  if(!A.family){if(!isSilent)toast('Set up your family first.',true);return;}
  const plan_data={};
  MEAL_PLAN_ROWS.forEach(row=>{
    plan_data[row]={};
    MEAL_PLAN_DAYS.forEach(day=>{
      plan_data[row][day]=document.getElementById(`mp-${row}-${day}`)?.value||'';
    });
  });
  const upsertRow={
    family_id:A.family.id,
    plan_data,
    updated_at:new Date().toISOString(),
  };
  // v10 (UX hardening): showSavingToast()/hideSavingToast() + sbWrite() for
  // idle-safety. This Save button is inline on the planner page (not inside
  // a modal), so Pattern C (toast only, no button disable) applies.
  // v13: update the status indicator too; only show the full saving toast on
  // an explicit (non-silent) save — the 3-second auto-save stays quiet.
  const _mpStatus=document.getElementById('meal-plan-status');
  if(_mpStatus){_mpStatus.textContent='● Saving…';_mpStatus.style.color='#7a7060';}
  if(!isSilent) showSavingToast();
  try{
    // .upsert() inserts a new row or updates the existing one on family_id conflict
    const{data,error}=await sbWrite(()=>sb.from('meal_plans')
      .upsert(upsertRow,{onConflict:'family_id'})
      .select()
      .single());
    if(error){
      if(_mpStatus){_mpStatus.textContent='⚠ Save failed';_mpStatus.style.color='#b85070';}
      if(!isSilent){toast('Error saving menu: '+(error.message||'unknown'),true);console.error(error);}
      return;
    }
    A.mealPlan=data;
    A._mealPlanDirty=false; // v14
    clearMealPlanDraftLS(); // v14: successfully synced — discard the localStorage draft
    // v8: notify family members on explicit saves only — not on every 3-second auto-save
    if(!isSilent) writeNotif('meal','updated',`${getActorName()} updated the weekly menu`,'Meal Planner');
    const now=new Date();
    const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    if(_mpStatus){_mpStatus.textContent=isSilent?`✓ Auto-saved at ${t}`:`✓ Saved at ${t}`;_mpStatus.style.color='#5e8b62';}
    if(!isSilent) toast('Weekly menu saved! ✅');
  }catch(e){
    if(_mpStatus){_mpStatus.textContent='⚠ Save failed';_mpStatus.style.color='#b85070';}
    if(!isSilent){toast('Something went wrong — please try again.',true);console.error(e);}
  }finally{
    if(!isSilent) hideSavingToast();
  }
}
window.saveMealPlan=saveMealPlan;

// ── MEAL PLANNER AUTO-SAVE (v13) ──────────────────────────────────────────────
// 3-second debounce: fires after the user stops typing in any planner cell.
// Saves silently (no toast) — only the status indicator updates.
function scheduleMealPlanAutoSave(){
  A._mealPlanDirty=true;
  const status=document.getElementById('meal-plan-status');
  if(status){status.textContent='● Unsaved';status.style.color='#c4892a';}
  // v14: snapshot to localStorage on every keystroke-triggered cycle, not just
  // when the 3-second remote debounce completes — same draft-safety pattern
  // as Notebook (see checkAndOfferMealDraft below), for the same reason: a
  // backgrounded/discarded tab can beat the debounce timer to the punch.
  saveMealPlanDraftLS();
  clearTimeout(A._mealPlanAutoSaveTimer);
  A._mealPlanAutoSaveTimer=setTimeout(()=>saveMealPlan(true),3000);
}
window.scheduleMealPlanAutoSave=scheduleMealPlanAutoSave;

// ── MEAL PLANNER DRAFT SAFETY (v14) ───────────────────────────────────────────
// Same pattern and same reasoning as Notebook's draft safety net above: the
// grid's 3-second auto-save only writes to Supabase, so a backgrounded/
// discarded tab can lose unsaved edits before that timer fires. Meal Planner
// has no per-note "editor" to reopen — it's a single shared grid — so the
// restore prompt simply switches to the Meals > Planner tab and refills it.

const _mealDraftKey=()=>'ks_meal_draft_'+(A.family?.id||'anon');
const _mealDraftMaxAge=2*60*60*1000; // discard drafts older than 2 hours

function saveMealPlanDraftLS(){
  if(!A.family) return;
  const table=document.getElementById('meal-plan-table');
  if(!table) return; // grid isn't on screen right now — nothing to draft
  const plan_data={};
  MEAL_PLAN_ROWS.forEach(row=>{
    plan_data[row]={};
    MEAL_PLAN_DAYS.forEach(day=>{
      plan_data[row][day]=document.getElementById(`mp-${row}-${day}`)?.value||'';
    });
  });
  const draft={timestamp:Date.now(),plan_data};
  try{localStorage.setItem(_mealDraftKey(),JSON.stringify(draft));}catch(_){}
}
window.saveMealPlanDraftLS=saveMealPlanDraftLS;

function clearMealPlanDraftLS(){
  try{localStorage.removeItem(_mealDraftKey());}catch(_){}
}
window.clearMealPlanDraftLS=clearMealPlanDraftLS;

// Checked once at app boot (see boot() below). Only offers restoration if the
// draft is actually newer than the last saved plan — otherwise it's stale
// leftover from a session that already completed normally.
function checkAndOfferMealDraft(){
  if(!A.family) return;
  let draft;
  try{
    const raw=localStorage.getItem(_mealDraftKey());
    if(!raw) return;
    draft=JSON.parse(raw);
  }catch(_){return;}
  if(!draft||!draft.timestamp||Date.now()-draft.timestamp>_mealDraftMaxAge){
    clearMealPlanDraftLS();return;
  }
  const savedAt=A.mealPlan?.updated_at?new Date(A.mealPlan.updated_at).getTime():0;
  if(draft.timestamp<=savedAt){ clearMealPlanDraftLS(); return; }
  const existing=document.getElementById('meal-draft-banner');
  if(existing) existing.remove();
  const banner=document.createElement('div');
  banner.id='meal-draft-banner';
  banner.style.cssText='position:fixed;bottom:72px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:#1e1b16;color:#fff;border-radius:12px;padding:12px 14px;z-index:500;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fadeUp .3s ease';
  const draftDate=new Date(draft.timestamp);
  const tStr=draftDate.getHours().toString().padStart(2,'0')+':'+draftDate.getMinutes().toString().padStart(2,'0');
  banner.innerHTML=`
    <div style="min-width:0">
      <div style="font-weight:700;font-size:13px">📝 Unfinished weekly menu edits</div>
      <div style="font-size:11px;opacity:.75;margin-top:2px">Draft from ${tStr} — newer than what's currently saved</div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="document.getElementById('meal-draft-banner')?.remove();clearMealPlanDraftLS()" style="background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent">Discard</button>
      <button onclick="document.getElementById('meal-draft-banner')?.remove();restoreMealPlanDraftLS()" style="background:#5e8b62;border:none;border-radius:8px;color:#fff;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent">Restore ✓</button>
    </div>`;
  document.body.appendChild(banner);
  setTimeout(()=>document.getElementById('meal-draft-banner')?.remove(),15000); // auto-dismiss
}
window.checkAndOfferMealDraft=checkAndOfferMealDraft;

// Switches to Meals > Planner (creating the grid in the DOM if needed) then
// refills it from the draft once the grid textareas exist.
function restoreMealPlanDraftLS(){
  let draft;
  try{
    const raw=localStorage.getItem(_mealDraftKey());
    if(!raw) return;
    draft=JSON.parse(raw);
  }catch(_){return;}
  if(!draft) return;
  A.mealsTab='planner';
  goTo('meals');
  setTimeout(()=>{
    const pd=draft.plan_data||{};
    MEAL_PLAN_ROWS.forEach(row=>{
      MEAL_PLAN_DAYS.forEach(day=>{
        const el=document.getElementById(`mp-${row}-${day}`);
        if(el) el.value=pd[row]?.[day]||'';
      });
    });
    A._mealPlanDirty=true;
    const status=document.getElementById('meal-plan-status');
    if(status){status.textContent='● Unsaved changes';status.style.color='#c4892a';}
    toast('Draft restored ✓');
  },100);
}
window.restoreMealPlanDraftLS=restoreMealPlanDraftLS;

async function saveProduct(){
  if(!A.family){toast('Set up your family first.',true);return;}
  const name=document.getElementById('ap-name')?.value?.trim();

async function saveFamName(){
  const name=document.getElementById('s-fn')?.value?.trim();
  if(!name){toast('Please enter a family name.',true);return;}
  // v13 fix: previously this function only handled RENAMING an existing
  // family (an UPDATE), so a brand-new user with no family yet always hit
  // the "!A.family" guard below and got a misleading "Please enter a family
  // name" error even after typing one — there was no INSERT path anywhere
  // in the app to actually create a first family. Handle that case here.
  if(!A.family){
    if(!A.user){toast('Please sign in first.',true);return;}
    const{data,error}=await sbWrite(()=>sb.from('families').insert({owner_id:A.user.id,name}).select().single());
    if(error){toast('Error creating family: '+(error.message||'please try again.'),true);console.error(error);return;}
    A.family=data;
    // Add the signed-in user as the first (owner) family member so they
    // show up everywhere members are listed — same as any other member.
    const ownerName=A.user.user_metadata?.name||A.user.email?.split('@')[0]||'Me';
    const{data:memData,error:memErr}=await sbWrite(()=>sb.from('family_members').insert({
      family_id:data.id,user_id:A.user.id,name:ownerName,email:A.user.email||null,
      is_owner:true,avatar:ownerName[0].toUpperCase()
    }).select().single());
    if(memErr){
      console.error(memErr);
      toast('Family created, but adding you as a member failed — please add yourself under Family Members.',true);
    }else if(memData){
      A.members.push(memData);
    }
    document.getElementById('fam-badge').textContent=data.name;
    // Sample mode was showing as a placeholder because there was no real
    // family yet — turn it off now that one exists, and hide its button.
    const sBtn=document.getElementById('sample-btn');
    if(sBtn) sBtn.style.display='none';
    if(isSampleMode()) toggleSampleMode();
    toast('Family created! ✅');
    renderSettings();
    return;
  }
  // v10 (UX hardening): sbWrite() for idle-safety (inline settings page, no modal).
  const{data,error}=await sbWrite(()=>sb.from('families').update({name}).eq('id',A.family.id).select().single());
  if(error){toast('Error saving.',true);console.error(error);return;}
  A.family=data;
  document.getElementById('fam-badge').textContent=data.name;
  toast('Family name saved! ✅');renderSettings();
}
window.saveFamName=saveFamName;

async function confirmDelMem(id){
  const mem=A.members.find(m=>m.id===id);

  let _delOk=false;

    if(error){toast('Error removing: '+error.message,true);console.error(error);return;}
    A.members=A.members.filter(m=>m.id!==id);
    // Also delete any invitations for this member's email — wrapped in
    // sbWrite() too, since a failure here previously went completely unnoticed.
    if(mem?.email && A.family){
      const{error:invErr}=await sbWrite(()=>sb.from('invitations').delete().eq('family_id',A.family.id).ilike('email',mem.email));
      if(invErr)console.error('Invitation cleanup error',invErr);
    }

// ── INSTANT ACTION / CHECKLIST SAVE ──────────────────────────────────────────
// Toggles a single action item on an event and saves instantly.
// Automatically sets or clears completed_at based on whether all actions are done.
async function toggleEvAction(evId, actionIdx, done) {
  if (isSampleMode()) return;
  const ev = A.events.find(e => e.id === evId);
  if (!ev) return;
  const actions = (ev.actions || []).map((a, i) => i === actionIdx ? {...a, done} : a);
  const allDone = actions.length > 0 && actions.every(a => a.done);
  const completedAt = allDone ? new Date().toISOString() : null;
  const { error } = await sb.from('events')
    .update({ actions, completed_at: completedAt })
    .eq('id', evId);
  if (error) { toast('Error saving.', true); return; }
  A.events = A.events.map(e => e.id === evId ? {...e, actions, completed_at: completedAt} : e);
  // Update label strikethrough in-place — no full modal re-render needed
  const lbl = document.getElementById(`ev-action-lbl-${actionIdx}`);
  if (lbl) {
    lbl.style.textDecoration = done ? 'line-through' : 'none';
    lbl.style.color = done ? T.muted : T.ink;
  }
  // Update the completion banner without re-rendering the modal
  const banner = document.getElementById('ev-completion-banner');
  if (banner) {
    if (allDone) {
      const x = new Date(completedAt);
      const t = x.getHours().toString().padStart(2,'0') + ':' + x.getMinutes().toString().padStart(2,'0');
      banner.innerHTML = `<div style="display:inline-flex;align-items:center;gap:6px;background:${T.sageLight};color:${T.sage};border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;margin-bottom:10px">✅ Completed ${fmt(completedAt)} at ${t}</div>`;
    } else {
      banner.innerHTML = '';
    }
  }
  // v7: keep Home's "Other Actions" / Today sections in sync with this change
  renderHome();
}
window.toggleEvAction = toggleEvAction;

// Toggles a single checklist item on a note and saves the full note instantly.
// Automatically sets or clears completed_at based on whether all items are done.
async function toggleNoteItem(noteId, itemIdx, done) {
  if (!noteId || isSampleMode()) return;
  const cont = document.getElementById('ne-cl');
  if (!cont) return;
  // Read live checklist state from DOM (captures user's click before we write)
  const checklist = [];
  Array.from(cont.children).forEach((row, i) => {
    const cb  = row.querySelector('input[type="checkbox"]');
    const inp = row.querySelector('input:not([type="checkbox"])');
    if (inp?.value?.trim()) {
      checklist.push({
        id: 'c' + i,
        text: inp.value.trim(),
        done: i === itemIdx ? done : (cb?.checked || false)
      });
    }
  });
  const allDone = checklist.length > 0 && checklist.every(c => c.done);
  const completedAt = allDone ? new Date().toISOString() : null;
  // Save the full note state so no other open field edits are lost
  const grpVal = document.getElementById('ne-grp')?.value;
  const data = {
    title:        document.getElementById('ne-t')?.value || '',
    // v7: read HTML from the rich-text editor (not a textarea)
    content:      (document.getElementById('ne-editor')?.innerHTML) || '',
    color:        document.getElementById('ne-col')?.value || NOTE_COLORS[0],
    group_id:     grpVal && grpVal !== '__new__' ? grpVal : null,
    member_id:    document.getElementById('ne-mem')?.value || null,
    pinned:       document.getElementById('ne-pin')?.checked || false,
    checklist,
    completed_at: completedAt,
  };
  // v7: sbWrite() for idle-safety
  const { data: saved, error } = await sbWrite(()=>sb.from('notes').update(data).eq('id', noteId).select().single());
  if (error) { console.error('Note instant save error', error); return; }
  A.notes = A.notes.map(n => n.id === noteId ? saved : n);
  updateNoteCompletionUI(completedAt);
  // v7: keep Home's "Other Actions" section in sync with this change
  renderHome();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
// ── NOTIFICATIONS (v8) ────────────────────────────────────────────────────────
// Two-layer in-app notification system:
//   Layer 1 — Activity: stored in DB, written on any family data change.
//              Only other family members' actions are shown (own actions filtered out).
//              7-day retention, max 50 per load.
//   Layer 2 — Alerts: computed fresh from existing data on every panel open.
//              Low stock meds, expiring products, overdue tasks, events soon.

let _notifications = []; // Cached activity notifications from DB
let _notifPanelOpen = false;

// Returns the full set of default notification preferences (all enabled)
function getDefaultNotifPrefs() {
  return {
    notif_member_join: true,
    notif_event: true,
    notif_note: true,
    notif_shopping: true,
    notif_meal: true,
    notif_inventory_meds: true,
    notif_inventory_products: true,
    alert_low_stock: true,
    alert_expiring: true,
    alert_overdue: true,
    alert_event_start: true,
  };
}

// Returns merged preferences: saved family prefs override defaults.
function getNotifPrefs() {
  const defaults = getDefaultNotifPrefs();
  const saved = A.family?.notif_preferences || {};
  return { ...defaults, ...saved };
}

// Finds the current user's display name by matching their email to a family_members record.
function getActorName() {
  if (!A.user) return 'A family member';
  const match = A.members.find(m =>
    m.email && m.email.toLowerCase() === A.user.email?.toLowerCase()
  );
  if (match) return match.name;
  return A.user.user_metadata?.name || 'A family member';
}

// Writes an activity notification to Supabase. Fire-and-forget.
function writeNotif(category, action, title, body, referenceId) {
  if (!A.family || !A.user || isSampleMode()) return;
  const prefs = getNotifPrefs();
  const prefKey = category === 'member' ? 'notif_member_join' : 'notif_' + category;
  if (prefs[prefKey] === false) return;
  const payload = {
    family_id: A.family.id,
    actor_user_id: A.user.id,
    actor_name: getActorName(),
    category,
    action,
    title: title || '',
    body: body || '',
    reference_id: referenceId || null,
  };
  sb.from('notifications').insert(payload).then(({ error }) => {
    if (error) console.warn('Notification write failed:', error.message);
  });
}

// Fetches activity notifications from Supabase (other members only, last 7 days)
async function loadNotifications() {
  if (!A.family || !A.user || isSampleMode()) return;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);
  const { data, error } = await sb.from('notifications')
    .select('*')
    .eq('family_id', A.family.id)
    .neq('actor_user_id', A.user.id)
    .gte('created_at', cutoff.toISOString())
    .order('created_at', { ascending: false })
    .limit(50);
  if (error) { console.warn('Notifications load error:', error.message); return; }
  _notifications = data || [];
  refreshNotifBadge();
}

// Computes real-time alerts from existing app data. No DB query needed.
function computeAlerts() {
  if (isSampleMode()) return [];
  const alerts = [];
  const prefs = getNotifPrefs();
  const today = todayD();
  const now = new Date();

  // Low stock medications (≤ 7 days of supply remaining)
  if (prefs.alert_low_stock !== false) {
    getDM().forEach(med => {
      const dailyDose = (med.member_ids || []).length * (med.dose_per_day || 1);
      if (!dailyDose) return;
      const stockBase = med.stock_date ? new Date(med.stock_date + 'T00:00:00') : today;
      const daysPassed = Math.max(0, Math.round((today - stockBase) / 86400000));
      const currentStock = Math.max(0, (med.stock_today || 0) - daysPassed * dailyDose);
      const daysLeft = Math.floor(currentStock / dailyDose);
      if (daysLeft <= 7) {
        const memberNames = A.members
          .filter(m => (med.member_ids || []).includes(m.id))
          .map(m => m.name).join(', ');
        alerts.push({
          icon: '💊',
          color: T.rose,
          title: `${med.name} running ${daysLeft <= 0 ? 'out' : 'low'}`,
          body: `${daysLeft <= 0 ? 'Out of stock' : `${daysLeft} day${daysLeft === 1 ? '' : 's'} left`}${memberNames ? ' · ' + memberNames : ''}`,
          id: 'low_stock_' + med.id,
        });
      }
    });
  }

  // Expiring inventory products (within 30 days)
  if (prefs.alert_expiring !== false) {
    (A.invProducts || []).forEach(p => {
      if (!p.expiry) return;
      const expDate = new Date(p.expiry);
      const daysUntil = Math.floor((expDate - now) / 86400000);
      if (daysUntil <= 30) {
        alerts.push({
          icon: daysUntil < 0 ? '🚨' : '⏰',
          color: daysUntil < 0 ? T.rose : T.honey,
          title: `${p.name} ${daysUntil < 0 ? 'expired' : 'expiring soon'}`,
          body: daysUntil < 0
            ? `Expired ${Math.abs(daysUntil)} day${Math.abs(daysUntil) === 1 ? '' : 's'} ago`
            : `Expires in ${daysUntil} day${daysUntil === 1 ? '' : 's'}`,
          id: 'expiry_' + p.id,
        });
      }
    });
  }

  // Overdue tasks with open action items
  if (prefs.alert_overdue !== false) {
    getEvents().filter(e => {
      if (e.type !== 'task' || e.completed_at) return false;
      const evDay = new Date(e.date); evDay.setHours(0, 0, 0, 0);
      return evDay < today && (e.actions || []).some(a => !a.done);
    }).forEach(e => {
      const openCount = (e.actions || []).filter(a => !a.done).length;
      alerts.push({
        icon: '⚠️',
        color: T.rose,
        title: `Overdue: ${e.title || 'Task'}`,
        body: `${openCount} open item${openCount !== 1 ? 's' : ''} · Due ${fmt(e.date)}`,
        id: 'overdue_' + e.id,
      });
    });
  }

  // Events starting within the next 60 minutes
  if (prefs.alert_event_start !== false) {
    const in60 = new Date(); in60.setMinutes(in60.getMinutes() + 60);
    getEvents().filter(e => {
      if (e.type === 'wellness' || e.all_day) return false;
      const start = new Date(e.date);
      return start > now && start <= in60;
    }).forEach(e => {
      const minsAway = Math.round((new Date(e.date) - now) / 60000);
      alerts.push({
        icon: '🔔',
        color: T.sky,
        title: `Starting soon: ${e.title || ET[e.type].label}`,
        body: `In ${minsAway} minute${minsAway === 1 ? '' : 's'}${e.location ? ' · ' + e.location : ''}`,
        id: 'soon_' + e.id,
      });
    });
  }

  return alerts;
}

// Returns the emoji icon for a notification row based on category + action
function notifIcon(category, action) {
  if (category === 'member') return '👤';
  if (action === 'deleted') return '🗑';
  if (action === 'created') {
    return { event:'🗓', note:'📓', shopping:'🛒', meal:'🍽', inventory_meds:'💊', inventory_products:'📦' }[category] || '🔔';
  }
  return { event:'✏️', note:'✏️', shopping:'✏️', meal:'🍽', inventory_meds:'💊', inventory_products:'📦' }[category] || '🔔';
}

// Updates the red badge on the bell icon.
function refreshNotifBadge() {
  // v12: target renamed from #notif-badge (numeric badge on old bell) to
  // #profile-dot (plain dot on the new My Profile button). The unread-
  // counting logic below is unchanged from v8 — only what we do with the
  // result changed (show/hide a dot instead of setting a number).
  const dot = document.getElementById('profile-dot');
  if (!dot) return;
  const prefs = getNotifPrefs();
  const lastRead = parseInt(localStorage.getItem('ks_notif_last_read_' + (A.user?.id || '')) || '0');
  const unread = _notifications.filter(n => {
    const prefKey = n.category === 'member' ? 'notif_member_join' : 'notif_' + n.category;
    if (prefs[prefKey] === false) return false;
    return new Date(n.created_at).getTime() > lastRead;
  }).length;
  dot.style.display = unread > 0 ? 'block' : 'none';
}

      <div style="width:44px;height:44px;border-radius:50%;background:${T.sage};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0">${initial}</div>
      <div style="min-width:0">
        <div style="font-weight:700;font-size:15px;color:${T.ink};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div>
        <div style="font-size:12px;color:${T.muted};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${email}</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column">
      ${row('🔔','Notifications',"closeModal();toggleNotifPanel();",false,hasUnread)}
      ${row('⚙️','Settings',"closeModal();goTo('settings');")}
      ${row('🚪','Sign out',"closeModal();doSignOut();",true)}
    </div>`);
}
window.openProfileMenu = openProfileMenu;

// Renders the notification bottom sheet into #notif-root
function renderNotifPanel() {
  const alerts = computeAlerts();
  const prefs = getNotifPrefs();
  const filtered = _notifications.filter(n => {
    const prefKey = n.category === 'member' ? 'notif_member_join' : 'notif_' + n.category;
    return prefs[prefKey] !== false;
  });
  const fmtRel = ts => {
    const diff = Date.now() - new Date(ts).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  };
  const hasContent = alerts.length > 0 || filtered.length > 0;
  const root = document.getElementById('notif-root');
  if (!root) return;
  root.innerHTML = `
    <div class="modal-bg" onclick="if(event.target.classList.contains('modal-bg'))toggleNotifPanel()">
      <div class="modal-sheet">
        <div class="modal-head">
          <div class="modal-title">🔔 Notifications</div>
          <button class="modal-close" onclick="toggleNotifPanel()">×</button>
        </div>
        <div class="modal-body">
          <div style="font-size:10px;font-weight:700;color:${T.muted};text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Family Activity</div>
          ${filtered.length ? filtered.map(n => `
            <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:11px;background:${T.parchment};margin-bottom:8px">
              <span style="font-size:18px;flex-shrink:0;margin-top:1px">${notifIcon(n.category, n.action)}</span>
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:13px;color:${T.ink}">${n.title || ''}</div>
                ${n.body ? `<div style="font-size:12px;color:${T.muted};margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.body}</div>` : ''}
                <div style="font-size:10px;color:${T.muted};margin-top:4px;font-weight:600">${fmtRel(n.created_at)}</div>
              </div>
            </div>`).join('') : `
            <div style="text-align:center;padding:20px 0;color:${T.muted}">
              <div style="font-size:32px;margin-bottom:8px">🤝</div>
              <div style="font-size:13px;font-weight:600;margin-bottom:4px">No activity yet</div>
              <div style="font-size:12px">Changes made by other family members will appear here.</div>
            </div>`}
          ${alerts.length ? `
            <div style="height:1px;background:${T.border};margin:14px 0 12px"></div>
            <div style="font-size:10px;font-weight:700;color:${T.muted};text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Alerts</div>
            ${alerts.map(a => `
              <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:11px;background:${a.color}18;border-left:3px solid ${a.color};margin-bottom:8px">
                <span style="font-size:18px;flex-shrink:0;margin-top:1px">${a.icon}</span>
                <div>
                  <div style="font-weight:700;font-size:13px;color:${T.ink}">${a.title}</div>
                  <div style="font-size:12px;color:${T.muted};margin-top:2px">${a.body}</div>
                </div>
              </div>`).join('')}
          ` : ''}
          <div style="background:${T.honeyLight};border-radius:10px;padding:12px 14px;margin-top:${hasContent ? '16' : '8'}px">
            <div style="font-size:12px;color:${T.honey};font-weight:700;margin-bottom:4px">📱 Push notifications — coming soon</div>
            <div style="font-size:11px;color:${T.muted};line-height:1.5">Get device alerts for events, reminders, and family activity. Manage your preferences in <button onclick="toggleNotifPanel();goTo('settings');A.settingsTab='notifs';renderSettings()" style="background:none;border:none;color:${T.sage};font-weight:700;cursor:pointer;font-size:11px;padding:0;text-decoration:underline">Settings → Notifications</button>.</div>
          </div>
        </div>
      </div>
    </div>`;
}

// Opens or closes the notification panel.
async function toggleNotifPanel() {
  _notifPanelOpen = !_notifPanelOpen;
  if (_notifPanelOpen) {
    await loadNotifications();
    renderNotifPanel();
    markAllNotifsRead();
  } else {
    document.getElementById('notif-root').innerHTML = '';
  }
}
window.toggleNotifPanel = toggleNotifPanel;

// Saves a single notification preference key into families.notif_preferences (JSONB).
async function updateNotifPref(key, val) {
  if (!A.family) return;
  const prefs = { ...getNotifPrefs(), [key]: val };
  // v10 (UX hardening): sbWrite() for idle-safety. On failure, re-render
  // Settings so the toggle visually reverts to the last confirmed state —
  // previously it stayed checked on-screen even though the DB was never
  // updated, silently lying to the user.
  const { data, error } = await sbWrite(() => sb.from('families')
    .update({ notif_preferences: prefs })
    .eq('id', A.family.id)
    .select().single());
  if (error) { toast('Error saving preference.', true); console.error(error); renderSettings(); return; }
  A.family = data;
}
window.updateNotifPref = updateNotifPref;

// ── FEEDBACK ──────────────────────────────────────────────────────────────────
// Floating 💬 button → modal form → saves to `feedback` table in Supabase.

const FB_TYPES = [
  { value:'general', icon:'💬', label:'General feedback', desc:'Share your thoughts on the app' },
  { value:'bug',     icon:'🐛', label:'Report a bug',     desc:"Something isn't working right" },
  { value:'feature', icon:'✨', label:'Feature request',  desc:"Something you'd love to see added" },
  { value:'other',   icon:'📝', label:'Other',            desc:'' },
];

function openFeedback() {
  showModal('Send Feedback 💬', `
    <div style="font-size:13px;color:${T.muted};margin-bottom:14px;line-height:1.6">
      Help us improve Seamly — tell us what's working, what isn't, or what you'd love to see next. We read every message.
    </div>
    <div class="form-row">
      <label class="lbl">Feedback type <span style="color:${T.rose}">*</span></label>
      <div id="fb-types" style="display:flex;flex-direction:column;gap:7px">
        ${FB_TYPES.map(t=>`
          <button type="button" data-type="${t.value}"
            onclick="selFbType(this,'${t.value}')"
            style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:1.5px solid ${T.border};background:#fff;cursor:pointer;text-align:left;width:100%;transition:border .15s,background .15s;-webkit-tap-highlight-color:transparent">
            <span style="font-size:20px;flex-shrink:0">${t.icon}</span>
            <div>
              <div style="font-weight:700;font-size:13px;color:${T.ink}">${t.label}</div>
              ${t.desc?`<div style="font-size:11px;color:${T.muted};margin-top:1px">${t.desc}</div>`:''}
            </div>
          </button>`).join('')}
      </div>
      <input type="hidden" id="fb-type" value="">
    </div>
    <div class="form-row" style="margin-top:12px">
      <label class="lbl">Your message <span style="color:${T.rose}">*</span></label>
      <textarea class="inp" id="fb-msg" rows="4"
        placeholder="Tell us what's on your mind…"
        style="resize:none"></textarea>
    </div>
    <div class="form-row">
      <label class="lbl">Which area of the app? (optional)</label>
      <select class="sel" id="fb-page">
        <option value="">Select…</option>
        ${['Home','Calendar','Notebook','Inventory','Meals','Settings','General / Other']
          .map(p=>`<option value="${p}">${p}</option>`).join('')}
      </select>
    </div>
    <button class="btn btn-primary btn-full btn-lg" style="margin-top:4px" onclick="saveFeedback()">
      Send Feedback 💚
    </button>
    <div style="font-size:11px;color:${T.muted};text-align:center;margin-top:10px;line-height:1.5">
      Your feedback goes directly to the Seamly team.
    </div>`);
}
window.openFeedback = openFeedback;

function selFbType(btn, type) {
  document.querySelectorAll('#fb-types button').forEach(b => {
    b.style.border    = `1.5px solid ${T.border}`;
    b.style.background = '#fff';
  });
  btn.style.border    = `1.5px solid ${T.sage}`;
  btn.style.background = T.sageLight;
  document.getElementById('fb-type').value = type;
}
window.selFbType = selFbType;

async function saveFeedback() {
  const type = document.getElementById('fb-type')?.value;
  const msg  = document.getElementById('fb-msg')?.value?.trim();
  const page = document.getElementById('fb-page')?.value || null;
  if (!type) { toast('Please select a feedback type.', true); return; }
  if (!msg)  { toast('Please write your message — we want to hear from you!', true); return; }
  const data = {
    family_id:   A.family?.id   || null,
    user_email:  A.user?.email  || null,
    family_name: A.family?.name || null,
    type,
    message: msg,
    page:    page || null,
  };
  // v10 (UX hardening): sbWrite() already present — adding Pattern B on top
  // (button-disable, saving toast, try/catch/finally). Button text is
  // "Sending…" rather than "Saving…" to match the feedback context.
  const _saveBtn=document.querySelector('.modal-body button.btn-primary');
  if(_saveBtn){_saveBtn.disabled=true;_saveBtn.dataset.origText=_saveBtn.textContent;_saveBtn.textContent='Sending…';_saveBtn.style.opacity='0.7';}
  showSavingToast();
  let _saveOk=false;
  try{
    const { error } = await sbWrite(() => sb.from('feedback').insert(data));
    if (error) {
      console.error('Feedback save error', error);
      toast('Error sending feedback — please try again.', true);
      return;
    }
    _saveOk=true;
    closeModal();
    toast('Feedback sent! Thank you 💚');
  }catch(e){
    toast('Something went wrong — please try again.',true);console.error(e);
  }finally{
    hideSavingToast();
    if(!_saveOk&&_saveBtn){_saveBtn.disabled=false;_saveBtn.textContent=_saveBtn.dataset.origText||'Send';_saveBtn.style.opacity='';}
  }
}
window.saveFeedback = saveFeedback;

// ── SAMPLE MODE ───────────────────────────────────────────────────────────────
function toggleSampleMode() {
  // Only allow toggle if user has a real family to switch back to
  if (!_sampleMode && !A.family) { return; } // no family to switch to
  _sampleMode = !_sampleMode;
  const btn = document.getElementById('sample-btn');
  if (btn) {
    btn.style.background = _sampleMode ? 'var(--honey-light)' : 'var(--sage)';
    btn.style.color = _sampleMode ? 'var(--honey)' : '#fff';
    btn.style.border = _sampleMode ? '1px solid var(--honey)44' : '1px solid var(--sage)';
    btn.textContent = _sampleMode ? '📋 Sample' : '🏠 My Family';
  }
  const badge = document.getElementById('fam-badge');
  if (badge) badge.textContent = _sampleMode ? 'Sample Family' : (A.family?.name||'');
  renderPage();
}
window.toggleSampleMode = toggleSampleMode;

function renderPage() {
  const pages = {home:renderHome,calendar:renderCal,notebook:renderNB,meds:renderMeds,inventory:renderInventory,meals:renderMeals,insights:renderInsights,settings:renderSettings};
  pages[A.page]?.();
}

function getFamily()  { return _sampleMode ? SD_FAMILY : A.family; }
function getMembers() { return _sampleMode ? SD_MEMBERS : A.members; }
// v8: client-side privacy filter — hides private items not owned by
// the current user. NOTE: Option B (JS-only). Upgrade to Option A
// (RLS) once beta confirms the feature is valuable.
function getEvents()  {
  if (_sampleMode) return SD_EVENTS;
  return A.events.filter(e => !e.is_private || e.created_by_user_id === A.user?.id);
}
// v8: client-side privacy filter — same pattern as getEvents().
function getNotes()   {
  if (_sampleMode) return SD_NOTES;
  return A.notes.filter(n => !n.is_private || n.created_by_user_id === A.user?.id);
}
function getGroups()  { return _sampleMode ? SD_GROUPS : A.noteGroups; }
function getDM()      { return _sampleMode ? SD_DM : A.dailyMeds; }
function isSampleMode() { return _sampleMode; }

// Returns medications filtered by A.medSearch (searches name and assigned member names).
// Used by renderMeds(), exports, and clipboard so the active filter is always consistent.
function getFilteredMeds(){
  const all=getDM();
  const q=(A.medSearch||'').toLowerCase().trim();
  if(!q)return all;
  return all.filter(med=>{
    if((med.name||'').toLowerCase().includes(q))return true;
    const memNames=getMembers().filter(m=>(med.member_ids||[]).includes(m.id)).map(m=>m.name.toLowerCase());
    return memNames.some(n=>n.includes(q));
  });
}
window.getFilteredMeds=getFilteredMeds;

function showAuth(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('root').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

async function handleSession(session){
  try{
    if(session?.user){
      document.getElementById('auth-screen').style.display='none';
      await initApp(session.user);
    } else {
      showAuth();
    }
  }catch(e){
    console.error('Session error',e);
    // Log error but don't block the user — show as toast if app is loaded
    console.error('App error:', e.message, e.stack);
    const root = document.getElementById('root');
    if(root && root.style.display !== 'none') {
      // App is loaded — just show error as toast
      toast('Error: ' + e.message + ' — try refreshing.', true);
    } else {
      // App not loaded yet — show error screen
      const ls = document.getElementById('loading-screen');
      if(ls) {
        ls.style.display='flex';
        ls.innerHTML=`<div style="text-align:center;padding:40px;font-family:sans-serif;max-width:380px">
          <div style="font-size:32px;margin-bottom:12px">⚠️</div>
          <div style="font-size:15px;font-weight:700;margin-bottom:8px">Something went wrong</div>
          <div style="font-size:12px;color:#7a7060;margin-bottom:4px;background:#f5f2ed;padding:8px;border-radius:8px;word-break:break-all">${e.message}</div>
          <div style="font-size:11px;color:#9e9488;margin-bottom:16px">Open browser console (F12) for details</div>
          <button onclick="location.reload()" style="padding:10px 24px;background:#5e8b62;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;margin-right:8px">Reload</button>
          <button onclick="showAuth()" style="padding:10px 24px;background:#ede8df;color:#7a7060;border:none;border-radius:10px;font-size:14px;cursor:pointer">Sign in again</button>
        </div>`;
      } else { showAuth(); }
    }
  }
}

async function boot(){
  // ── PWA: service worker registration (v8) ────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
      .then(reg => console.log('SW registered, scope:', reg.scope))
      .catch(err => console.warn('SW registration failed:', err));
  }

  // ── PWA: offline banner management (v8) ─────────────────────────────────
  function _updateOnlineStatus() {
    const banner = document.getElementById('offline-banner');
    if (!banner) return;
    if (navigator.onLine) {
      banner.classList.remove('visible');
    } else {
      banner.classList.add('visible');
    }
  }
  window.addEventListener('online',  _updateOnlineStatus);
  window.addEventListener('offline', _updateOnlineStatus);
  _updateOnlineStatus(); // set correct state on load

  if(!sb){
    document.getElementById('loading-screen').innerHTML=`<div style="text-align:center;padding:40px;font-family:sans-serif">
      <div style="font-size:40px;margin-bottom:16px">⚠️</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">Failed to connect</div>
      <div style="font-size:13px;color:#7a7060;margin-bottom:16px">Could not initialise the database connection.</div>
      <button onclick="location.reload()" style="padding:10px 20px;background:#5e8b62;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer">Retry</button>
    </div>`;
    return;
  }
  // Immediately check existing session — avoids blank screen on first load
  const { data:{ session } } = await sb.auth.getSession();
  await handleSession(session);
  // Also listen for future auth changes (login/logout)
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='PASSWORD_RECOVERY') {
      // User clicked the reset link — show password update form instead of app
      showPasswordReset();
      return;
    }
    if(event==='SIGNED_IN') await handleSession(session);
    if(event==='SIGNED_OUT') showAuth();
  });
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);
else boot();
</script>
