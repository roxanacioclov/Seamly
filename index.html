<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌿 Kinship — Family Hub v2.1</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#5e8b62;--sage-mid:#8ab88e;--sage-light:#d4e8d6;
  --terra:#b85c38;--terra-light:#f2ddd4;
  --sky:#3a7ca5;--sky-light:#d0e4f0;
  --plum:#7c5c8a;--plum-light:#e8d8f0;
  --honey:#c4892a;--honey-light:#f5e4c4;
  --rose:#b85070;--rose-light:#f0d4de;
  --ink:#1e1b16;--muted:#7a7060;--border:#e0d8cc;
  --bg:#f5f2ed;--surface:#fff;--parchment:#ede8df;
}
html,body{height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);-webkit-tap-highlight-color:transparent}
button,input,select,textarea{font-family:inherit}
input:focus,textarea:focus,select:focus{outline:2px solid var(--sage);outline-offset:1px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#c8bfb0;border-radius:4px}
#root{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.top-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50}
.top-logo{font-family:'Playfair Display',serif;font-size:18px;color:var(--sage)}
.content{flex:1;overflow-y:auto;padding-bottom:72px}
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 12px;flex-shrink:0;position:sticky;bottom:0;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent}
.nav-btn.active{color:var(--sage)}
.nav-dot{width:0;height:3px;border-radius:2px;background:var(--sage);transition:width .2s;margin-top:1px}
.nav-btn.active .nav-dot{width:18px}
.page{display:none;flex-direction:column}
.page.active{display:flex}
.page-header{padding:14px 16px 0;flex-shrink:0}
.family-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.page-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);display:flex;align-items:center;justify-content:space-between}
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.05)}
.btn{border:none;border-radius:10px;font-weight:700;font-size:13px;padding:8px 16px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.8}
.btn-primary{background:var(--sage);color:#fff}
.btn-secondary{background:var(--parchment);color:var(--muted);border:1px solid var(--border)}
.btn-danger{background:var(--rose-light);color:var(--rose);border:1px solid #b8507044}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-lg{padding:12px 24px;font-size:14px}
.btn-full{width:100%;justify-content:center}
.inp{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--ink);width:100%;background:var(--surface);-webkit-appearance:none}
.sel{border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--ink);width:100%;background:var(--surface)}
.lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.modal-bg{position:fixed;inset:0;background:rgba(20,18,14,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.22,.68,0,1.2)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px 11px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--ink)}
.modal-close{background:var(--parchment);border:none;border-radius:8px;width:30px;height:30px;font-size:18px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{overflow-y:auto;padding:15px 18px 32px;flex:1}
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-card{background:var(--surface);border-radius:20px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.1)}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;background:var(--bg)}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin .7s linear infinite}
.chip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;display:inline-flex;align-items:center}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;padding:0 16px}
.tab{padding:10px 14px;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--muted);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;margin-bottom:-1px;transition:color .2s}
.tab.active{color:var(--sage);border-bottom-color:var(--sage)}
.tbl{width:100%;border-collapse:collapse;min-width:640px}
.tbl th{padding:8px 7px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;text-align:left;border-bottom:1px solid var(--border);background:var(--parchment);white-space:nowrap}
.tbl td{padding:8px 7px;font-size:13px;color:var(--ink);border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:nth-child(even) td{background:#faf8f466}
.note-card{border-radius:13px;padding:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:transform .15s}
.note-card:active{transform:scale(.97)}
.ob-bg{position:fixed;inset:0;background:rgba(20,18,14,.7);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s ease}
.ob-card{background:var(--surface);border-radius:22px;padding:26px;max-width:380px;width:100%}
.ob-dots{display:flex;gap:5px;justify-content:center;margin-bottom:20px}
.ob-dot{height:6px;border-radius:99px;background:var(--border);transition:all .3s}
.ob-dot.active{background:var(--sage);width:18px}
.ob-dot:not(.active){width:6px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:fadeUp .3s ease;pointer-events:none;white-space:nowrap}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
  <div style="font-family:'Playfair Display',serif;font-size:24px;color:var(--sage)">🌿 Kinship</div>
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted)">Loading your family hub…</div>
</div>

<div id="auth-screen" class="auth-screen" style="display:none">

        Continue with Google
      </button>
      <button class="btn btn-full" style="background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer" onclick="switchAuth('forgot')">Forgot password?</button>
      <div id="a-msg" style="margin-top:10px;font-size:13px;color:var(--rose);text-align:center;min-height:18px"></div>
    </div>
    <div id="auth-forgot" style="display:none">
      <div class="form-row"><label class="lbl">Your email address</label><input class="inp" type="email" id="f-email" placeholder="your@email.com" autocomplete="email"></div>
      <button class="btn btn-primary btn-full btn-lg" style="margin-bottom:10px" onclick="doForgot()">Send Reset Link</button>
      <button class="btn btn-secondary btn-full" onclick="switchAuth('login')">← Back to Sign In</button>
      <div id="f-msg" style="margin-top:10px;font-size:13px;color:var(--sage);text-align:center;min-height:18px"></div>
    </div>
    <div id="auth-signup" style="display:none">
      <div class="form-row"><label class="lbl">Your Name</label><input class="inp" type="text" id="s-name" placeholder="Your name" autocomplete="name"></div>
      <div class="form-row"><label class="lbl">Email</label><input class="inp" type="email" id="s-email" placeholder="your@email.com" autocomplete="email"></div>
      <div class="form-row"><label class="lbl">Password</label><input class="inp" type="password" id="s-pass" placeholder="min 6 characters" autocomplete="new-password"></div>
      <button class="btn btn-primary btn-full btn-lg" style="margin-bottom:10px" onclick="doSignup()">Create Account</button>
      <button class="btn btn-secondary btn-full" onclick="switchAuth('login')">Already have an account</button>
      <div id="s-msg" style="margin-top:10px;font-size:13px;color:var(--rose);text-align:center;min-height:18px"></div>
    </div>
  </div>
</div>

<div id="root" style="display:none">
  <div class="top-bar">
    <div class="top-logo">🌿 Kinship</div>
    <div style="display:flex;align-items:center;gap:6px">
      <button id="sample-btn" onclick="A.family?toggleSampleMode():goTo('settings')" style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;background:var(--honey-light);color:var(--honey);border:1px solid var(--honey)44;cursor:pointer;display:none">📋 Sample</button>

  </nav>
  <div id="modal-root"></div>
  <div id="ob-root"></div>
</div>

function toast(msg,isErr=false){
  const t=document.createElement('div');
  t.className='toast';
  t.style.background=isErr?T.rose:T.sage;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function switchAuth(m){
  document.getElementById('auth-login').style.display=m==='login'?'block':'none';
  document.getElementById('auth-signup').style.display=m==='signup'?'block':'none';
  document.getElementById('auth-forgot').style.display=m==='forgot'?'block':'none';
  document.getElementById('a-msg').textContent='';
  document.getElementById('s-msg').textContent='';
}

async function doLogin(){
  const email=document.getElementById('a-email').value.trim();
  const pass=document.getElementById('a-pass').value;
  const msg=document.getElementById('a-msg');
  if(!email||!pass){msg.textContent='Please fill in all fields.';return;}
  msg.textContent='Signing in…';
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error)msg.textContent=error.message;
}

async function doSignup(){
  const name=document.getElementById('s-name').value.trim();
  const email=document.getElementById('s-email').value.trim();
  const pass=document.getElementById('s-pass').value;
  const msg=document.getElementById('s-msg');
  if(!name||!email||!pass){msg.textContent='Please fill in all fields.';return;}
  if(pass.length<6){msg.textContent='Password must be at least 6 characters.';return;}
  msg.textContent='Creating account…';
  const{error}=await sb.auth.signUp({email,password:pass,options:{data:{name}}});
  if(error){msg.textContent=error.message;return;}
  msg.style.color=T.sage;
  msg.textContent='Account created! Signing you in…';
}

async function doForgot(){
  const email=document.getElementById('f-email')?.value.trim();
  const msg=document.getElementById('f-msg');
  if(!email){if(msg){msg.textContent='Please enter your email.';msg.style.color=T.rose;}return;}
  if(msg){msg.textContent='Sending…';msg.style.color=T.muted;}
  const{error}=await sb.auth.resetPasswordForEmail(email,{
    redirectTo:window.location.origin+window.location.pathname
  });
  if(error){if(msg){msg.textContent=error.message;msg.style.color=T.rose;}}
  else{if(msg){msg.textContent='Reset link sent! Check your inbox ✅';msg.style.color=T.sage;}}
}
window.doForgot=doForgot;

async function doGoogleAuth(){
  const{error}=await sb.auth.signInWithOAuth({
    provider:'google',
    options:{ redirectTo: window.location.origin + window.location.pathname }
  });
  if(error) toast(error.message, true);
}
window.doGoogleAuth=doGoogleAuth;

function showPasswordReset(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('root').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  // Replace auth card content with password reset form
  document.getElementById('auth-login').style.display='none';
  document.getElementById('auth-signup').style.display='none';
  document.getElementById('auth-forgot').style.display='none';
  const card = document.querySelector('.auth-card');
  if(card && !document.getElementById('auth-reset')){
    const div=document.createElement('div');
    div.id='auth-reset';
    div.innerHTML=`
      <div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--sage);text-align:center;margin-bottom:16px">Set New Password</div>
      <div class="form-row"><label class="lbl">New Password</label><input class="inp" type="password" id="r-pass" placeholder="At least 6 characters" autocomplete="new-password"></div>
      <div class="form-row"><label class="lbl">Confirm Password</label><input class="inp" type="password" id="r-pass2" placeholder="Repeat password" autocomplete="new-password"></div>
      <button class="btn btn-primary btn-full btn-lg" onclick="doPasswordReset()">Set New Password</button>
      <div id="r-msg" style="margin-top:10px;font-size:13px;text-align:center;min-height:18px"></div>`;
    card.appendChild(div);
  }
}
window.showPasswordReset=showPasswordReset;

async function doPasswordReset(){
  const pass=document.getElementById('r-pass')?.value;
  const pass2=document.getElementById('r-pass2')?.value;
  const msg=document.getElementById('r-msg');
  if(!pass||pass.length<6){if(msg){msg.textContent='Password must be at least 6 characters.';msg.style.color='var(--rose)';}return;}
  if(pass!==pass2){if(msg){msg.textContent='Passwords do not match.';msg.style.color='var(--rose)';}return;}
  if(msg){msg.textContent='Saving…';msg.style.color='var(--muted)';}
  const{error}=await sb.auth.updateUser({password:pass});
  if(error){if(msg){msg.textContent=error.message;msg.style.color='var(--rose)';}}
  else{
    if(msg){msg.textContent='Password updated! Signing you in…';msg.style.color='var(--sage)';}
    setTimeout(()=>location.reload(),1500);
  }
}
window.doPasswordReset=doPasswordReset;

async function doSignOut(){
  // Bypass Supabase network entirely — clear session from localStorage directly
  // This is safe: Supabase reads auth state from localStorage on page load
  try {
    // Clear all Supabase auth keys from localStorage
    Object.keys(localStorage).forEach(k => {
      if(k.startsWith('sb-') || k.includes('supabase')) localStorage.removeItem(k);
    });
  } catch(_) {}
  location.reload();
}

async function initApp(user){
  A.user=user;
  document.getElementById('loading-screen').style.display='none';
  try{await loadAll();}catch(e){console.error('Load error',e);}

  // Seed Medical group if family exists and group doesn't yet
  if(A.family && !A.noteGroups.find(g=>g.name==='🏥 Medical Reference')){
    try { await seedMedicalGroup(); } catch(e){ console.warn('Medical group seed error',e); }
  }

  // ALWAYS check for unlinked family_members rows matching this user's email
  // This covers: invited users who already had an account, users added after signup
  try {
    const {data:unlinked, error:ule} = await sb.from('family_members')
      .select('id,family_id')
      .ilike('email', user.email)
      .is('user_id', null);
    console.log('Unlinked members check:', unlinked, ule);
    if(unlinked && unlinked.length > 0) {
      const {error:upe} = await sb.from('family_members')
        .update({user_id: user.id})
        .ilike('email', user.email)
        .is('user_id', null);
      console.log('Update result:', upe ? 'ERROR: '+upe.message : 'OK — '+unlinked.length+' rows linked');
      if(!upe) {
        try{await loadAll();}catch(e){console.error('Reload error',e);}
      }
    }
  } catch(e) { console.error('User link error', e); }

  if(!A.family){
    // No family found — new user with no invite
    const isFirstLogin = !localStorage.getItem('ks_ob_seen_' + user.id);
    A.showOB = isFirstLogin;
    A.obFlow = 'new';
  } else {
    // Has a family (own or linked via invite)
    const isFirstLogin = !localStorage.getItem('ks_ob_seen_' + user.id);
    A.showOB = isFirstLogin;
    A.obFlow = null;
  }
  document.getElementById('root').style.display='flex';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('fam-badge').textContent=A.family?.name||'';
  const sBtn = document.getElementById('sample-btn');
  if (!A.family) {
    // No family yet — Sample is the placeholder. Auto-activate it.
    if (sBtn) sBtn.style.display = 'block';
    if (!_sampleMode) toggleSampleMode();
  } else {
    // Has a real family — hide Sample, exit sample mode if active
    if (sBtn) sBtn.style.display = 'none';
    if (_sampleMode) toggleSampleMode();
  }
  goTo('home');
  if(A.showOB)renderOB();
}

function showModal(title,body){
  // Push history state so back button can close modal
  try {
    if(!history.state?.modalOpen) history.pushState({modalOpen:true},'');
  } catch(_) {}
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-bg" id="mbg" onclick="if(event.target.id==='mbg')_closeModalDOM()">
      <div class="modal-sheet">
        <div class="modal-head">
          <div class="modal-title">${title}</div>
          <button class="modal-close" onclick="_closeModalDOM()">×</button>
        </div>
        <div class="modal-body">${body}</div>
      </div>
    </div>`;
}
// DOM-only close — safe to call before running another function
function _closeModalDOM(){
  document.getElementById('modal-root').innerHTML='';
}
// Public closeModal — also handles history cleanup
function closeModal(){
  _closeModalDOM();
}
// Back button: close modal if open, otherwise let browser navigate back
window.addEventListener('popstate', () => {
  const modal = document.getElementById('modal-root');
  if(modal && modal.innerHTML.trim()){
    _closeModalDOM();
    // Re-push state so the next back press works correctly
    try { history.pushState({modalOpen:false},''); } catch(_) {}
  }
});

function renderOB(){
  const s=A.obStep, cur=OB[s];
  const card = document.getElementById('ob-root');
  card.innerHTML=`
    <div class="ob-bg">
      <div class="ob-card" id="ob-card-inner">
        <div class="ob-dots">${OB.map((_,i)=>`<div class="ob-dot ${i===s?'active':''}"></div>`).join('')}</div>
        <div style="font-size:52px;text-align:center;margin-bottom:14px">${cur.icon}</div>
        <div style="font-family:'Playfair Display',serif;font-size:21px;color:${T.ink};text-align:center;margin-bottom:10px;font-weight:600">${cur.title}</div>
        <div style="font-size:13px;color:${T.muted};text-align:center;line-height:1.7;margin-bottom:20px">${cur.body}</div>
        <div style="display:flex;gap:10px">
          ${s>0?`<button class="btn btn-secondary" style="flex:1" onclick="A.obStep--;renderOB()">← Back</button>`:''}
          ${cur.final
            ?`<button class="btn btn-primary" style="flex:1" onclick="document.getElementById('ob-root').innerHTML='';goTo('settings')">Go to Settings 🚀</button>`
            :`<button class="btn btn-primary" style="flex:1" onclick="A.obStep++;renderOB()">${s===0?"Let's go →":"Next →"}</button>`
          }
        </div>
        ${s>0?`<button onclick="document.getElementById('ob-root').innerHTML=''" style="display:block;margin:10px auto 0;background:none;border:none;color:${T.muted};font-size:12px;cursor:pointer">Skip tour</button>`:''}
      </div>
    </div>`;
  // Mark onboarding as seen after first card shown
  if(A.user) try { localStorage.setItem('ks_ob_seen_' + A.user.id, '1'); } catch(_) {}
  // Swipe support
  let tx=0;
  const inner=document.getElementById('ob-card-inner');
  if(inner){
    inner.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
    inner.addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-tx;
      if(Math.abs(dx)>50){
        if(dx<0&&s<OB.length-1){A.obStep++;renderOB();}
        else if(dx>0&&s>0){A.obStep--;renderOB();}
      }
    },{passive:true});
  }
}

function calNavBar(view,vY,vM,calDate){
  const P=T.parchment,B=T.border,I=T.ink,bt=(fn,label)=>`<button onclick="${fn}" style="background:${P};border:1px solid ${B};border-radius:9px;width:33px;height:33px;font-size:18px;cursor:pointer">${label}</button>`;
  if(view==='week'){
    const ws=new Date(calDate);ws.setDate(ws.getDate()-((ws.getDay()+6)%7));
    const we=new Date(ws);we.setDate(we.getDate()+6);
    const wn=Math.ceil((((ws-new Date(ws.getFullYear(),0,1))/86400000)+1)/7);
    const ml=ws.getMonth()===we.getMonth()?MN[ws.getMonth()]+' '+ws.getFullYear():MN[ws.getMonth()].slice(0,3)+' – '+MN[we.getMonth()].slice(0,3)+' '+we.getFullYear();
    return bt("const d=new Date(A.calDate);d.setDate(d.getDate()-7);A.calDate=d;renderCal()",'‹')
      +`<div style="text-align:center"><div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:${I}">Week ${wn}</div><div style="font-size:11px;color:${T.muted}">${ml}</div></div>`
      +bt("const d=new Date(A.calDate);d.setDate(d.getDate()+7);A.calDate=d;renderCal()",'›');
  }
  if(view==='year'){
    return bt(`A.calDate=new Date(${vY-1},${vM},1);renderCal()`,'‹')
      +`<button onclick="showMPicker()" style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:${I};background:none;border:none;cursor:pointer">${vY}</button>`
      +bt(`A.calDate=new Date(${vY+1},${vM},1);renderCal()`,'›');
  }
  return bt(`A.calDate=new Date(${vY},${vM-1},1);renderCal()`,'‹')
    +`<button onclick="showMPicker()" style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:${I};background:none;border:none;cursor:pointer">${MN[vM]} ${vY}</button>`
    +bt(`A.calDate=new Date(${vY},${vM+1},1);renderCal()`,'›');
}
window.calNavBar=calNavBar;

function renderCal(){
  const vY=A.calDate.getFullYear(),vM=A.calDate.getMonth();
  // Monday-first: shift getDay() so Monday=0, Sunday=6
  const rawFirst=new Date(vY,vM,1).getDay();
  const firstDay=(rawFirst+6)%7;
  const dIM=new Date(vY,vM+1,0).getDate();
  const cells=Array.from({length:Math.ceil((firstDay+dIM)/7)*7},(_,i)=>{const d=i-firstDay+1;return d>=1&&d<=dIM?d:null;});

  const filtered=getEvents().filter(e=>{
    if(A.calFType!=='all'&&e.type!==A.calFType)return false;
    if(A.calFMember!=='all'&&!(e.participants||[]).includes(A.calFMember)&&e.member_id!==A.calFMember)return false;
    if(A.calSearch){const q=A.calSearch.toLowerCase();if(![e.title,e.description,e.location,e.activity,...(e.tags||[])].filter(Boolean).join(' ').toLowerCase().includes(q))return false;}
    return true;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  const evOnDay=d=>filtered.filter(e=>isSameDay(e.date,new Date(vY,vM,d)));
  // Note: toISOLocal used in form to avoid UTC date shift

  let grid='';
  if(A.calView==='month'){
    grid=`<div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px">
      ${DN.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:${T.muted};padding:3px 0;text-transform:uppercase">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
      ${cells.map(d=>{
        if(!d)return'<div style="min-height:80px"></div>';
        const isT=isSameDay(new Date(vY,vM,d),todayD());
        const de=evOnDay(d);
        const shortT=e=>{const t=e.title||ET[e.type].label;const s=t.replace(/\s*[-–]\s*Wellness Log$/i,'').replace(/^Wellness Log$/i,'Log');return s.length>8?s.substring(0,7)+'\u2026':s;};
        const pillC=e=>{
          // Family-wide, unassigned, or multiple members = neutral grey
          if(e.participants_all_family || (!e.member_id && !(e.participants&&e.participants.length)))
            return '#9e9488';
          if((e.participants?.length||0)>1) return '#9e9488';
          const mid=e.member_id||(e.participants&&e.participants[0]);
          const mem=A.members.find(m=>m.id===mid);
          return mem?mem.color:'#9e9488';
        };
        const dayOfWeek=(new Date(vY,vM,d).getDay()+6)%7; // 0=Mon..6=Sun
        const isWeekend=dayOfWeek>=5;
        const dayBg=isT?T.sageLight:isWeekend?T.parchment+'bb':'#fff';
        const dt=new Date(vY,vM,d);
        // Continuation events — started before today, ends today or later
        const spanCont=filtered.filter(e=>{
          if(!e.end_date)return false;
          const eS=new Date(e.date);eS.setHours(0,0,0,0);
          const eE=new Date(e.end_date);eE.setHours(23,59,59,0);
          return dt>eS&&dt<=eE;
        });
        const isLastDay=e=>e.end_date&&isSameDay(e.end_date,dt);
        // Multi-day events that START on this day (span into future days)
        const multiDayStart=de.filter(e=>e.end_date&&!isSameDay(e.date,e.end_date)&&isSameDay(e.date,dt));
        // Regular events on this day (not continuations)
        const dayEvents=de.filter(e=>!spanCont.find(s=>s.id===e.id));
        // Multi-day starts (start today, end later)
        const isMultiStart=e=>e.end_date&&!isSameDay(e.date,e.end_date)&&isSameDay(e.date,dt);
        return`<div onclick="calClick(${d})" style="min-height:80px;padding:3px 2px 4px;border-radius:9px;background:${dayBg};border:1px solid ${isT?T.sageMid:T.border};cursor:pointer;overflow:hidden">
          <div style="width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${isT?T.sage:'transparent'};color:${isT?'#fff':T.ink};font-size:11px;font-weight:${isT?800:600};margin:0 auto 3px">${d}</div>
          <div style="display:flex;flex-direction:column;gap:2px">
            ${spanCont.slice(0,2).map(e=>{
              const pc=pillC(e);
              const isLast=isLastDay(e);
              return`<div onclick="event.stopPropagation();calClick(${d})" style="background:${pc};margin:0 -3px 0 -3px;padding:1px 3px;font-size:9px;font-weight:700;color:#fff;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-radius:${isLast?'0 3px 3px 0':'0'};cursor:pointer;display:block">${isLast?shortT(e):' '}</div>`;
            }).join('')}
            ${dayEvents.slice(0,Math.max(0,3-spanCont.length)).map(e=>{
              const pc=pillC(e);
              const ms=isMultiStart(e);
              // Multi-day start: solid colour pill extending right; single-day: left-border pill
              return`<div style="background:${ms?pc:pc+'22'};border-left:2px solid ${pc};border-radius:${ms?'4px 0 0 4px':'0 3px 3px 0'};margin:${ms?'0 -2px 0 0':'0'};padding:1px 2px;font-size:9px;font-weight:700;color:${ms?'#fff':pc};line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis" title="${e.title||ET[e.type].label}">${ET[e.type].icon} ${shortT(e)}</div>`;
            }).join('')}
            ${dayEvents.length+spanCont.length>3?`<div style="font-size:8px;color:${T.muted};font-weight:700;text-align:center;padding-top:1px">+${dayEvents.length+spanCont.length-3} more</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  } else if(A.calView==='week'){
    const ws=new Date(A.calDate);const wd=ws.getDay();ws.setDate(ws.getDate()-((wd+6)%7));
    const fmtT=dt=>{if(!dt)return'';const x=new Date(dt);return x.getHours().toString().padStart(2,'0')+':'+x.getMinutes().toString().padStart(2,'0');};
    const wMc=e=>{if(e.participants_all_family||(!e.member_id&&!(e.participants?.length))||((e.participants?.length||0)>1))return '#9e9488';const mid=e.member_id||(e.participants?.[0]);const mem=getMembers().find(m=>m.id===mid);return mem?mem.color:'#9e9488';};
    grid=Array.from({length:7},(_,i)=>{
      const d=new Date(ws);d.setDate(d.getDate()+i);
      const de=filtered.filter(e=>isSameDay(e.date,d));
      const isT=isSameDay(d,todayD());
      const monthLabel=MN[d.getMonth()].slice(0,3);
      return`<div style="display:flex;gap:10px;margin-bottom:10px">
        <div style="width:46px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${isT?T.sage:T.parchment};border-radius:10px;border:1px solid ${isT?T.sageMid:T.border};padding:4px 0">
          <div style="font-size:9px;font-weight:700;color:${isT?'#fff':T.muted};text-transform:uppercase">${DN[(d.getDay()+6)%7]}</div>
          <div style="font-size:15px;font-weight:800;color:${isT?'#fff':T.ink};line-height:1.1">${d.getDate()}</div>
          <div style="font-size:9px;font-weight:600;color:${isT?'rgba(255,255,255,.8)':T.muted}">${monthLabel}</div>
        </div>
        <div style="flex:1;min-width:0">
          ${de.length?de.map(e=>{
            const mc=wMc(e);
            const timeLabel=e.all_day||e.type==='wellness'?'All day':fmtT(e.date)+(e.end_date&&!e.all_day?' → '+fmtT(e.end_date):'');
            return`<div onclick="viewEv('${e.id}')" style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9px;background:${mc}15;border-left:3px solid ${mc};margin-bottom:5px;cursor:pointer">
              <span style="font-size:14px;flex-shrink:0">${ET[e.type].icon}</span>
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:700;color:${T.ink};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.title||ET[e.type].label}</div>
                <div style="font-size:10px;color:${mc};font-weight:600;margin-top:1px">${timeLabel}</div>
              </div>
            </div>`;
          }).join(''):`<div style="font-size:12px;color:${T.muted};font-style:italic;padding:8px 0">No entries</div>`}
        </div>
      </div>`;
    }).join('');
  } else {
    // Year view with mini month grids
    grid=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      ${MN.map((mn,mi)=>{
        const mFirstDay=new Date(vY,mi,1).getDay();
        const mDIM=new Date(vY,mi+1,0).getDate();
        const mCells=Array.from({length:Math.ceil((mFirstDay+mDIM)/7)*7},(_,i)=>{const d=i-mFirstDay+1;return d>=1&&d<=mDIM?d:null;});
        const mEvs=filtered.filter(e=>new Date(e.date).getMonth()===mi&&new Date(e.date).getFullYear()===vY);
        const mEvDays=new Set(mEvs.map(e=>new Date(e.date).getDate()));
        return`<div onclick="A.calDate=new Date(${vY},${mi},1);A.calView='month';renderCal()" style="background:${T.surface};border-radius:12px;border:1px solid ${T.border};padding:10px;cursor:pointer">
          <div style="font-weight:700;font-size:13px;color:${T.ink};margin-bottom:6px;text-align:center">${mn.slice(0,3)} ${mEvs.length>0?`<span style="font-size:10px;color:${T.sage};font-weight:700">(${mEvs.length})</span>`:''}</div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">
            ${['S','M','T','W','T','F','S'].map(d=>`<div style="text-align:center;font-size:8px;font-weight:700;color:${T.muted}">${d}</div>`).join('')}
            ${mCells.map(d=>{
              if(!d)return'<div></div>';
              const isT=isSameDay(new Date(vY,mi,d),todayD());
              const hasEv=mEvDays.has(d);
              return`<div style="width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${isT?T.sage:hasEv?T.sageLight:'transparent'};font-size:8px;font-weight:${hasEv?700:400};color:${isT?'#fff':hasEv?T.sage:T.muted}">${d}</div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  const searchRes=''; // Results rendered dynamically by renderCalResults()

  document.getElementById('page-calendar').innerHTML=`
    <div class="page-header">
      <div class="family-label">${getFamily()?.name||''}</div>
      <div class="page-title">Calendar <button class="btn btn-primary btn-sm" onclick="showPicker(null)">+ Add</button></div>

// Swipe navigation for calendar
(function initCalSwipe(){
  let tx=0, ty=0;
  document.addEventListener('touchstart',e=>{
    const pg=document.getElementById('page-calendar');
    if(!pg?.classList.contains('active'))return;
    // Ignore touches that start on a button or input
    if(e.target.closest('button,input,select,textarea,.modal-bg'))return;
    tx=e.touches[0].clientX;
    ty=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    const pg=document.getElementById('page-calendar');
    if(!pg?.classList.contains('active'))return;
    if(e.target.closest('button,input,select,textarea,.modal-bg'))return;
    const dx=e.changedTouches[0].clientX-tx;
    const dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5)return; // too small or too vertical
    const vY=A.calDate.getFullYear(),vM=A.calDate.getMonth();
    if(A.calView==='month'){
      A.calDate=new Date(vY,vM+(dx<0?1:-1),1);
    } else if(A.calView==='week'){
      const d=new Date(A.calDate);d.setDate(d.getDate()+(dx<0?7:-7));A.calDate=d;
    } else if(A.calView==='year'){
      A.calDate=new Date(vY+(dx<0?1:-1),vM,1);
    }
    renderCal();
  },{passive:true});
})();

function calClick(d){
  const vY=A.calDate.getFullYear(),vM=A.calDate.getMonth();
  const dt=new Date(vY,vM,d);
  const applyFilters = e => {
    if(A.calFType!=='all' && e.type!==A.calFType) return false;
    if(A.calFMember!=='all' && !(e.participants||[]).includes(A.calFMember) && e.member_id!==A.calFMember) return false;
    return true;
  };
  const allEv=getEvents().filter(applyFilters);
  // Events that START on this day
  const startingHere=allEv.filter(e=>isSameDay(e.date,dt));
  // Multi-day events that SPAN through this day (started earlier)
  const spanning=allEv.filter(e=>{
    if(!e.end_date||isSameDay(e.date,dt))return false;
    const eS=new Date(e.date);eS.setHours(0,0,0,0);
    const eE=new Date(e.end_date);eE.setHours(23,59,59,0);
    return dt>eS&&dt<=eE;
  });
  const allOnDay=[...startingHere,...spanning].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(allOnDay.length)showDayModal(dt,allOnDay);
  else if(A.calFType==='all'&&A.calFMember==='all')showPicker(dt);
  else showDayModal(dt,[]); // filtered — show empty day modal not picker
}
window.calClick=calClick;

// ── AUTOCOMPLETE ──────────────────────────────────────────────────────────────
function buildAutocomplete(inputId, type, field) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  const vals = [...new Set(
    A.events
      .filter(e => e.type === type && e[field])
      .map(e => e[field])
      .filter(Boolean)
  )];
  if (!vals.length) return;
  let box = document.getElementById(inputId + '-ac');
  if (!box) {
    box = document.createElement('div');
    box.id = inputId + '-ac';
    box.style.cssText = `position:absolute;background:#fff;border:1px solid ${T.border};border-radius:9px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:999;width:100%;max-height:160px;overflow-y:auto;display:none`;
    inp.parentElement.style.position = 'relative';
    inp.parentElement.appendChild(box);
  }
  inp.addEventListener('input', () => {
    const q = inp.value.toLowerCase();
    const matches = vals.filter(v => v.toLowerCase().includes(q) && v !== inp.value);
    if (!matches.length || !q) { box.style.display = 'none'; return; }
    box.innerHTML = matches.slice(0,6).map(v =>
      `<div onclick="document.getElementById('${inputId}').value='${v.replace(/'/g,"\\'")}';document.getElementById('${inputId}-ac').style.display='none'" style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid ${T.border}44" onmouseover="this.style.background='${T.sageLight}'" onmouseout="this.style.background=''">${v}</div>`
    ).join('');
    box.style.display = 'block';
  });
  document.addEventListener('click', e => { if (!inp.contains(e.target)) box.style.display = 'none'; }, {once:false});
}

// toISO uses local date correctly - no UTC shift
function toISOLocal(d) {
  if (!d) return '';
  const x = new Date(d);
  const yr = x.getFullYear();
  const mo = String(x.getMonth()+1).padStart(2,'0');
  const dy = String(x.getDate()).padStart(2,'0');
  return `${yr}-${mo}-${dy}`;
}

function addChecklistRow(containerId, text='', done=false, idx=null) {
  const cont = document.getElementById(containerId);
  if (!cont) return;
  const i = idx !== null ? idx : cont.children.length;
  const div = document.createElement('div');
  div.draggable = true;
  div.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:default';
  div.dataset.container = containerId;
  div.innerHTML = `<span class="drag-handle" style="cursor:grab;color:#c8bfb0;font-size:14px;flex-shrink:0;user-select:none;touch-action:none">⠿</span><input type="checkbox" id="cl-${containerId}-${i}" ${done?'checked':''}><input class="inp" id="ct-${containerId}-${i}" value="${text}" style="flex:1;font-size:13px;padding:6px 10px" placeholder="Action item…"><button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:${T.muted};font-size:16px;cursor:pointer;padding:4px;flex-shrink:0">×</button>`;
  // Enter key → new row
  div.querySelector('input:not([type="checkbox"])').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addChecklistRow(containerId); setTimeout(()=>{const rows=document.getElementById(containerId).querySelectorAll('input:not([type="checkbox"])');rows[rows.length-1]?.focus();},50); }
  });
  // Drag-to-reorder (mouse)
  div.addEventListener('dragstart', e => {
    e.dataTransfer.effectAllowed = 'move';
    div.style.opacity = '0.4';
    cont._dragging = div;
  });
  div.addEventListener('dragend', () => { div.style.opacity = '1'; cont._dragging = null; });
  div.addEventListener('dragover', e => {
    e.preventDefault();
    const dragging = cont._dragging;
    if (!dragging || dragging === div) return;
    const rect = div.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    if (e.clientY < mid) cont.insertBefore(dragging, div);
    else cont.insertBefore(dragging, div.nextSibling);
  });
  // Touch drag support
  let touchY = 0, touchClone = null;
  div.querySelector('.drag-handle').addEventListener('touchstart', e => {
    touchY = e.touches[0].clientY;
    div.style.opacity = '0.5';
    cont._dragging = div;
  }, {passive:true});
  div.querySelector('.drag-handle').addEventListener('touchmove', e => {
    e.preventDefault();
    const y = e.touches[0].clientY;
    const els = Array.from(cont.children);
    els.forEach(el => {
      if (el === cont._dragging) return;
      const rect = el.getBoundingClientRect();
      if (y > rect.top && y < rect.bottom) {
        const mid = rect.top + rect.height / 2;
        if (y < mid) cont.insertBefore(cont._dragging, el);
        else cont.insertBefore(cont._dragging, el.nextSibling);
      }
    });
  }, {passive:false});
  div.querySelector('.drag-handle').addEventListener('touchend', () => {
    div.style.opacity = '1';
    cont._dragging = null;
  });
  cont.appendChild(div);
  return div;
}
window.addChecklistRow = addChecklistRow;

function getChecklist(containerId) {
  const cont = document.getElementById(containerId);
  if (!cont) return [];
  const items = [];
  cont.querySelectorAll('div').forEach(row => {
    const cb = row.querySelector('input[type="checkbox"]');

    if (inp?.value?.trim()) items.push({ text: inp.value.trim(), done: cb?.checked||false });
  });
  return items;
}

    </div>

  cont.appendChild(div);

  const inp = div.querySelector(`#au-${i}`);
  if (inp && prevDosages.length) {
    const box = document.createElement('div');

      item.onmousedown=()=>{ inp.value=d; box.style.display='none'; };
      box.appendChild(item);
    });
    inp.parentElement.appendChild(box);
    inp.addEventListener('focus',()=>{
      const q=inp.value.toLowerCase();
      const matches=prevDosages.filter(d=>d.toLowerCase().includes(q));
      if(matches.length){box.style.display='block';}
    });
    inp.addEventListener('input',()=>{
      const q=inp.value.toLowerCase();
      box.querySelectorAll('div').forEach((item,idx)=>{
        item.style.display=prevDosages[idx]?.toLowerCase().includes(q)?'block':'none';
      });
      box.style.display=q?'block':'none';
    });
    document.addEventListener('click',e=>{if(!inp.contains(e.target))box.style.display='none';},{once:false});
  }
}

// ── SYNC ACTIONS TO NOTEBOOK ──────────────────────────────────────────────────
async function syncActionsToNotebook(eventTitle, actions, eventId, memberId, eventDate) {
  if (!A.family || !actions?.length) return;
  let group = A.noteGroups.find(g => g.name === '📅 Calendar Actions');
  if (!group) {
    const { data } = await sb.from('note_groups').insert({
      family_id: A.family.id, name: '📅 Calendar Actions'
    }).select().single();
    if (data) { A.noteGroups.push(data); group = data; }
  }
  if (!group) return;
  let note = A.notes.find(n => n.group_id === group.id && n.title === eventTitle);
  // Find the saved event to get its ID for linking
  const linkedEvent = A.events.find(e=>e.id===eventId) || A.events.find(e=>e.title===eventTitle);
  const dateStr = eventDate ? fmt(eventDate) : (linkedEvent ? fmt(linkedEvent.date) : '');
  const eventRef = dateStr ? `📅 From calendar: ${eventTitle} · ${dateStr}` : `📅 From calendar: ${eventTitle}`;
  const noteData = {
    family_id: A.family.id,
    title: eventTitle,
    content: eventRef,
    color: '#f5e4c4',
    group_id: group.id,
    member_id: memberId || null,
    pinned: false,
    checklist: actions,
  };
  if (note) {
    const { data } = await sb.from('notes').update(noteData).eq('id', note.id).select().single();
    if (data) A.notes = A.notes.map(n => n.id === note.id ? data : n);
  } else {
    const { data } = await sb.from('notes').insert(noteData).select().single();
    if (data) A.notes.push(data);
  }
}

// ── WELLNESS PREFILL ──────────────────────────────────────────────────────────
function getLastWellness(memberId) {
  if (!memberId) return null;
  const logs = A.events
    .filter(e => e.type === 'wellness' && e.member_id === memberId)
    .sort((a,b) => new Date(b.date) - new Date(a.date));
  return logs[0] || null;
}

  // DATE/TIME DEFAULTS
  // Fix date offset: use local ISO, not UTC-shifted
  const nowD = new Date();
  const iDate = dateTs ? toISOLocal(new Date(dateTs)) : toISOLocal(nowD);
  const nowH = nowD.getHours();
  const defST = String(nowH).padStart(2,'0') + ':00';

  const evDate = source ? toISOLocal(new Date(source.date)) : '';

function syncEndDate(newStart) {
  const ed = document.getElementById('ef-enddate');
  const sd = document.getElementById('ef-date');
  if (!ed || !newStart) return;
  const oldStart = sd.dataset.prevDate || newStart;
  const oldEnd = ed.value;
  if (!oldEnd || oldEnd <= oldStart) {
    // Single-day or no end: end = new start
    ed.value = newStart;
  } else {
    // Multi-day: preserve duration
    const durMs = new Date(oldEnd) - new Date(oldStart);
    if (durMs > 86400000) {
      const newEnd = new Date(new Date(newStart).getTime() + durMs);
      ed.value = newEnd.toISOString().split('T')[0];
    } else {
      ed.value = newStart;
    }
  }
  sd.dataset.prevDate = newStart;
}

// ── SUPABASE WRITE WRAPPER ────────────────────────────────────────────────────
// Wraps any Supabase operation with timeout + one automatic retry
// Fixes silent failures caused by stale HTTP/2 connections
async function sbWrite(operation) {
  const TIMEOUT_MS = 10000;
  const withTimeout = (fn) => Promise.race([
    fn(),
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), TIMEOUT_MS))
  ]);
  try {
    return await withTimeout(operation);
  } catch (e) {
    const isConn = ['timeout','fetch','network','Failed to fetch'].some(k=>e.message?.includes(k));
    if (isConn) {
      toast('Connection issue — retrying…');
      await new Promise(r => setTimeout(r, 1000));
      // Force fresh Supabase client to break out of stale HTTP/2 connection pool
      try {
        sb = supabase.createClient(SB_URL, SB_KEY, {
          auth: { persistSession: true, autoRefreshToken: true },
          global: { fetch: (...a) => fetch(...a) }
        });
      } catch(_) {}
      try { return await withTimeout(operation); }
      catch (e2) {
        toast('Save failed. Please refresh and try again.', true);
        return { error: { message: e2.message }, data: null };
      }
    }
    throw e;
  }
}

// Build a local datetime ISO string that preserves user's intended time
function localDT(dateStr, timeStr) {
  if (!dateStr) return new Date().toISOString();
  const t = timeStr || '12:00';
  // Create date in local time, then get ISO with offset
  const [y,m,d] = dateStr.split('-').map(Number);
  const [h,mi] = t.split(':').map(Number);
  const local = new Date(y, m-1, d, h, mi, 0);
  // Format as ISO preserving local time
  const off = -local.getTimezoneOffset();
  const sign = off >= 0 ? '+' : '-';
  const pad = n => String(Math.abs(n)).padStart(2,'0');
  return `${dateStr}T${pad(h)}:${pad(mi)}:00${sign}${pad(Math.floor(Math.abs(off)/60))}:${pad(Math.abs(off)%60)}`;
}
window.localDT = localDT;

// ── GENERATE RECURRENCES ──────────────────────────────────────────────────────
function generateRecurrences(data) {
  const events = [data]; // first event is always included
  const rec = data.recurrence;
  if (!rec || rec === 'None') return events;

  const endType = data.recurrence_end_type || 'none';
  // For 'count': total occurrences INCLUDING the first = recurrence_end_count
  // For 'date': repeat until that date
  // For 'none': repeat for 1 year (52 weekly max)
  const totalCount = endType === 'count' ? Math.max(1, data.recurrence_end_count || 1) : 365;
  const endDateLimit = endType === 'date' && data.recurrence_end_date
    ? new Date(data.recurrence_end_date + 'T23:59:59')
    : endType === 'none'
    ? new Date('2099-12-31') // repeat forever — capped at 2099 for DB safety
    : null;

  const baseDate = new Date(data.date);
  const baseEnd = data.end_date ? new Date(data.end_date) : null;
  const duration = baseEnd ? (baseEnd - baseDate) : 0;

  let generated = 0; // count of additional events (not counting base)
  let current = new Date(baseDate);

  while (generated < totalCount - 1) { // -1 because base event counts as 1
    let next = new Date(current);
    if (rec === 'Monthly') next.setMonth(next.getMonth() + 1);
    else if (rec === 'Yearly') next.setFullYear(next.getFullYear() + 1);
    else if (rec === 'Daily') next.setDate(next.getDate() + 1);
    else if (rec === 'Weekly') next.setDate(next.getDate() + 7);
    else if (rec === 'Bi-weekly') next.setDate(next.getDate() + 14);
    else break; // unknown recurrence

    if (endDateLimit && next > endDateLimit) break;
    if (generated > 200) break; // hard safety cap

    const recEvent = {...data};
    recEvent.date = next.toISOString();
    if (baseEnd) recEvent.end_date = new Date(next.getTime() + duration).toISOString();
    delete recEvent.id; // ensure new ID on insert
    events.push(recEvent);
    current = next;
    generated++;
  }
  return events;
}

    <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:13px;color:${T.muted};margin-bottom:12px">
      <span>📅 ${dateStr}</span>
      ${ev.location?`<span>📍 ${ev.location}</span>`:''}
      ${ev.recurrence&&ev.recurrence!=='None'?`<span>🔁 ${ev.recurrence}${ev.recurrence_end_type==='count'?` · ${ev.recurrence_end_count}x`:ev.recurrence_end_type==='date'?` until ${fmt(ev.recurrence_end_date)}`:''}</span>`:''}

      ${ev.exercised?`<div style="background:${T.sageLight};border-radius:9px;padding:7px 11px;grid-column:span 2"><div style="font-size:10px;color:${T.sage};font-weight:700">🏃 Exercise</div><div style="font-size:13px;font-weight:700">${ev.activity} · ${ev.activity_mins} min</div></div>`:''}
    </div>`;
  }

  if (ev.doctor) body += `<div style="font-size:13px;color:${T.muted};margin-bottom:6px">👨‍⚕️ ${ev.doctor}${ev.specialty?' · '+ev.specialty:''}</div>`;

}

function delEv(id) {
  const ev = A.events.find(e=>e.id===id);
  if (!ev) return;
  // Check if there's an associated note in Calendar Actions
  const calActGrp = A.noteGroups.find(g=>g.name==='📅 Calendar Actions');
  const assocNote = calActGrp ? A.notes.find(n=>n.group_id===calActGrp.id&&n.title===(ev.title||ET[ev.type].label)) : null;
  const noteWarning = assocNote ? `<div style="font-size:12px;background:${T.honeyLight};border-radius:8px;padding:8px 10px;margin-bottom:14px;color:${T.honey};font-weight:600">⚠️ This event has action items in your Notebook. Deleting it will also remove that note.</div>` : '';
  showModal('Delete Entry', `
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:40px;margin-bottom:12px">🗑</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:8px">Delete this entry?</div>
      <div style="font-size:13px;color:${T.muted};margin-bottom:6px">"${ev.title||ET[ev.type].label}"</div>
      <div style="font-size:12px;color:${T.muted};margin-bottom:12px">📅 ${fmt(ev.date)}${ev.all_day||ev.type==='wellness'?'':' · '+(()=>{const x=new Date(ev.date);return x.getHours().toString().padStart(2,'0')+':'+x.getMinutes().toString().padStart(2,'0')})()} will be permanently removed.</div>
      ${noteWarning}
      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>

      </div>
    </div>`);
}
window.delEv = delEv;

async function confirmDelEv(id, noteId) {
  const {error} = await sb.from('events').delete().eq('id', id);
  if (error) { toast('Error deleting.', true); return; }
  A.events = A.events.filter(e=>e.id!==id);
  // Delete associated notebook note if exists
  if (noteId) {
    await sb.from('notes').delete().eq('id', noteId);
    A.notes = A.notes.filter(n=>n.id!==noteId);
  }
  closeModal(); toast('Entry deleted.');
  renderCal();
  if(A.calSearch || A.calFType!=='all' || A.calFMember!=='all') setTimeout(renderCalResults, 50);
}
window.confirmDelEv = confirmDelEv;



// ── NOTEBOOK ──────────────────────────────────────────────────────────────────
function renderNB(){
  const notes=getNotes(),groups=getGroups();
  const filtered=notes.filter(n=>{
    if(A.noteFGroup==='none'&&n.group_id)return false;
    if(A.noteFGroup!=='all'&&A.noteFGroup!=='none'&&n.group_id!==A.noteFGroup)return false;
    if(A.noteSearch){const q=A.noteSearch.toLowerCase();if(![n.title,n.content,...(n.tags||[]),...(n.checklist||[]).map(c=>c.text)].join(' ').toLowerCase().includes(q))return false;}
    return true;
  });
  const pinned=filtered.filter(n=>n.pinned),rest=filtered.filter(n=>!n.pinned);
  const nCard=n=>{
    const mem=getMem(n.member_id);
    const grp=groups.find(g=>g.id===n.group_id);
    const done=(n.checklist||[]).filter(c=>c.done).length,total=(n.checklist||[]).length;
    return`<div class="note-card" style="background:${n.color}" onclick="openNote('${n.id}')">
      ${n.pinned?'<div style="font-size:10px;margin-bottom:3px">📌</div>':''}
      <div style="font-weight:800;font-size:13px;color:${T.ink};margin-bottom:5px;line-height:1.3">${n.title||'Untitled'}</div>
      ${n.content?`<div style="font-size:12px;color:${T.muted};line-height:1.5;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px">${n.content}</div>`:''}
      ${total>0?`<div style="font-size:11px;color:${T.muted};margin-bottom:5px">✅ ${done}/${total}</div>`:''}
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
        ${grp?`<span style="font-size:10px;font-weight:700;background:rgba(255,255,255,.55);border-radius:99px;padding:2px 6px;color:${T.ink}">${grp.name}</span>`:''}
        ${mem?av(mem,16):''}
      </div>
    </div>`;
  };

  document.getElementById('page-notebook').innerHTML=`
    <div class="page-header">
      <div class="family-label">${getFamily()?.name||''}</div>
      <div class="page-title">Notebook <button class="btn btn-primary btn-sm" onclick="openNote(null)">+ Note</button></div>
    </div>
    <div style="padding:10px 16px 0">
      <input class="inp" id="nb-search-inp" placeholder="🔍  Search notes…" value="${A.noteSearch}"
        oninput="A.noteSearch=this.value;clearTimeout(A._nT);A._nT=setTimeout(()=>renderNB(),350)"
        onkeydown="if(event.key==='Enter'){clearTimeout(A._nT);renderNB();}" style="margin-bottom:10px">
      <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px">
        ${[{id:'all',name:'All'},{id:'none',name:'Uncategorized'},...groups].map(g=>`<button onclick="A.noteFGroup='${g.id}';renderNB()" style="padding:4px 12px;border-radius:99px;border:1.5px solid ${A.noteFGroup===g.id?T.sage:T.border};background:${A.noteFGroup===g.id?T.sage:'#fff'};color:${A.noteFGroup===g.id?'#fff':T.muted};font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0">${g.name}</button>`).join('')}
        <button onclick="openAddGroup()" style="padding:4px 12px;border-radius:99px;border:1.5px dashed ${T.border};background:${T.parchment};color:${T.muted};font-weight:700;font-size:12px;cursor:pointer;flex-shrink:0">+ Group</button>
      </div>
    </div>
    <div style="padding:10px 16px 0">
      ${pinned.length?`<div style="font-size:11px;font-weight:700;color:${T.muted};text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">📌 Pinned</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">${pinned.map(nCard).join('')}</div>`:''}
      ${rest.length?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${rest.map(nCard).join('')}</div>`:''}
      ${filtered.length===0?`<div style="text-align:center;color:${T.muted};padding:48px 0;font-size:14px">No notes yet ✍️</div>`:''}
    </div>`;
}

function addCLItem(text='', done=false){
  const cont=document.getElementById('ne-cl');
  if(!cont)return;
  const i=cont.children.length;
  const div=document.createElement('div');
  div.draggable=true;
  div.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px';
  div.innerHTML=`<span class="drag-handle" style="cursor:grab;color:#c8bfb0;font-size:14px;flex-shrink:0;user-select:none;touch-action:none">⠿</span><input type="checkbox" id="nc-${i}" ${done?'checked':''}><input class="inp" id="nt-${i}" value="${text}" style="flex:1;font-size:13px;padding:6px 10px" placeholder="Item…"><button onclick="this.parentElement.remove()" style="background:none;border:none;color:${T.muted};font-size:16px;cursor:pointer;padding:4px">×</button>`;
  const inp=div.querySelector('input:not([type="checkbox"])');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addCLItem();setTimeout(()=>{const rows=cont.querySelectorAll('input:not([type="checkbox"])');rows[rows.length-1]?.focus();},50);}});
  // Drag mouse
  div.addEventListener('dragstart',e=>{e.dataTransfer.effectAllowed='move';div.style.opacity='0.4';cont._dragging=div;});
  div.addEventListener('dragend',()=>{div.style.opacity='1';cont._dragging=null;});
  div.addEventListener('dragover',e=>{e.preventDefault();const d=cont._dragging;if(!d||d===div)return;const r=div.getBoundingClientRect();if(e.clientY<r.top+r.height/2)cont.insertBefore(d,div);else cont.insertBefore(d,div.nextSibling);});
  // Touch drag
  div.querySelector('.drag-handle').addEventListener('touchstart',e=>{div.style.opacity='0.5';cont._dragging=div;},{passive:true});
  div.querySelector('.drag-handle').addEventListener('touchmove',e=>{e.preventDefault();const y=e.touches[0].clientY;Array.from(cont.children).forEach(el=>{if(el===cont._dragging)return;const r=el.getBoundingClientRect();if(y>r.top&&y<r.bottom){if(y<r.top+r.height/2)cont.insertBefore(cont._dragging,el);else cont.insertBefore(cont._dragging,el.nextSibling);}});},{passive:false});
  div.querySelector('.drag-handle').addEventListener('touchend',()=>{div.style.opacity='1';cont._dragging=null;});
  cont.appendChild(div);
  if(!text)inp.focus();
  return div;
}
window.addCLItem=addCLItem;

async function saveNote(noteId){
  if(!A.family){toast('Set up your family first.',true);return;}
  const checklist=[];
  document.querySelectorAll('#ne-cl > div').forEach((row,i)=>{
    const cb=row.querySelector('input[type="checkbox"]');
    const inp=row.querySelector('input:not([type="checkbox"])');
    if(inp?.value?.trim())checklist.push({id:'c'+i,text:inp.value.trim(),done:cb?.checked||false});
  });
  const grpVal=document.getElementById('ne-grp')?.value;
  const data={
    family_id:A.family.id,
    title:document.getElementById('ne-t')?.value||'',
    content:document.getElementById('ne-c')?.value||'',
    color:document.getElementById('ne-col')?.value||NOTE_COLORS[0],
    group_id:grpVal&&grpVal!=='__new__'?grpVal:null,
    member_id:document.getElementById('ne-mem')?.value||null,
    pinned:document.getElementById('ne-pin')?.checked||false,
    checklist,
  };
  let res;
  if(noteId)res=await sb.from('notes').update(data).eq('id',noteId).select().single();
  else res=await sb.from('notes').insert(data).select().single();
  if(res.error){toast('Error saving note.',true);console.error(res.error);return;}
  const savedNote = res.data;
  if(noteId)A.notes=A.notes.map(n=>n.id===noteId?savedNote:n);
  else A.notes.push(savedNote);
  // If this is a Calendar Actions note, sync checklist back to the matching event
  const calActGroup=A.noteGroups.find(g=>g.name==='📅 Calendar Actions');
  if(calActGroup&&savedNote.group_id===calActGroup.id&&savedNote.checklist?.length){
    const matchEv=A.events.find(e=>e.title===savedNote.title&&e.actions?.length);
    if(matchEv){
      await sb.from('events').update({actions:savedNote.checklist}).eq('id',matchEv.id);
      A.events=A.events.map(e=>e.id===matchEv.id?{...e,actions:savedNote.checklist}:e);
    }
  }
  closeModal();toast(noteId?'Note updated!':'Note saved!');renderNB();
}
window.saveNote=saveNote;

async function delNote(id){
  if(!confirm('Delete this note?'))return;
  await sb.from('notes').delete().eq('id',id);
  A.notes=A.notes.filter(n=>n.id!==id);
  closeModal();toast('Note deleted.');renderNB();
}
window.delNote=delNote;

function exportMedsXLSX() {

  const lastsUntil = med => { const d=daysLeft(med); if(d===null)return '—'; const r=new Date(); r.setDate(r.getDate()+d); return fmt(r); };
  const totalOrder = dm.reduce((sum,m)=>sum+(parseInt(m.new_order_pkgs)||0)*(m.price_per_pkg||0),0);
  const grand = (totalOrder+(parseFloat(getFamily()?.transport_cost)||0)).toFixed(2);
  const memNames = med => getDM() && getMembers().filter(m=>(med.member_ids||[]).includes(m.id)).map(m=>m.name).join(', ');

    med.name, memNames(med), med.dose_per_day, med.units_per_pkg,

    lastsUntil(med), med.new_order_pkgs||0,
    med.new_order_pkgs?`${s}${((parseInt(med.new_order_pkgs)||0)*(med.price_per_pkg||0)).toFixed(2)}`:'—',

  ]);

    'In stock','Lasts until','New order (pkgs)',`Order cost (${s})`,'Last ordered'];
  const tableRows = [headers, ...rows, ['GRAND TOTAL','','','','','','','',`${s}${grand}`,'']];
  const html = `<html><head><meta charset="UTF-8"></head><body>
    <h2>${getFamily()?.name||''} — Medication Order — ${new Date().toLocaleDateString('en-GB')}</h2>
    <table border="1" cellpadding="5" cellspacing="0">
    ${tableRows.map((r,i)=>`<tr>${r.map(c=>`<${i===0?'th':'td'}>${c}</${i===0?'th':'td'}>`).join('')}</tr>`).join('')}
    </table></body></html>`;
  const blob = new Blob([html], {type:'application/vnd.ms-excel'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='kinship_meds_order.xls'; a.click();
  URL.revokeObjectURL(url);
  toast('Excel file downloaded! ✅');
}

  const header = ['Medication','Members','Dose/day','Units/pkg','Price/pkg','In stock','Lasts until','New order (pkgs)','Order cost','Updated until'];
  const rows = dm.map(med => {

function copyOrderToClipboard() {
  const dm = A.dailyMeds.filter(m => m.new_order_pkgs && parseInt(m.new_order_pkgs) > 0);

  const s = symC();

  const grand = (totalOrder+(parseFloat(A.family?.transport_cost)||0)).toFixed(2);
  const lines = ['📦 MEDICATION ORDER — ' + (A.family?.name||'') + '\n' + new Date().toLocaleDateString('en-GB'), ''];
  dm.forEach(m => {
    const memNames = A.members.filter(mem=>(m.member_ids||[]).includes(mem.id)).map(mem=>mem.name).join(', ');
    lines.push(`• ${m.name} × ${m.new_order_pkgs} pkg — ${s}${((parseInt(m.new_order_pkgs)||0)*(m.price_per_pkg||0)).toFixed(2)}${memNames?' ('+memNames+')':''}`);

// ── INSIGHT CHARTS ────────────────────────────────────────────────────────────
function renderInsightCharts(logs, containerId) {
  const cont = document.getElementById(containerId || 'insights-charts');
  if (!cont) return;

  // Sort logs by date
  const sorted = [...logs].sort((a,b)=>new Date(a.date)-new Date(b.date));

  // Metrics to chart: [key, label, unit, colour, goal]
  // Get selected member's data for reference values
  const selMem = A.insightsMember!=='all' ? getMembers().find(m=>m.id===A.insightsMember) : null;
  const memAge = selMem?.age || null;
  const avgWeight = logs.filter(l=>l.member_id===selMem?.id&&l.weight).map(l=>l.weight);
  const latestKg = avgWeight.length ? avgWeight[avgWeight.length-1] : null;
  // Hydration reference: ~35ml per kg bodyweight, min 1.5L, max 3.5L
  const hydRef = latestKg ? Math.min(3.5, Math.max(1.5, latestKg * 0.035)).toFixed(1) : 1.8;
  const metrics = [
    ['weight', 'Weight', 'kg', T.sage, null,
      memAge ? (memAge<12?'Reference: healthy range varies by age & height':memAge<18?'Teens: BMI 18.5–24.9 range':'Adults: BMI 18.5–24.9 range') : null],
    ['sleep',  'Sleep',  'h',  T.sky,  8,
      memAge ? (memAge<6?'Ages 3–5: 10–13h recommended':memAge<12?'Ages 6–12: 9–12h recommended':memAge<18?'Teens: 8–10h recommended':'Adults: 7–9h recommended') : 'Recommended: 7–9h for adults'],
    ['energy', 'Energy', '%',  T.honey, 70,
      'Aim for 70%+ — low energy often links to sleep or hydration'],
    ['hydration','Hydration','L', T.plum, parseFloat(hydRef),
      latestKg ? `~${hydRef}L recommended for ${latestKg}kg (35ml/kg)` : 'Recommended: 1.8–2.5L per day'],
  ];

  const charts = metrics.map(([key, label, unit, colour, goal]) => {
    const points = sorted
      .map(e=>({d:new Date(e.date), v:parseFloat(e[key])}))
      .filter(p=>!isNaN(p.v)&&p.v>0);
    if (points.length < 2) return '';

    const vals = points.map(p=>p.v);
    const minV = Math.min(...vals);
    const maxV = Math.max(...vals);
    const range = maxV - minV || 1;
    const padded_min = minV - range*0.15;
    const padded_max = maxV + range*0.15;
    const padded_range = padded_max - padded_min;

    const W = 320, H = 100, PL = 36, PR = 12, PT = 10, PB = 24;
    const cW = W - PL - PR, cH = H - PT - PB;
    const xScale = i => PL + (i / (points.length-1)) * cW;
    const yScale = v => PT + cH - ((v - padded_min) / padded_range) * cH;

    // Line path
    const pathD = points.map((p,i)=>`${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScale(p.v).toFixed(1)}`).join(' ');
    // Fill path
    const fillD = pathD + ` L${xScale(points.length-1).toFixed(1)},${(PT+cH).toFixed(1)} L${PL},${(PT+cH).toFixed(1)} Z`;

    // X-axis labels (max 5)
    const step = Math.max(1, Math.floor(points.length/5));
    const xLabels = points.filter((_,i)=>i%step===0||i===points.length-1).map((p,_,arr)=>{
      const idx = points.indexOf(p);
      const d = p.d;
      const label = `${d.getDate()}/${d.getMonth()+1}`;
      return `<text x="${xScale(idx)}" y="${H-6}" text-anchor="middle" font-size="9" fill="${T.muted}">${label}</text>`;
    }).join('');

    // Y-axis labels (min, max)
    const yMin = `<text x="${PL-4}" y="${(PT+cH+4).toFixed(1)}" text-anchor="end" font-size="9" fill="${T.muted}">${minV.toFixed(1)}</text>`;
    const yMax = `<text x="${PL-4}" y="${(PT+8).toFixed(1)}" text-anchor="end" font-size="9" fill="${T.muted}">${maxV.toFixed(1)}</text>`;

    // Goal line
    const goalLine = (goal && goal >= padded_min && goal <= padded_max)
      ? `<line x1="${PL}" y1="${yScale(goal).toFixed(1)}" x2="${W-PR}" y2="${yScale(goal).toFixed(1)}" stroke="${colour}" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
         <text x="${W-PR-2}" y="${(yScale(goal)-3).toFixed(1)}" text-anchor="end" font-size="8" fill="${colour}" opacity="0.7">goal</text>`
      : '';

    // Data points
    const dots = points.map((p,i)=>`<circle cx="${xScale(i).toFixed(1)}" cy="${yScale(p.v).toFixed(1)}" r="3" fill="${colour}" stroke="#fff" stroke-width="1.5"/>`).join('');

    // Latest value badge
    const latest = points[points.length-1];
    const latestStr = key==='hydration' ? latest.v.toFixed(1) : (Number.isInteger(latest.v)?latest.v:latest.v.toFixed(1));

    // Trend arrow
    const first = points[0].v, last_v = latest.v;
    const trendUp = last_v > first;
    const trendSame = Math.abs(last_v-first)<0.05*first;
    const trendStr = trendSame ? '→' : (trendUp ? '↑' : '↓');
    const trendCol = key==='weight'?(trendUp?T.rose:T.sage):(trendUp?T.sage:T.rose);

    const [mKey,mLabel,mUnit,mCol,,mRef] = [key,label,unit,colour,null,metrics.find(m=>m[0]===key)?.[5]];
    return `<div class="card" style="padding:12px 14px;margin-bottom:10px;overflow:hidden">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px">
        <div style="font-weight:700;font-size:13px;color:${T.ink}">${label}</div>
        <div style="display:flex;align-items:baseline;gap:6px">
          <span style="font-size:18px;font-weight:800;color:${colour}">${latestStr}${unit}</span>
          <span style="font-size:13px;font-weight:700;color:${trendCol}">${trendStr}</span>
        </div>
      </div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible">
        <!-- Grid lines -->
        <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+cH}" stroke="${T.border}" stroke-width="0.5"/>
        <line x1="${PL}" y1="${PT+cH}" x2="${W-PR}" y2="${PT+cH}" stroke="${T.border}" stroke-width="0.5"/>
        ${goalLine}
        <!-- Fill -->
        <path d="${fillD}" fill="${colour}" opacity="0.08"/>
        <!-- Line -->
        <path d="${pathD}" fill="none" stroke="${colour}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Dots -->
        ${dots}
        <!-- Labels -->
        ${yMin}${yMax}${xLabels}
      </svg>
      ${metrics.find(m=>m[0]===key)?.[5]?`<div style="font-size:10px;color:${T.muted};margin-top:4px;padding-top:4px;border-top:1px solid ${T.border}">ℹ️ ${metrics.find(m=>m[0]===key)[5]}</div>`:''}
    </div>`;
  }).join('');

  cont.innerHTML = `
    <div style="font-family:'Playfair Display',serif;font-size:17px;color:${T.ink};margin-bottom:12px">Trends</div>
    ${charts || '<div style="color:'+T.muted+';font-size:13px">Not enough data for charts yet.</div>'}`;
}
window.renderInsightCharts = renderInsightCharts;

function genInsights(wLogs,hEvs){
  const ins=[];
  const avg=(arr,k)=>{const v=arr.map(e=>parseFloat(e[k])).filter(v=>!isNaN(v)&&v>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;};
  getMembers().forEach(m=>{
    const logs=wLogs.filter(e=>e.member_id===m.id);
    if(logs.length<2)return;
    const aSlp=avg(logs,'sleep'),aHy=avg(logs,'hydration'),aEn=avg(logs,'energy');
    const exPct=logs.filter(l=>l.exercised).length/logs.length;
    if(aSlp&&aSlp<7)ins.push({icon:'😴',title:`${m.name} is sleeping less than recommended`,body:`Average sleep is ${aSlp.toFixed(1)}h — the goal is 7–9h. Even 30 extra minutes can improve mood and energy significantly!`,color:T.honey});
    if(aHy&&aHy<1500)ins.push({icon:'💧',title:`${m.name} could drink more water`,body:`Average hydration is ${Math.round(aHy)}ml/day. Aim for 1800ml+. A visible water bottle nearby is a surprisingly effective habit.`,color:T.sky});
    if(exPct<0.3&&logs.length>=3)ins.push({icon:'🏃',title:`${m.name}'s exercise consistency has room to grow`,body:`Only ${Math.round(exPct*100)}% of logged days included exercise. Even a 15-minute walk makes a real difference!`,color:T.sage});
    if(aEn&&aEn<55)ins.push({icon:'⚡',title:`${m.name}'s energy levels seem low`,body:`Average energy is ${Math.round(aEn)}%. This often links to sleep or hydration — two quick wins if improved together.`,color:T.plum});
  });
  const ill=hEvs.filter(e=>e.appt_type==='Illness');
  if(ill.length>=2)ins.push({icon:'🤒',title:`${ill.length} illness events recorded`,body:`Worth checking if these are recurring for the same person. Vitamin D, zinc, and consistent sleep all support immunity.`,color:T.rose});
  if(!ins.length)ins.push({icon:'🌟',title:'Looking great overall!',body:"No major concerns in your family's wellness data. Keep logging consistently for richer, more personalised insights over time.",color:T.sage});
  return ins;
}

async function sendMealChat(){
  const inp=document.getElementById('meal-chat-inp');
  const msgs=document.getElementById('meal-chat-messages');
  if(!inp||!msgs||!inp.value.trim())return;
  const q=inp.value.trim(); inp.value='';
  msgs.innerHTML+=`<div style="text-align:right;margin-bottom:8px"><div style="display:inline-block;background:${T.sage};color:#fff;border-radius:12px 12px 2px 12px;padding:8px 12px;font-size:13px;max-width:85%">${q}</div></div>`;
  msgs.innerHTML+=`<div id="meal-typing" style="margin-bottom:8px"><div style="display:inline-block;background:${T.parchment};border-radius:12px 12px 12px 2px;padding:8px 12px;font-size:13px;color:${T.muted}">Thinking…</div></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  try{
    const famCtx=`Family: ${getFamily()?.name||'Unknown'}. Members: ${getMembers().map(m=>m.name+(m.age?' (age '+m.age+')':'')).join(', ')}.`;
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:600,
        system:`You are a friendly family meal assistant for the Kinship app. ${famCtx} Give practical, healthy meal ideas and simple recipes. Keep responses concise and friendly.`,
        messages:[{role:'user',content:q}]
      })
    });
    const d=await resp.json();
    const reply=d.content?.[0]?.text||'Sorry, I could not get a response.';
    document.getElementById('meal-typing')?.remove();
    msgs.innerHTML+=`<div style="margin-bottom:8px"><div style="display:inline-block;background:${T.parchment};border-radius:12px 12px 12px 2px;padding:8px 12px;font-size:13px;max-width:90%;line-height:1.5">${reply.replace(/\n/g,'<br>')}</div></div>`;
    msgs.scrollTop=msgs.scrollHeight;
  }catch(e){document.getElementById('meal-typing')?.remove();toast('Chat error: '+e.message,true);}
}
window.sendMealChat=sendMealChat;

async function saveProduct(){

    name,

}

  A.family=data;
  document.getElementById('fam-badge').textContent=data.name;

}
window.saveFamName=saveFamName;

async function addFamTag(){
  const inp=document.getElementById('s-tag');
  const val=inp?.value?.trim().toLowerCase();
  if(!val||!A.family){return;}
  const tags=[...new Set([...(A.family.tags||[]),val])];

  if(error){toast('Error saving tag.',true);console.error(error);return;}

}

async function removeTag(tag){

  const tags=(A.family.tags||[]).filter(t=>t!==tag);

  if(error){toast('Error removing tag.',true);return;}
  A.family=data;renderSettings();
}
window.removeTag=removeTag;

window.openEditMem=openEditMem;

async function saveEditMem(id){
  if(!A.family)return;
  const name=document.getElementById('em-n')?.value?.trim();
  if(!name){toast('Name is required.',true);return;}
  const data={
    name,
    role:document.getElementById('em-r')?.value||'',
    age:parseInt(document.getElementById('em-a')?.value)||null,
    gender:document.getElementById('em-g')?.value||null,
    email:document.getElementById('em-e')?.value?.trim()||null,
    color:document.getElementById('em-c')?.value||MCOLORS[0],
    avatar:name[0].toUpperCase(),
  };
  const{data:result,error}=await sb.from('family_members').update(data).eq('id',id).select().single();
  if(error){toast('Error saving: '+error.message,true);console.error(error);return;}
  A.members=A.members.map(m=>m.id===id?result:m);
  closeModal();toast('Member updated! ✅');renderSettings();
}
window.saveEditMem=saveEditMem;

async function delMem(id){
  if(!confirm('Remove this family member?'))return;
  const mem=A.members.find(m=>m.id===id);
  const{error}=await sb.from('family_members').delete().eq('id',id);
  if(error){toast('Error removing: '+error.message,true);return;}
  A.members=A.members.filter(m=>m.id!==id);
  // Also delete any invitations for this member's email
  if(mem?.email && A.family){
    await sb.from('invitations').delete().eq('family_id',A.family.id).ilike('email',mem.email);
  }
  closeModal();toast('Member removed.');renderSettings();
}
window.delMem=delMem;

    </div>
    <div class="form-row"><label class="lbl">Email (for invite)</label><input class="inp" type="email" id="nm-e" placeholder="their@email.com"></div>

      <span class="lbl" style="margin:0">Colour:</span>
      ${MCOLORS.map((c,i)=>`<div onclick="document.querySelectorAll('.mcs').forEach(s=>s.style.outline='none');this.style.outline='3px solid ${T.ink}';document.getElementById('nm-c').value='${c}'" class="mcs" style="width:26px;height:26px;border-radius:50%;background:${c};cursor:pointer;outline:${i===0?'3px solid '+T.ink:'none'};outline-offset:2px"></div>`).join('')}

window.openAddMem=openAddMem;

async function saveMem(){
  if(!A.family)return;
  const name=document.getElementById('nm-n')?.value?.trim();
  if(!name){toast('Please add a name.',true);return;}
  const email=document.getElementById('nm-e')?.value?.trim()||null;
  const data={
    family_id:A.family.id,name,
    role:document.getElementById('nm-r')?.value||'',
    age:parseInt(document.getElementById('nm-a')?.value)||null,
    gender:document.getElementById('nm-g')?.value||null,
    email,color:document.getElementById('nm-c')?.value||MCOLORS[0],
    avatar:name[0].toUpperCase(),is_owner:false,
  };
  const{data:result,error}=await sb.from('family_members').insert(data).select().single();
  if(error){toast('Error adding member.',true);console.error(error);return;}
  A.members.push(result);
  closeModal();toast(`${name} added! ✅`);renderSettings();
  // If email provided, show invite option in a non-blocking way
  if(email){
    setTimeout(()=>{
      showModal('Member Added ✅',`<div style="text-align:center;padding:10px 0">
        <div style="font-size:40px;margin-bottom:10px">👤</div>
        <div style="font-weight:700;margin-bottom:8px">${name} has been added!</div>
        <div style="font-size:13px;color:${T.muted};margin-bottom:16px">Would you like to generate an invite link to share with them?</div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Not now</button>
          <button class="btn btn-primary" style="flex:1" onclick="closeModal();sendInvite('${email}','${result.id}')">🔗 Generate invite</button>
        </div></div>`);
    },300);
  }
}
window.saveMem=saveMem;

async function sendInvite(email,memberId){
  if(!A.family)return;
  // Check for existing invitation first — reuse if exists
  const{data:existing}=await sb.from('invitations').select('*').eq('family_id',A.family.id).ilike('email',email).maybeSingle();
  let data=existing, error=null;
  if(!existing){
    const res=await sb.from('invitations').insert({family_id:A.family.id,email}).select().single();
    data=res.data; error=res.error;
  }
  if(error){console.error('Invite error',error);}
  const token=data?.token||'demo';
  const link=`${window.location.origin}${window.location.pathname}?invite=${token}`;
  showModal('Invite Link Ready 🔗',`
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:42px;margin-bottom:12px">📧</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:8px">Invite link generated!</div>
      <div style="font-size:13px;color:${T.muted};margin-bottom:14px">Share this link with <b>${email}</b> to give them access to <b>${A.family.name}</b>.</div>
      <div style="background:${T.parchment};border-radius:9px;padding:10px;font-size:11px;word-break:break-all;color:${T.ink};margin-bottom:14px;text-align:left">${link}</div>
      <button class="btn btn-primary btn-full" onclick="navigator.clipboard?.writeText('${link}').then(()=>toast('Link copied! 📋'))">📋 Copy invite link</button>
      <div style="font-size:11px;color:${T.muted};margin-top:12px">Copy this link and send it manually to ${email}. They will use it to join ${A.family.name}. Email sending will be added in a future update.</div>
    </div>`);
}
window.sendInvite=sendInvite;

  if (!_sampleMode && !A.family) { return; } // no family to switch to
  _sampleMode = !_sampleMode;
  const btn = document.getElementById('sample-btn');
  if (btn) {
    btn.style.background = _sampleMode ? 'var(--honey-light)' : 'var(--sage)';

  if (badge) badge.textContent = _sampleMode ? 'Sample Family' : (A.family?.name||'');
  renderPage();
}

function showAuth(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('root').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

async function handleSession(session){
  try{
    if(session?.user){
      document.getElementById('auth-screen').style.display='none';
      await initApp(session.user);
    } else {
      showAuth();
    }
  }catch(e){
    console.error('Session error',e);
    // Log error but don't block the user — show as toast if app is loaded
    console.error('App error:', e.message, e.stack);
    const root = document.getElementById('root');
    if(root && root.style.display !== 'none') {
      // App is loaded — just show error as toast
      toast('Error: ' + e.message + ' — try refreshing.', true);
    } else {
      // App not loaded yet — show error screen
      const ls = document.getElementById('loading-screen');
      if(ls) {
        ls.style.display='flex';
        ls.innerHTML=`<div style="text-align:center;padding:40px;font-family:sans-serif;max-width:380px">
          <div style="font-size:32px;margin-bottom:12px">⚠️</div>
          <div style="font-size:15px;font-weight:700;margin-bottom:8px">Something went wrong</div>
          <div style="font-size:12px;color:#7a7060;margin-bottom:4px;background:#f5f2ed;padding:8px;border-radius:8px;word-break:break-all">${e.message}</div>
          <div style="font-size:11px;color:#9e9488;margin-bottom:16px">Open browser console (F12) for details</div>
          <button onclick="location.reload()" style="padding:10px 24px;background:#5e8b62;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;margin-right:8px">Reload</button>
          <button onclick="showAuth()" style="padding:10px 24px;background:#ede8df;color:#7a7060;border:none;border-radius:10px;font-size:14px;cursor:pointer">Sign in again</button>
        </div>`;
      } else { showAuth(); }
    }
  }
}

async function boot(){
  if(!sb){
    document.getElementById('loading-screen').innerHTML=`<div style="text-align:center;padding:40px;font-family:sans-serif">
      <div style="font-size:40px;margin-bottom:16px">⚠️</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">Failed to connect</div>
      <div style="font-size:13px;color:#7a7060;margin-bottom:16px">Could not initialise the database connection.</div>
      <button onclick="location.reload()" style="padding:10px 20px;background:#5e8b62;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer">Retry</button>
    </div>`;
    return;
  }
  // Immediately check existing session — avoids blank screen on first load
  const { data:{ session } } = await sb.auth.getSession();
  await handleSession(session);
  // Also listen for future auth changes (login/logout)
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='PASSWORD_RECOVERY') {
      // User clicked the reset link — show password update form instead of app
      showPasswordReset();
      return;
    }
    if(event==='SIGNED_IN') await handleSession(session);
    if(event==='SIGNED_OUT') showAuth();
  });
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);
else boot();
</script>
