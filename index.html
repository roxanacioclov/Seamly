// Enhanced sbWrite with keepalive
async function sbWrite(operation) {
  const TIMEOUT_MS = 5000;
  const withTimeout = (fn) => Promise.race([fn(), new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), TIMEOUT_MS))]);
  try {
    return await withTimeout(operation);
  } catch (e) {
    const isConn = ['timeout','fetch','network','Failed to fetch'].some(k=>e.message?.includes(k));
    if (isConn) {
      toast('Connection issue — retrying…');
      await new Promise(r => setTimeout(r, 100));
      try { sb = supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession: true, autoRefreshToken: true } }); } catch(_) {}
      try { return await withTimeout(operation); }
      catch (e2) { toast('Save failed. Please refresh and try again.', true); return { error: { message: e2.message }, data: null }; }
    }
    throw e;
  }
}

function toISOLocal(d){if(!d)return'';const x=new Date(d);const yr=x.getFullYear();const mo=String(x.getMonth()+1).padStart(2,'0');const da=String(x.getDate()).padStart(2,'0');const h=String(x.getHours()).padStart(2,'0');const m=String(x.getMinutes()).padStart(2,'0');return `${yr}-${mo}-${da}T${h}:${m}`;}

async function doSignup(){
  const email=document.getElementById('a-email').value.trim();
  const pass=document.getElementById('a-pass').value;
  const pass2=document.getElementById('a-pass2').value;
  const msg=document.getElementById('a-msg');
  msg.textContent='';
  if(!email||!pass||!pass2){msg.textContent='All fields required.';return;}
  if(pass.length<6){msg.textContent='Password must be at least 6 characters.';return;}
  if(pass!==pass2){msg.textContent='Passwords do not match.';return;}
  const{error}=await sb.auth.signUp({email,password:pass});
  if(error){msg.textContent=error.message;msg.style.color=T.rose;}
  else{msg.textContent='Check email to confirm!';msg.style.color=T.sage;}
}

async function doLogin(){
  const email=document.getElementById('a-email').value.trim();
  const pass=document.getElementById('a-pass').value;
  const msg=document.getElementById('a-msg');
  msg.textContent='';
  if(!email||!pass){msg.textContent='Email and password required.';return;}
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){msg.textContent=error.message;msg.style.color=T.rose;return;}
  await new Promise(r=>setTimeout(r,500));
  await handleSession((await sb.auth.getSession()).data.session);
}

async function doPasswordReset(){
  const pass=document.getElementById('a-newpass').value;
  const pass2=document.getElementById('a-newpass2').value;
  const msg=document.getElementById('a-msg');
  msg.textContent='';
  if(pass.length<6){msg.textContent='Password must be at least 6 characters.';msg.style.color=T.rose;return;}
  if(pass!==pass2){msg.textContent='Passwords do not match.';msg.style.color=T.rose;return;}
  const{error}=await sb.auth.updateUser({password:pass});
  if(error){msg.textContent=error.message;msg.style.color=T.rose;return;}
  msg.textContent='Password updated!';msg.style.color=T.sage;
  await new Promise(r=>setTimeout(r,1000));
  await handleSession((await sb.auth.getSession()).data.session);
}

async function handleSession(session){
  if(!session){showAuth();return;}
  A.user=session.user;
  try{await sb.rpc('claim_family_membership');}catch(e){console.error('Claim error',e);}
  await loadAll();
  if(!localStorage.getItem('ob-done')){renderOB();}
  else{goTo('home');}
}

async function doSignOut(){
  try{
    Object.keys(localStorage).forEach(k=>{
      if(k.startsWith('sb-')||k.includes('supabase'))localStorage.removeItem(k);
    });
  }catch(_){}
  location.reload();
}

function goTo(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  A.page=page;
  if(page==='calendar')renderCal();
  else if(page==='notebook')renderNB();
  else if(page==='home')renderHome();
  else if(page==='meals')renderMeals();
  else if(page==='inventory')renderInventory();
  else if(page==='insights')renderInsights();
  else if(page==='settings')renderSettings();
}

function renderHome(){
  const now=new Date();
  const today=todayD();
  const fmtT=d=>{if(!d)return'';const x=new Date(d);return x.getHours().toString().padStart(2,'0')+':'+x.getMinutes().toString().padStart(2,'0');};
  const todayEvs=getEvents().filter(e=>isSameDay(e.date,today)&&e.type!=='wellness'&&!e.completed_at&&(e.all_day||new Date(e.date)>=now)).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const weekStart=new Date(today);weekStart.setDate(today.getDate()-((today.getDay()+6)%7));
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);weekEnd.setHours(23,59,59);
  const upcomingEvs=getEvents().filter(e=>{const d=new Date(e.date);d.setHours(0,0,0,0);return d>today&&d<=weekEnd&&e.type!=='wellness'&&!e.completed_at;}).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const pendingEvs=getEvents().filter(e=>!e.completed_at&&(e.type==='task'||e.actions?.some(a=>!a.done))&&new Date(e.date)<=now).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const MEALS_GN=['🛒 Shopping','📅 Weekly Menu','🌅 Breakfast','☀️ Lunch','🌙 Dinner','🍎 Snacks'];
  const calActGrpId=getGroups().find(g=>g.name==='📅 Calendar Actions')?.id;
  const mealsGrpIds=getGroups().filter(g=>MEALS_GN.includes(g.name)).map(g=>g.id);
  const pendingNotes=getNotes().filter(n=>n.checklist?.some(c=>!c.done)&&n.group_id!==calActGrpId&&!mealsGrpIds.includes(n.group_id));
  const memColor=e=>{if(!e||e.participants_all_family||(!e.member_id&&!(e.participants?.length))||(e.participants?.length>1))return'#9e9488';const mid=e.member_id||(e.participants?.[0]);const m=getMembers().find(m=>m.id===mid);return m?m.color:'#9e9488';};
  const evCard=(e,showDate)=>`<div onclick="viewEv('${e.id}')" style="display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;background:#fff;border-left:3px solid ${memColor(e)};margin-bottom:6px;cursor:pointer">
    <span style="font-size:16px">${ET[e.type].icon}</span>
    <div style="flex:1;min-width:0">
      <div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.title||ET[e.type].label}</div>
      <div style="font-size:11px;color:${T.muted}">${showDate?fmt(e.date)+' · ':''}${e.all_day?'All day':fmtT(e.date)}${e.location?' · '+e.location:''}</div>
    </div>
  </div>`;
  document.getElementById('page-home').innerHTML=`
    <div class="page-header">
      <div class="family-label">${getFamily()?.name||''}</div>
      <div class="page-title" style="font-size:20px">Good ${now.getHours()<12?'morning':now.getHours()<18?'afternoon':'evening'} 👋</div>
    </div>
    <div style="padding:12px 16px;padding-bottom:80px">
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <button onclick="showPicker(new Date())" style="flex:1;padding:12px;border-radius:12px;background:${T.sage};color:#fff;border:none;font-weight:700;font-size:13px;cursor:pointer">+ Calendar Entry</button>
        <button onclick="goTo('meals')" style="flex:1;padding:12px;border-radius:12px;background:${T.honeyLight};color:${T.honey};border:1px solid ${T.honey}44;font-weight:700;font-size:13px;cursor:pointer">🛒 Shopping</button>
      </div>
      <div style="font-weight:800;font-size:14px;color:${T.ink};margin-bottom:8px">Today — ${fmt(today)}</div>
      ${todayEvs.length?todayEvs.map(e=>evCard(e,false)).join(''):`<div style="font-size:13px;color:${T.muted};padding:8px 0 12px;font-style:italic">No upcoming events today.</div>`}
      ${upcomingEvs.length?`<div style="font-weight:800;font-size:14px;color:${T.ink};margin:14px 0 8px">This week</div>${upcomingEvs.map(e=>evCard(e,true)).join('')}`:''}
      ${pendingEvs.length||pendingNotes.length?`<div style="font-weight:800;font-size:14px;color:${T.ink};margin:14px 0 8px">Pending actions</div>${pendingEvs.map(e=>evCard(e,true)).join('')}${pendingNotes.map(n=>`<div onclick="openNote('${n.id}')" style="display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;background:#fff;border-left:3px solid ${T.honey};margin-bottom:6px;cursor:pointer"><span style="font-size:16px">📋</span><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">${n.title}</div><div style="font-size:11px;color:${T.muted}">${n.checklist.filter(c=>!c.done).length} items pending</div></div></div>`).join('')}`:''}

async function saveEv(type,id,recInfo){
  if(isSampleMode()){toast('Sample mode: create family to save.',true);return;}
  const data={type,title:'',date:iDate(),all_day:false,tags:[],recurrence:'None',...(id?A.events.find(e=>e.id===id):null)};
  if(type==='event'){
    data.title=document.getElementById('ef-title')?.value||'';
    data.time=document.getElementById('ef-time')?.value||'';
    if(data.time){const[h,m]=data.time.split(':');const d=new Date(data.date);d.setHours(parseInt(h),parseInt(m));data.date=d.toISOString();}
    data.location=document.getElementById('ef-loc')?.value||'';
    data.description=document.getElementById('ef-desc')?.value||'';
    data.all_day=document.getElementById('ef-allday')?.checked||false;
    data.tags=(document.getElementById('ef-tags')?.value||'').split(',').filter(t=>t.trim());
    data.recurrence=document.getElementById('ef-rec')?.value||'None';
  }else if(type==='task'){
    data.title=document.getElementById('ef-title')?.value||'Event';
    data.date=document.getElementById('ef-date')?.value+'T09:00';
    data.actions=[];
    const actsDiv=document.getElementById('tasks-list');
    if(actsDiv)actsDiv.querySelectorAll('input').forEach((inp,i)=>{data.actions.push({text:inp.value,done:false});});
    data.tags=(document.getElementById('ef-tags')?.value||'').split(',').filter(t=>t.trim());
    data.recurrence=document.getElementById('ef-rec')?.value||'None';
  }else if(type==='appointment'){
    data.title=document.getElementById('ef-title')?.value||'Appointment';
    data.date=document.getElementById('ef-date')?.value+'T09:00';
    const[h,m]=(document.getElementById('ef-time')?.value||'09:00').split(':');data.date=new Date(data.date).toISOString();
    data.location=document.getElementById('ef-loc')?.value||'';
    data.appt_type=document.getElementById('ef-atype')?.value||'medical';
    data.tags=(document.getElementById('ef-tags')?.value||'').split(',').filter(t=>t.trim());
  }else if(type==='wellness'){
    const mem=A.members.find(m=>m.id===document.getElementById('ef-mem')?.value);
    const wKg=document.getElementById('ef-wt')?.value;
    const wMood=document.getElementById('ef-mood')?.value;
    const moodIcon=(wMood&&wMood!=='')?wMood.split(' ')[0]:'';
    const kgStr=wKg?' · '+wKg+'kg':'';
    const moodPart=moodIcon?' '+moodIcon:'';
    data.title=mem?`${mem.name}${kgStr}${moodPart} – Wellness Log`:'Wellness Log';
    data.date=document.getElementById('ef-date')?.value+'T09:00';
    data.member_id=mem?.id||null;
    data.weight=parseFloat(document.getElementById('ef-wt')?.value)||null;
    data.height=parseFloat(document.getElementById('ef-ht')?.value)||null;
    data.hydration=parseFloat(document.getElementById('ef-hyd')?.value)||null;
    data.exercised=document.getElementById('ef-ex')?.checked||false;
    data.activity=document.getElementById('ef-act')?.value||null;
    data.activity_mins=parseInt(document.getElementById('ef-actm')?.value)||null;
    data.mood=wMood||null;
    data.energy=parseInt(document.getElementById('ef-en')?.value)||null;
    data.sleep=parseFloat(document.getElementById('ef-sl')?.value)||null;
    data.description=document.getElementById('ef-wcomment')?.value||null;
  }
  data.family_id=A.family.id;
  data.member_id=data.member_id||A.user.id;
  const cols=['title','type','date','all_day','location','description','time','appt_type','member_id','tags','recurrence','weight','height','hydration','exercised','activity','activity_mins','mood','energy','sleep','completed_at'];
  const cleanData={family_id:data.family_id,member_id:data.member_id};
  cols.forEach(c=>{if(c in data)cleanData[c]=data[c];});
  const{data:saved,error}=id
    ?await sbWrite(()=>sb.from('events').update(cleanData).eq('id',id).select().maybeSingle())
    :await sbWrite(()=>sb.from('events').insert(cleanData).select().single());
  if(error){toast('Error: '+error.message,true);return;}
  const savedFirst=saved||{};
  A.calDate=new Date(savedFirst.date);
  if(id){A.events=A.events.map(e=>e.id===id?{...e,...saved}:e);}
  else{A.events=[...A.events,saved];}
  if(type==='task'||data.actions?.length){await syncActionsToNotebook(saved);}
  closeModal();toast(id?'Updated':'Created');renderCal();if(A.page==='home')renderHome();
}

async function syncActionsToNotebook(ev){
  if(!ev.actions||!ev.actions.length)return;
  // Skip note creation for recurring tasks — notes will be created on due date (next batch)
  if(ev.recurrence&&ev.recurrence!=='None')return;
  const calGrp=A.noteGroups.find(g=>g.name==='📅 Calendar Actions');
  if(!calGrp){const{data:g}=await sbWrite(()=>sb.from('note_groups').insert({family_id:A.family.id,name:'📅 Calendar Actions'}).select().single());if(g)A.noteGroups.push(g);return;}
  const existing=A.notes.find(n=>n.group_id===calGrp.id&&n.title===ev.title);
  if(existing)return;
  const note={family_id:A.family.id,title:ev.title,content:`📅 Task due: ${fmt(ev.date)}`,color:T.honeyLight,group_id:calGrp.id,member_id:ev.member_id||null,pinned:false,checklist:ev.actions};
  const{data:n}=await sbWrite(()=>sb.from('notes').insert(note).select().single());
  if(n)A.notes.push(n);
}

function renderCal(){
  const vY=A.calDate.getFullYear();
  const vM=A.calDate.getMonth();
  const rawFirst=new Date(vY,vM,1).getDay();
  const mStart=(rawFirst+6)%7;
  const daysInMonth=new Date(vY,vM+1,0).getDate();
  const gridSize=Math.ceil((daysInMonth+mStart)/7)*7;
  const prevMonthDays=new Date(vY,vM,0).getDate();
  const cells=[];
  for(let i=0;i<gridSize;i++){
    let d,isOther=false;
    if(i<mStart){d=prevMonthDays-mStart+i+1;isOther=true;}
    else if(i>=mStart+daysInMonth){d=i-mStart-daysInMonth+1;isOther=true;}
    else{d=i-mStart+1;}
    cells.push({day:d,isOther,fullDate:new Date(vY,isOther&&i<mStart?vM-1:isOther?vM+1:vM,d)});
  }
  const selectedDate=A.calDate;
  selectedDate.setHours(0,0,0,0);
  const html=`
    <div class="page-header">
      <div class="family-label">${getFamily()?.name||''}</div>
      <div class="page-title">Calendar</div>
    </div>
    <div style="padding:10px 16px;background:#fff;border-bottom:1px solid ${T.border}">
      <div style="display:flex;gap:6px;justify-content:center;margin-bottom:10px">
        <button onclick="A.calView='month';renderCal()" class="tab ${A.calView==='month'?'active':''}" style="flex:1">Month</button>
        <button onclick="A.calView='week';renderCal()" class="tab ${A.calView==='week'?'active':''}" style="flex:1">Week</button>
        <button onclick="A.calView='year';renderCal()" class="tab ${A.calView==='year'?'active':''}" style="flex:1">Year</button>
      </div>
      <input class="inp" id="cal-search" placeholder="🔍 Search events…" value="${A.calSearch}" oninput="A.calSearch=this.value;clearTimeout(A.cst);A.cst=setTimeout(()=>renderCalResults(),300)" style="margin-bottom:10px">
      <div style="display:flex;gap:6px">
        <select class="sel" id="cal-ftype" onchange="A.calFType=this.value;renderCal()" style="flex:1"><option value="all">All types</option><option value="event">Event</option><option value="task">Task</option></select>
        <select class="sel" id="cal-fmember" onchange="A.calFMember=this.value;renderCal()" style="flex:1"><option value="all">All members</option>${A.members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:10px 16px;padding-bottom:100px">
      ${A.calView==='month'?renderCalMonth(cells,selectedDate):''}
      ${A.calView==='week'?renderCalWeek(selectedDate):''}
      ${A.calView==='year'?renderCalYear():''}
      ${A.calSearch?`<div id="cal-results" style="margin-top:20px"></div>`:''}
    </div>`;
  document.getElementById('page-calendar').innerHTML=html;
  document.getElementById('cal-ftype').value=A.calFType;
  document.getElementById('cal-fmember').value=A.calFMember;
  if(A.calSearch)renderCalResults();
}

function renderCalMonth(cells,selectedDate){
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const html=`<div style="font-size:18px;font-weight:700;color:${T.ink};margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
    <button onclick="A.calDate.setMonth(A.calDate.getMonth()-1);renderCal()" style="background:none;border:none;font-size:20px;cursor:pointer">◀</button>
    <span>${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][selectedDate.getMonth()]} ${selectedDate.getFullYear()}</span>
    <button onclick="A.calDate.setMonth(A.calDate.getMonth()+1);renderCal()" style="background:none;border:none;font-size:20px;cursor:pointer">▶</button>
  </div>`;
  const headerHtml=days.map(d=>`<div style="text-align:center;font-weight:700;font-size:12px;color:${T.muted};padding:8px">${d}</div>`).join('');
  const cellsHtml=cells.map(c=>{
    const evs=A.events.filter(e=>{
      if(!isSameDay(e.date,c.fullDate))return false;
      if(A.calFType!=='all'&&e.type!==A.calFType)return false;
      if(A.calFMember!=='all'&&e.member_id!==A.calFMember)return false;
      return true;
    });
    const dayEvs=evs.slice(0,2);
    const dayHtml=dayEvs.map((e)=>{
      const pc=A.members.find(m=>m.id===e.member_id)?.color||'#9e9488';
      return`<div onclick="event.stopPropagation();viewEv('${e.id}')" style="background:${pc};border-left:2px solid ${pc};margin:0 -2px 0 0;padding:1px 2px;font-size:9px;font-weight:700;color:#fff;line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer">${ET[e.type].icon} ${e.title||ET[e.type].label}</div>`;
    }).join('');
    return`<div onclick="showDayModal(${c.fullDate.getTime()})" style="background:${c.isOther?'#f5f2ed':'#fff'};border:1px solid ${T.border};padding:4px;cursor:pointer;min-height:60px;position:relative;${isSameDay(c.fullDate,selectedDate)?`background:${T.sage};`:''}">${c.isOther?'':'<div style="font-weight:700;color:'+(isSameDay(c.fullDate,selectedDate)?'#fff':T.ink)+'">'+ c.day+'</div>'}<div style="font-size:8px;line-height:1.2">${dayHtml}</div></div>`;
  }).join('');
  return html+`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:${T.border};padding:1px">${headerHtml}${cellsHtml}</div>`;
}

      <div class="form-row"><label class="lbl">Tags</label><input class="inp" id="ef-tags" value="${(source.tags||[]).join(', ')}" placeholder="urgent, …"></div>
      <div class="form-row"><label class="lbl">Recurrence</label><select class="sel" id="ef-rec"><option value="None">No repeat</option><option value="Daily">Daily</option><option value="Weekly">Weekly</option><option value="Monthly">Monthly</option></select></div>`;
  }else if(type==='wellness'){
    fields=`
      <div class="form-row"><label class="lbl">Family Member</label><select class="sel" id="ef-mem"><option value="">Select…</option>${A.members.map(m=>`<option value="${m.id}" ${source.member_id===m.id?'selected':''}>${m.name}</option>`).join('')}</select></div>
      <div class="form-row"><label class="lbl">Date</label><input class="inp" type="date" id="ef-date" value="${evDate}"></div>
      <div class="grid2">
        <div class="form-row" style="margin:0"><label class="lbl">Weight (kg)</label><input class="inp" type="number" id="ef-wt" placeholder="62.5" value="${source.weight||''}"></div>
        <div class="form-row" style="margin:0"><label class="lbl">Height (cm)</label><input class="inp" type="number" id="ef-ht" placeholder="170" value="${source.height||''}"></div>
      </div>
      <div class="grid2">
        <div class="form-row" style="margin:0"><label class="lbl">Sleep (hrs)</label><input class="inp" type="number" id="ef-sl" placeholder="8" step="0.5" value="${source.sleep||''}"></div>
        <div class="form-row" style="margin:0"><label class="lbl">Water (cups)</label><input class="inp" type="number" id="ef-hyd" placeholder="8" value="${source.hydration||''}"></div>
      </div>
      <div class="form-row"><label class="lbl">Mood</label><select class="sel" id="ef-mood"><option value="">Not tracked</option><option value="😄 Great" ${source.mood==='😄 Great'?'selected':''}>😄 Great</option><option value="🙂 Good" ${source.mood==='🙂 Good'?'selected':''}>🙂 Good</option><option value="😐 Okay" ${source.mood==='😐 Okay'?'selected':''}>😐 Okay</option><option value="😔 Tired" ${source.mood==='😔 Tired'?'selected':''}>😔 Tired</option></select></div>
      <div class="form-row"><label class="lbl">Energy (1-10)</label><input class="inp" type="number" id="ef-en" placeholder="7" min="1" max="10" value="${source.energy||''}"></div>
      <div class="form-row"><label class="lbl"><input type="checkbox" id="ef-ex" ${source.exercised?'checked':''}> Exercised today</label></div>
      <div class="form-row"><label class="lbl">Activity</label><input class="inp" id="ef-act" placeholder="e.g. walked, yoga" value="${source.activity||''}"></div>
      <div class="form-row"><label class="lbl">Duration (min)</label><input class="inp" type="number" id="ef-actm" placeholder="30" value="${source.activity_mins||''}"></div>
      <div class="form-row"><label class="lbl">Notes</label><textarea class="inp" id="ef-wcomment" placeholder="How did you feel?" style="height:60px;resize:vertical">${source.description||''}</textarea></div>`;
  }else if(type==='appointment'){
    fields=`
      <div class="form-row"><label class="lbl">Title</label><input class="inp" id="ef-title" value="${source.title||''}" placeholder="Doctor visit, dentist, …"></div>
      <div class="form-row"><label class="lbl">Date & Time</label><input class="inp" id="ef-date" type="datetime-local" value="${toISOLocal(source.date||new Date().toISOString())}"></div>
      <div class="form-row"><label class="lbl">Type</label><select class="sel" id="ef-atype"><option value="medical" ${source.appt_type==='medical'?'selected':''}>Medical</option><option value="dental" ${source.appt_type==='dental'?'selected':''}>Dental</option><option value="school" ${source.appt_type==='school'?'selected':''}>School</option><option value="other" ${source.appt_type==='other'?'selected':''}>Other</option></select></div>
      <div class="form-row"><label class="lbl">Location</label><input class="inp" id="ef-loc" value="${source.location||''}" placeholder="Where?"></div>`;
  }
  showModal(`${evId?'Edit':'New'} ${type}`, `${fields}<button class="btn btn-primary btn-full" onclick="saveEv('${type}','${evId||''}')">Save</button>`);

function viewEv(id){
  const ev=A.events.find(e=>e.id===id);
  if(!ev)return;
  const mem=getMem(ev.member_id);
  let body=`<div style="margin-bottom:12px"><div style="font-size:24px;margin-bottom:8px">${ET[ev.type].icon}</div><div style="font-weight:700;font-size:16px;color:${T.ink};margin-bottom:4px">${ev.title||ET[ev.type].label}</div>`;
  if(ev.recurrence&&ev.recurrence!=='None'){body+=`<span style="background:${T.skyLight};color:${T.sky};padding:2px 8px;border-radius:99px;font-weight:700;font-size:11px">🔁 Recurring · ${ev.recurrence}${ev.recurrence_end_type==='count'?` · ${ev.recurrence_end_count}x`:ev.recurrence_end_type==='date'?` until ${fmt(ev.recurrence_end_date)}`:''}  </span>`;}
  body+=`</div>`;
  if(ev.date){body+=`<div style="font-size:12px;color:${T.muted};margin-bottom:6px">📅 ${fmt(ev.date)}${ev.all_day||ev.type==='wellness'?'':' · '+(new Date(ev.date).getHours().toString().padStart(2,'0')+':'+new Date(ev.date).getMinutes().toString().padStart(2,'0'))}</div>`;}
  if(ev.location){body+=`<div style="font-size:12px;color:${T.muted};margin-bottom:6px">📍 ${ev.location}</div>`;}
  if(mem){body+=`<div style="font-size:12px;color:${T.muted};margin-bottom:12px">👤 ${mem.name}</div>`;}
  if(ev.description){body+=`<div style="font-size:12px;background:${T.parchment};padding:8px;border-radius:6px;margin-bottom:12px">${ev.description}</div>`;}
  if(ev.tags&&ev.tags.length){body+=`<div style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap">${ev.tags.map(t=>`<span style="background:${T.border};color:${T.muted};padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600">${t}</span>`).join('')}</div>`;}
  if(ev.actions&&ev.actions.length){body+=`<div style="margin-bottom:12px;background:#fff;border-radius:6px;padding:8px"><div style="font-weight:600;font-size:12px;color:${T.ink};margin-bottom:6px">Sub-items:</div><ul class="checklist" style="list-style:none;margin:0;padding:0">${ev.actions.map((a,i)=>`<li style="display:flex;gap:6px"><input type="checkbox" ${a.done?'checked':''} onchange="toggleActionItem('${id}',${i},this.checked)"style="cursor:pointer"><span style="flex:1;${a.done?'text-decoration:line-through;color:'+T.muted+';':''}font-size:12px">${a.text}</span></li>`).join('')}</ul></div>`;}
  if(ev.weight||ev.mood||ev.energy){body+=`<div style="background:#fff;border-radius:6px;padding:8px;margin-bottom:12px;font-size:12px"><div style="font-weight:600;margin-bottom:6px">Health Data</div>${ev.weight?`<div>Weight: ${ev.weight}kg</div>`:''} ${ev.mood?`<div>Mood: ${ev.mood}</div>`:''} ${ev.energy?`<div>Energy: ${ev.energy}/10</div>`:''}</div>`;}
  if(ev.completed_at){body+=`<div style="background:${T.sageLight};border-radius:9px;padding:8px 12px;font-size:12px;color:${T.sage};font-weight:600;margin-top:8px;text-align:center">✅ Completed ${fmt(ev.completed_at)} at ${(new Date(ev.completed_at)).toTimeString().slice(0,5)}</div>`;}else if(ev.type==='task'){body+=`<button class="btn btn-primary btn-full" style="background:${T.sageLight};color:${T.sage};font-weight:700;border:none;margin-top:8px" onclick="markEventDone('${ev.id}')">✅ Mark as done</button>`;}
  body+=`<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
    <button class="btn btn-primary" style="flex:1" onclick="_closeModalDOM();openEvForm('${ev.type}','${ev.id}',null)">✏️ Edit</button>
    <button class="btn btn-secondary" style="flex:1" onclick="duplicateEv('${ev.id}')">⧉ Duplicate</button>
    <button class="btn btn-danger" style="flex:1" onclick="delEv('${ev.id}')">🗑 Delete</button>
  </div>`;
  showModal(ET[ev.type].label, body);
}

async function markEventDone(id){
  const ts=new Date().toISOString();
  const{error}=await sb.from('events').update({completed_at:ts}).eq('id',id);
  if(error){toast('Error: '+error.message,true);return;}
  A.events=A.events.map(e=>e.id===id?{...e,completed_at:ts}:e);
  const calGrp=A.noteGroups.find(g=>g.name==='📅 Calendar Actions');
  if(calGrp){
    const ev=A.events.find(e=>e.id===id);
    const note=A.notes.find(n=>n.group_id===calGrp.id&&n.title===(ev?.title||''));
    if(note){
      await sb.from('notes').update({completed_at:ts}).eq('id',note.id);
      A.notes=A.notes.map(n=>n.id===note.id?{...n,completed_at:ts}:n);
    }
  }
  closeModal();toast('Marked as done ✅');renderCal();if(A.page==='home')renderHome();
}

async function toggleActionItem(evId,itemIdx,done){
  const ev=A.events.find(e=>e.id===evId);
  if(!ev||!ev.actions)return;
  ev.actions[itemIdx].done=done;
  await sb.from('events').update({actions:ev.actions}).eq('id',evId);
}

function duplicateEv(id){
  const ev=A.events.find(e=>e.id===id);
  if(ev){
    const newEv={...ev};delete newEv.id;delete newEv.created_at;
    A.events.push(newEv);
    saveEv(ev.type,null);
  }
}

function delEv(id){
  const ev=A.events.find(e=>e.id===id);
  if(!ev)return;
  const calActGrp=A.noteGroups.find(g=>g.name==='📅 Calendar Actions');
  const assocNote=calActGrp?A.notes.find(n=>n.group_id===calActGrp.id&&n.title===(ev.title||ET[ev.type].label)):null;
  const noteWarning=assocNote?`<div style="font-size:12px;background:${T.honeyLight};border-radius:8px;padding:8px 10px;margin-bottom:12px;color:${T.honey};font-weight:600">⚠️ The note in Calendar Actions will also be removed.</div>`:'';
  const isRecurring=ev.recurrence&&ev.recurrence!=='None';
  const recurringButtons=isRecurring?`
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-danger" onclick="confirmDelEv('${id}','${assocNote?.id||''}',false)">Delete this occurrence only</button>
      <button class="btn btn-danger" style="opacity:.8" onclick="confirmDelEv('${id}','${assocNote?.id||''}',true)">Delete all occurrences</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>`:
    `<div style="display:flex;gap:10px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" style="flex:1" onclick="confirmDelEv('${id}','${assocNote?.id||''}',false)">Delete</button>
    </div>`;
  showModal('Delete Entry',`
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:40px;margin-bottom:12px">🗑</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:6px">Delete this entry?</div>
      <div style="font-size:13px;color:${T.muted};margin-bottom:4px">"${ev.title||ET[ev.type].label}"</div>
      <div style="font-size:12px;color:${T.muted};margin-bottom:12px">📅 ${fmt(ev.date)}</div>
      ${isRecurring?`<div style="font-size:12px;background:${T.skyLight};border-radius:8px;padding:7px 10px;margin-bottom:12px;color:${T.sky};font-weight:600">🔁 This is part of a recurring series</div>`:''}
      ${noteWarning}
      ${recurringButtons}
    </div>`);
}

async function confirmDelEv(id,noteId,deleteAll){
  const ev=A.events.find(e=>e.id===id);
  let idsToDelete=[id];
  if(deleteAll&&ev?.recurrence&&ev.recurrence!=='None'){
    const siblings=A.events.filter(e=>e.id!==id&&e.title===ev.title&&e.type===ev.type&&e.recurrence===ev.recurrence);
    idsToDelete=[id,...siblings.map(e=>e.id)];
  }
  const{error}=await sb.from('events').delete().in('id',idsToDelete);
  if(error){toast('Error deleting.',true);return;}
  A.events=A.events.filter(e=>!idsToDelete.includes(e.id));
  if(noteId){
    await sb.from('notes').delete().eq('id',noteId);
    A.notes=A.notes.filter(n=>n.id!==noteId);
  }
  closeModal();toast(deleteAll&&idsToDelete.length>1?`${idsToDelete.length} occurrences deleted.`:'Entry deleted.');
  renderCal();
  if(A.calSearch||A.calFType!=='all'||A.calFMember!=='all')setTimeout(renderCalResults,50);
}

// ── NOTEBOOK ──
function renderNB(){
  const MEALS_GN=['🛒 Shopping','📅 Weekly Menu','🌅 Breakfast','☀️ Lunch','🌙 Dinner','🍎 Snacks'];
  const allGroups=getGroups();
  const groups=allGroups.filter(g=>!MEALS_GN.includes(g.name));
  const notes=getNotes().filter(n=>{
    const g=allGroups.find(x=>x.id===n.group_id);
    return !g||!MEALS_GN.includes(g.name);
  });
  const filtered=notes.filter(n=>{
    if(A.noteFGroup==='none'&&n.group_id)return false;
    if(A.noteFGroup!=='all'&&A.noteFGroup!=='none'&&n.group_id!==A.noteFGroup)return false;
    if(A.noteSearch){const q=A.noteSearch.toLowerCase();if(![n.title,n.content,...(n.tags||[]),...(n.checklist||[]).map(c=>c.text)].join(' ').toLowerCase().includes(q))return false;}
    return true;
  });
  const pinned=filtered.filter(n=>n.pinned),rest=filtered.filter(n=>!n.pinned);
  const nCard=n=>{
    const mem=getMem(n.member_id);
    const grp=groups.find(g=>g.id===n.group_id);
    const done=(n.checklist||[]).filter(c=>c.done).length,total=(n.checklist||[]).length;
    return`<div class="note-card" style="background:${n.color}" onclick="openNote('${n.id}')">
      ${n.pinned?'<div style="font-size:10px;margin-bottom:3px">📌</div>':''}
      ${n.completed_at?'<div style="font-size:10px;color:'+T.sage+';font-weight:700;margin-bottom:3px">✅ Done</div>':''}
      <div style="font-weight:800;font-size:13px;color:${T.ink};margin-bottom:5px;line-height:1.3">${n.title||'Untitled'}</div>
      ${n.content?`<div style="font-size:12px;color:${T.muted};line-height:1.5;overflow:hidden;max-height:60px;margin-bottom:6px">${n.content}</div>`:''}
      ${total>0?`<div style="font-size:11px;color:${T.muted};margin-bottom:5px">✅ ${done}/${total}</div>`:''}
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
        ${grp?`<span style="font-size:10px;font-weight:700;background:rgba(255,255,255,.55);border-radius:99px;padding:2px 6px;color:${T.ink}">${grp.name}</span>`:''}
        ${mem?av(mem,16):''}
      </div>
    </div>`;
  };
  document.getElementById('page-notebook').innerHTML=`
    <div class="page-header">
      <div class="family-label">${getFamily()?.name||''}</div>
      <div class="page-title">Notebook <button class="btn btn-primary btn-sm" onclick="openNote(null)">+ Note</button></div>
    </div>
    <div style="display:flex;height:calc(100vh - 128px);overflow:hidden">
      <div style="width:${A.nbRibbon?'148px':'44px'};min-width:${A.nbRibbon?'148px':'44px'};background:${T.parchment};border-right:1px solid ${T.border};display:flex;flex-direction:column;transition:width .2s;overflow:hidden;flex-shrink:0">
        <button onclick="A.nbRibbon=!A.nbRibbon;renderNB()" title="${A.nbRibbon?'Collapse':'Expand'}" style="background:none;border:none;padding:10px 12px;cursor:pointer;color:${T.muted};font-size:14px;text-align:center;border-bottom:1px solid ${T.border}">${A.nbRibbon?'◀':'▶'}</button>
        ${[{id:'all',name:'All Notes',ic:'📋'},{id:'none',name:'Uncategorized',ic:'📄'},...groups.map(g=>({id:g.id,name:g.name,ic:g.name.charAt(0)>'~'?g.name.charAt(0):'📁'}))].map(g=>`
        <button onclick="A.noteFGroup='${g.id}';renderNB()" title="${g.name}" style="display:flex;align-items:center;gap:8px;padding:10px ${A.nbRibbon?'12':'0'}px;border:none;border-left:3px solid ${A.noteFGroup===g.id?T.sage:'transparent'};background:${A.noteFGroup===g.id?T.sageLight:'transparent'};cursor:pointer;width:100%;font-size:12px;font-weight:${A.noteFGroup===g.id?700:500};color:${A.noteFGroup===g.id?T.sage:T.ink};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;justify-content:${A.nbRibbon?'flex-start':'center'}">
          <span style="font-size:15px;flex-shrink:0">${g.ic}</span>${A.nbRibbon?`<span style="overflow:hidden;text-overflow:ellipsis">${g.name}</span>`:''}
        </button>`).join('')}
        <div style="flex:1"></div>
        <button onclick="openAddGroup()" title="New group" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:none;background:none;cursor:pointer;color:${T.sage};font-size:12px;font-weight:700;border-top:1px solid ${T.border}">
          <span>＋</span>${A.nbRibbon?'<span>New group</span>':''}
        </button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:10px 12px;min-width:0">
        <input class="inp" id="nb-search-inp" placeholder="🔍 Search notes…" value="${A.noteSearch}"
          oninput="A.noteSearch=this.value;clearTimeout(A._nT);A._nT=setTimeout(()=>renderNB(),350)"
          onkeydown="if(event.key==='Enter'){clearTimeout(A._nT);renderNB();}" style="margin-bottom:10px;font-size:13px">
        <div class="note-grid">
          ${pinned.length?`<div style="font-size:10px;font-weight:700;color:${T.muted};text-transform:uppercase;margin-bottom:6px">📌 Pinned</div>${pinned.map(n=>nCard(n)).join('')}`:''}
          ${A.noteFGroup==='all'?
            groups.map(g=>{const gNotes=rest.filter(n=>n.group_id===g.id);if(!gNotes.length)return'';
              return `<div style="font-size:10px;font-weight:700;color:${T.muted};text-transform:uppercase;margin:10px 0 6px">${g.name}</div>${gNotes.map(n=>nCard(n)).join('')}`;}).join('')+
            (rest.filter(n=>!n.group_id).length?`<div style="font-size:10px;font-weight:700;color:${T.muted};text-transform:uppercase;margin:10px 0 6px">Uncategorized</div>${rest.filter(n=>!n.group_id).map(n=>nCard(n)).join('')}`:'')
            :rest.map(n=>nCard(n)).join('')}
          ${!filtered.length?`<div style="text-align:center;color:${T.muted};padding:48px 0;font-size:14px">No notes yet ✍️</div>`:''}
        </div>
      </div>
    </div>`;
}

function openAddGroup(){
  const modal=document.getElementById('modal-root');
  modal.innerHTML=`
    <div class="modal-sheet">
      <div class="modal-header">New Group</div>
      <div class="form-row"><label class="lbl">Group Name</label><input class="inp" id="ng-name" placeholder="e.g. 🍳 Recipes"></div>
      <div class="form-row"><label class="lbl">Color</label><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">${MCOLORS.map(c=>`<button onclick="document.getElementById('ng-color').value='${c}';document.querySelectorAll('#color-grid button').forEach(b=>b.style.opacity='0.4');this.style.opacity='1'" style="width:100%;aspect-ratio:1;border-radius:8px;background:${c};border:none;cursor:pointer;opacity:0.4"></button>`).join('')}</div><input id="ng-color" type="hidden" value="${MCOLORS[0]}"></div>
      <button class="btn btn-primary btn-full" onclick="addGroup(document.getElementById('ng-name').value,document.getElementById('ng-color').value)">Create</button>
    </div>`;
  modal.classList.add('active');
}

async function addGroup(name,color){
  if(!name){toast('Name required.',true);return;}
  if(isSampleMode()){A.noteGroups.push({id:'g'+ Date.now(),name,color});renderNB();closeModal();return;}
  const{data,error}=await sbWrite(()=>sb.from('note_groups').insert({family_id:A.family.id,name,color}).select().single());
  if(error){toast('Error: '+error.message,true);return;}
  A.noteGroups.push(data);
  closeModal();renderNB();toast('Group created!');
}

function openNote(noteId){
  startKeepAlive();
  const note=noteId?A.notes.find(n=>n.id===noteId):null;
  const groups=getGroups();
  const modal=document.getElementById('modal-root');
  modal.innerHTML=`
    <div class="modal-sheet">
      <div class="modal-header">${noteId?'Edit Note':'New Note'}</div>
      <div class="form-row"><label class="lbl">Title</label><input class="inp" id="n-title" value="${note?.title||''}" placeholder="Note title"></div>
      <div class="form-row"><label class="lbl">Group</label><select class="sel" id="n-group"><option value="">Uncategorized</option>${groups.filter(g=>!['🛒 Shopping','📅 Weekly Menu','🌅 Breakfast','☀️ Lunch','🌙 Dinner','🍎 Snacks'].includes(g.name)).map(g=>`<option value="${g.id}" ${note?.group_id===g.id?'selected':''}>${g.name}</option>`).join('')}</select></div>
      <div class="form-row"><label class="lbl">Color</label><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">${MCOLORS.map(c=>`<button onclick="document.getElementById('n-color').value='${c}';document.querySelectorAll('[data-color-btn]').forEach(b=>b.style.opacity='0.4');this.style.opacity='1'" data-color-btn style="width:100%;aspect-ratio:1;border-radius:8px;background:${c};border:2px solid transparent;cursor:pointer;opacity:${note?.color===c?'1':'0.4'}"></button>`).join('')}</div><input id="n-color" type="hidden" value="${note?.color||MCOLORS[0]}"></div>
      <div class="form-row"><label class="lbl">Content</label><textarea class="inp" id="n-content" placeholder="Write here…" style="resize:vertical;height:120px">${note?.content||''}</textarea></div>
      <div class="form-row"><label class="lbl">Checklist Items</label><div id="cl-items" style="display:flex;flex-direction:column;gap:6px">${(note?.checklist||[]).map((item,i)=>`<div style="display:flex;gap:6px"><input type="checkbox" ${item.done?'checked':''} style="cursor:pointer"><input class="inp" type="text" value="${item.text}" placeholder="Item" style="flex:1"></div>`).join('')}</div><button class="btn btn-secondary btn-sm" onclick="document.getElementById('cl-items').innerHTML+='<div style=\"display:flex;gap:6px\"><input type=\"checkbox\" style=\"cursor:pointer\"><input class=\"inp\" type=\"text\" placeholder=\"Item\" style=\"flex:1\"></div>'" style="margin-top:6px">+ Add Item</button></div>
      <div class="form-row"><label class="lbl"><input type="checkbox" id="n-pinned" ${note?.pinned?'checked':''}> Pin this note</label></div>
      ${noteId&&(()=>{const _n=A.notes.find(x=>x.id===noteId);const _cg=A.noteGroups.find(g=>g.name==='📅 Calendar Actions');return _n&&_n.group_id===_cg?.id&&!_n.completed_at;})()
        ?`<button class="btn btn-full" style="background:${T.sageLight};color:${T.sage};font-weight:700;border:1px solid ${T.sageMid};border-radius:9px;padding:10px;margin-bottom:8px;cursor:pointer" onclick="markNoteDone('${noteId}')">✅ Mark as done</button>`:''}
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" style="flex:1" onclick="saveNote('${noteId||''}')">Save</button>
        ${noteId?`<button class="btn btn-danger" onclick="delNote('${noteId}')">🗑</button>`:''}
      </div>`;
  modal.classList.add('active');
}

async function markNoteDone(id){
  const ts=new Date().toISOString();
  const{error}=await sb.from('notes').update({completed_at:ts}).eq('id',id);
  if(error){toast('Error: '+error.message,true);return;}
  A.notes=A.notes.map(n=>n.id===id?{...n,completed_at:ts}:n);
  const note=A.notes.find(n=>n.id===id);
  if(note){
    const ev=A.events.find(e=>e.title===note.title&&(e.type==='task'||e.actions?.length));
    if(ev){
      await sb.from('events').update({completed_at:ts}).eq('id',ev.id);
      A.events=A.events.map(e=>e.id===ev.id?{...e,completed_at:ts}:e);
    }
  }
  closeModal();toast('Marked as done ✅');renderNB();if(A.page==='home')renderHome();
}

async function saveNote(noteId){
  if(isSampleMode()){
    const existing=noteId?A.notes.find(n=>n.id===noteId):null;
    const note={
      id:existing?.id||'n'+Date.now(),
      family_id:'sample',
      title:document.getElementById('n-title').value||'Untitled',
      content:document.getElementById('n-content').value||'',
      color:document.getElementById('n-color').value||MCOLORS[0],
      group_id:document.getElementById('n-group').value||null,
      pinned:document.getElementById('n-pinned').checked||false,
      checklist:[],
      tags:[]
    };
    document.getElementById('cl-items').querySelectorAll('input[type="text"]').forEach((inp,i)=>{
      note.checklist.push({text:inp.value,done:document.getElementById('cl-items').querySelectorAll('input[type="checkbox"]')[i]?.checked||false});
    });
    if(existing){A.notes=A.notes.map(n=>n.id===noteId?note:n);}
    else{A.notes.push(note);}
    closeModal();renderNB();toast(noteId?'Updated':'Created');
    return;
  }
  const note={
    family_id:A.family.id,
    title:document.getElementById('n-title').value||'Untitled',
    content:document.getElementById('n-content').value||'',
    color:document.getElementById('n-color').value||MCOLORS[0],
    group_id:document.getElementById('n-group').value||null,
    pinned:document.getElementById('n-pinned').checked||false,
    checklist:[],
    tags:[]
  };
  document.getElementById('cl-items').querySelectorAll('input[type="text"]').forEach((inp,i)=>{
    note.checklist.push({text:inp.value,done:document.getElementById('cl-items').querySelectorAll('input[type="checkbox"]')[i]?.checked||false});
  });
  const{data,error}=noteId
    ?await sbWrite(()=>sb.from('notes').update(note).eq('id',noteId).select().single())
    :await sbWrite(()=>sb.from('notes').insert(note).select().single());
  if(error){toast('Error: '+error.message,true);return;}
  if(noteId){A.notes=A.notes.map(n=>n.id===noteId?data:n);}
  else{A.notes.push(data);}
  closeModal();renderNB();toast(noteId?'Updated':'Created');
}

async function delNote(id){
  if(!confirm('Delete this note?'))return;
  if(isSampleMode()){A.notes=A.notes.filter(n=>n.id!==id);renderNB();closeModal();return;}
  const{error}=await sb.from('notes').delete().eq('id',id);
  if(error){toast('Error: '+error.message,true);return;}
  A.notes=A.notes.filter(n=>n.id!==id);
  closeModal();renderNB();toast('Deleted');
}

function openMedForm(){

  modal.innerHTML=`

      <div class="modal-header">Add Treatment</div>

      <button class="btn btn-primary btn-full" onclick="saveMed()">Add</button>

async function saveMed(){
  const med={name:document.getElementById('m-name').value,dosage:document.getElementById('m-dosage').value,frequency:document.getElementById('m-freq').value,expires:document.getElementById('m-exp').value,family_id:A.family.id};

  if(isSampleMode()){A.occMeds.push({...med,id:'m'+Date.now()});closeModal();renderInventory();return;}

  if(error){toast('Error: '+error.message,true);return;}
  A.occMeds.push(data);closeModal();renderInventory();toast('Added!');
}

function openProductForm(){
  const modal=document.getElementById('modal-root');
  modal.innerHTML=`
    <div class="modal-sheet">
      <div class="modal-header">Add Product</div>
      <div class="form-row"><label class="lbl">Product Name</label><input class="inp" id="p-name" placeholder="e.g. Milk"></div>
      <div class="form-row"><label class="lbl">Category</label><input class="inp" id="p-cat" placeholder="e.g. Dairy"></div>

async function saveProduct(){
  const p={name:document.getElementById('p-name').value,category:document.getElementById('p-cat').value,stock:parseInt(document.getElementById('p-stock').value),cost:parseFloat(document.getElementById('p-cost').value),expiry:document.getElementById('p-exp').value};

  if(!A.family.inventory_products)A.family.inventory_products=[];
  A.family.inventory_products.push(p);
  if(!isSampleMode()){await sbWrite(()=>sb.from('families').update({inventory_products:A.family.inventory_products}).eq('id',A.family.id));}
  closeModal();renderInventory();toast('Product added!');
}

function renderInsights(){
  const memId=A.members[0]?.id;
  const wellness=A.events.filter(e=>e.type==='wellness'&&e.member_id===memId);
  const weights=wellness.filter(e=>e.weight).map(e=>({date:e.date,value:e.weight})).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const moods=wellness.filter(e=>e.mood).slice(-7);
  document.getElementById('page-insights').innerHTML=`
    <div class="page-header">
      <div class="family-label">${getFamily()?.name||''}</div>
      <div class="page-title">Insights</div>
    </div>
    <select class="sel" onchange="A.insightsMember=this.value;renderInsights()" style="margin:12px 16px 0">
      <option value="">All members</option>
      ${A.members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}
    </select>
    <div style="padding:12px 16px;padding-bottom:100px">
      ${weights.length?`<div class="chart-container"><div style="font-weight:700;margin-bottom:8px">📈 Weight Trend</div><div style="font-size:12px;color:${T.muted}">${weights.length} entries</div><div style="font-size:11px;margin-top:6px">${weights.map(w=>`<div>${fmt(w.date)}: ${w.value}kg</div>`).join('')}</div></div>`:''}
      ${moods.length?`<div class="chart-container"><div style="font-weight:700;margin-bottom:8px">😊 Recent Moods</div>${moods.map(e=>`<div style="font-size:13px;margin-bottom:4px">${fmt(e.date)}: ${e.mood}</div>`).join('')}</div>`:''}
      ${wellness.length===0?`<div style="color:${T.muted};text-align:center;padding:30px 0">No wellness data yet. Add entries in the Calendar!</div>`:''}
    </div>`;
}

async function updateFamilyName(){
  const name=document.getElementById('fam-name').value.trim();
  if(!name){toast('Name required.',true);return;}
  if(isSampleMode()){A.family.name=name;renderSettings();return;}
  const{error}=await sb.from('families').update({name}).eq('id',A.family.id);
  if(error){toast('Error: '+error.message,true);return;}
  A.family.name=name;
  toast('Updated!');
}

function addMemberForm(){
  showModal('Add Member',`
    <div class="form-row"><label class="lbl">Name</label><input class="inp" id="mem-name" placeholder="Member name"></div>
    <div class="form-row"><label class="lbl">Color</label><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">${MCOLORS.map(c=>`<button onclick="document.getElementById('mem-color').value='${c}'" style="width:100%;aspect-ratio:1;border-radius:8px;background:${c};border:none;cursor:pointer"></button>`).join('')}</div><input id="mem-color" type="hidden" value="${MCOLORS[0]}"></div>
    <button class="btn btn-primary btn-full" onclick="addMember(document.getElementById('mem-name').value,document.getElementById('mem-color').value)">Add</button>`);
}

async function addMember(name,color){
  if(!name){toast('Name required.',true);return;}
  const member={family_id:A.family.id,name,color};
  if(isSampleMode()){A.members.push({...member,id:'m'+Date.now(),created_at:new Date().toISOString()});closeModal();renderSettings();return;}
  const{data,error}=await sbWrite(()=>sb.from('family_members').insert(member).select().single());
  if(error){toast('Error: '+error.message,true);return;}
  A.members.push(data);
  closeModal();renderSettings();toast('Member added!');
}

async function removeMember(id){
  if(!confirm('Remove this member?'))return;
  if(isSampleMode()){A.members=A.members.filter(m=>m.id!==id);renderSettings();return;}
  await sbWrite(()=>sb.from('family_members').delete().eq('id',id));
  A.members=A.members.filter(m=>m.id!==id);
  renderSettings();toast('Member removed');
}

// ── MODAL & NAVIGATION ──
function showModal(title,body){
  startKeepAlive();
  const modal=document.getElementById('modal-root');
  modal.innerHTML=`<div class="modal-sheet">
    <div class="modal-header">
      ${title}
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    ${body}
  </div>`;
  modal.classList.add('active');
}

function _closeModalDOM(){
  const modal=document.getElementById('modal-root');
  modal.classList.remove('active');
}

function closeModal(){
  _closeModalDOM();
  stopKeepAlive();
}

window.addEventListener('popstate',()=>{
  if(history.state?.modalOpen){closeModal();}
});
