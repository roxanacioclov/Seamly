    </div>`;
  }

  if (ev.doctor) body += `<div style="font-size:13px;color:${T.muted};margin-bottom:6px">👨‍⚕️ ${ev.doctor}${ev.specialty?' · '+ev.specialty:''}</div>`;
  if (ev.cost) body += `<div style="font-size:13px;color:${T.muted};margin-bottom:6px">💰 ${ev.cost} ${ev.cost_currency||''}</div>`;
  if (ev.symptoms) body += `<div style="background:${T.roseLight};border-radius:9px;padding:8px 11px;font-size:13px;margin-bottom:8px"><b>Symptoms:</b> ${ev.symptoms}</div>`;
  if (ev.cure) body += `<div style="background:${T.sageLight};border-radius:9px;padding:8px 11px;font-size:13px;margin-bottom:8px"><b>Cure:</b> ${ev.cure}</div>`;
  if (ev.considerations) body += `<div style="background:${T.parchment};border-radius:9px;padding:8px 11px;font-size:13px;margin-bottom:8px"><b>Considerations:</b> ${ev.considerations}</div>`;
  if (ev.recommended_by) body += `<div style="font-size:13px;color:${T.muted};margin-bottom:6px">👨‍⚕️ Prescribed by: ${ev.recommended_by}</div>`;

  if (ev.administration?.length) {
    body += `<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:${T.muted};margin-bottom:5px">ADMINISTRATION</div>`;
    ev.administration.forEach(r => {
      body += `<div style="background:${T.parchment};border-radius:8px;padding:6px 10px;font-size:13px;margin-bottom:4px">${r.units} — ${r.timing.join(', ')}</div>`;
    });
    body += '</div>';
  }

  if (allMembers || ev.participants?.length) {
    body += `<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:${T.muted};margin-bottom:5px">PARTICIPANTS</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${allMembers?`<div style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600">👨‍👩‍👧‍👦 Entire Family</div>`:''}
        ${(ev.participants||[]).map(pid=>{const m=getMem(pid);return m?`<div style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600">${av(m,22)} ${m.name}</div>`:''}).join('')}
      </div></div>`;
  }

  if (ev.actions?.length) {
    body += `<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:${T.muted};margin-bottom:5px">ACTIONS</div>`;
    ev.actions.forEach((a, idx) => {
      body += `<div style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px">
        <input type="checkbox" id="ev-action-cb-${idx}"
          ${a.done ? 'checked' : ''}
          ${isSampleMode() ? 'disabled' : ''}
          onchange="toggleEvAction('${ev.id}',${idx},this.checked)"
          style="width:16px;height:16px;flex-shrink:0;cursor:pointer;accent-color:${T.sage}">
        <span id="ev-action-lbl-${idx}"
          style="text-decoration:${a.done?'line-through':'none'};color:${a.done?T.muted:T.ink}">
          ${a.text}
        </span>
      </div>`;
    });
    body += '</div>';
  }

  if (ev.description) body += `<div style="background:${T.parchment};border-radius:9px;padding:9px 11px;font-size:13px;line-height:1.5;margin-bottom:10px">${ev.description}</div>`;
  if (ev.tags?.length) body += `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">${ev.tags.map(t=>`<span class="chip" style="background:${T.parchment};color:${T.muted}">${t}</span>`).join('')}</div>`;
  if (ev.attachment_urls?.length) {
    body += `<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:${T.muted};margin-bottom:5px">ATTACHMENTS</div>`;
    ev.attachment_urls.forEach(url => {
      body += `<a href="${url}" target="_blank" style="display:flex;align-items:center;gap:7px;font-size:13px;color:${T.sky};margin-bottom:4px;text-decoration:none">📎 ${url.split('/').pop()}</a>`;
    });
    body += '</div>';
  }

  if(isSampleMode()){
    body += `<div style="background:${T.honeyLight};border-radius:9px;padding:10px;text-align:center;font-size:12px;color:${T.honey};font-weight:600;margin-top:8px">📋 Sample mode — read only</div>`;
  } else {
    // Series badge — shown when this event is part of a recurring series
    if(ev.series_id){
      const seriesCount=A.events.filter(e=>e.series_id===ev.series_id).length;
      body += `<div style="display:inline-flex;align-items:center;gap:6px;background:${T.skyLight};color:${T.sky};border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;margin-bottom:10px">🔁 Part of a recurring series (${seriesCount} occurrences)</div>`;
    }
    // Mark as complete — only for Tasks that have no action items defined.
    // Tasks WITH actions complete automatically when all actions are ticked.
    if (ev.type === 'task' && (!ev.actions || ev.actions.length === 0)) {
      const isComplete = !!ev.completed_at;
      body += `<button class="btn btn-full" style="margin-bottom:10px;background:${isComplete?T.parchment:T.sageLight};color:${isComplete?T.muted:T.sage};border:1.5px solid ${isComplete?T.border:T.sageMid};font-size:13px;font-weight:700" onclick="markEvComplete('${ev.id}')">
        ${isComplete ? '↩ Mark as incomplete' : '✅ Mark as complete'}
      </button>`;
    }
    // Edit button: if series event, show choice; otherwise open form directly
    const editCall = ev.series_id
      ? `showRecurrenceEditChoice('${ev.id}')`
      : `_closeModalDOM();openEvForm('${ev.type}','${ev.id}',null)`;
    body += `<div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
      <button class="btn btn-primary" style="flex:1" onclick="${editCall}">✏️ Edit</button>
      <button class="btn btn-secondary" style="flex:1" onclick="duplicateEv('${ev.id}')">⧉ Duplicate</button>
      <button class="btn btn-danger" style="flex:1" onclick="delEv('${ev.id}')">🗑 Delete</button>
    </div>`;
  }

  showModal(cfg.label, body);
}
window.viewEv = viewEv;

function delEv(id) {
  const ev = A.events.find(e=>e.id===id);
  if (!ev) return;
  // If this event is part of a recurring series, offer options
  if(ev.series_id){
    const seriesCount=A.events.filter(e=>e.series_id===ev.series_id).length;
    showModal('Delete Entry',`
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:40px;margin-bottom:12px">🗑</div>
        <div style="font-weight:700;font-size:16px;margin-bottom:8px">Delete recurring event?</div>
        <div style="font-size:13px;color:${T.muted};margin-bottom:16px">"${ev.title||ET[ev.type].label}" is part of a recurring series (${seriesCount} occurrences).</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="btn btn-secondary btn-full" onclick="confirmDelEv('${id}')">Delete this occurrence only</button>
          <button class="btn btn-danger btn-full" onclick="deleteEntireSeries('${ev.series_id}')">Delete all ${seriesCount} occurrences</button>
          <button class="btn btn-secondary btn-full" onclick="closeModal()">Cancel</button>
        </div>
      </div>`);
    return;
  }
  showModal('Delete Entry', `
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:40px;margin-bottom:12px">🗑</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:8px">Delete this entry?</div>
      <div style="font-size:13px;color:${T.muted};margin-bottom:6px">"${ev.title||ET[ev.type].label}"</div>
      <div style="font-size:12px;color:${T.muted};margin-bottom:12px">📅 ${fmt(ev.date)}${ev.all_day||ev.type==='wellness'?'':' · '+(()=>{const x=new Date(ev.date);return x.getHours().toString().padStart(2,'0')+':'+x.getMinutes().toString().padStart(2,'0')})()} will be permanently removed.</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
        <button class="btn btn-danger" style="flex:1" onclick="confirmDelEv('${id}')">Delete</button>
      </div>
    </div>`);
}
window.delEv = delEv;

async function confirmDelEv(id) {
  const _evToDel = A.events.find(e=>e.id===id);
  // v10 (UX hardening): showSavingToast()/hideSavingToast() + sbWrite() for
  // idle-safety. No button disable here — this function is called from two
  // different confirmation modals (simple delete + recurring series choice),
  // making a single reliable button selector impractical.
  showSavingToast();
  try{
    const {error} = await sbWrite(() => sb.from('events').delete().eq('id', id));
    if (error) { toast('Error deleting.', true); console.error(error); return; }
    A.events = A.events.filter(e=>e.id!==id);
    // v8: notify other family members
    writeNotif('event','deleted',`${getActorName()} deleted an event`,_evToDel?.title||'');
    closeModal(); toast('Entry deleted.');
    renderCal();
    renderHome();
    if(A.calSearch || A.calFType!=='all' || A.calFMember!=='all') setTimeout(renderCalResults, 50);
  }catch(e){
    toast('Something went wrong — please try again.', true); console.error(e);
  }finally{
    hideSavingToast();
  }
}
window.confirmDelEv = confirmDelEv;



// ── NOTEBOOK ──────────────────────────────────────────────────────────────────
function renderNB(){
  // Ensure ribbon state is set (defaults to open)
  if(A.noteRibbonOpen===undefined) A.noteRibbonOpen=true;
  const notes=getNotes(), groups=getGroups();
  const ribbonOpen=A.noteRibbonOpen;

  // "Uncategorized" section is only meaningful when:
  //   (a) the user has created at least one group, AND
  //   (b) at least one note exists without a group assigned.
  // If all notes are ungrouped, "Uncategorized" = "All Notes" — redundant, so hide it.
  const hasUngroupedNotes=notes.some(n=>!n.group_id);
  const showUncategorized=groups.length>0 && hasUngroupedNotes;
  // If user was viewing Uncategorized but it is now hidden, reset to All
  if(A.noteFGroup==='none' && !showUncategorized) A.noteFGroup='all';

  // Filter notes by selected group and search query
  const filtered=notes.filter(n=>{
    if(A.noteFGroup==='none' && n.group_id) return false;
    if(A.noteFGroup!=='all' && A.noteFGroup!=='none' && n.group_id!==A.noteFGroup) return false;
    if(A.noteSearch){
      const q=A.noteSearch.toLowerCase();
      // v7: strip HTML from content before searching so rich-text markup doesn't
      // interfere with keyword matching (e.g. searching "bold" doesn't match <b>)
      const plainContent=stripHTML(n.content||'');
      if(![n.title,plainContent,...(n.tags||[]),...(n.checklist||[]).map(c=>c.text)]
        .join(' ').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  // Pinned notes always appear first within any filtered view
  const pinned=filtered.filter(n=>n.pinned);
  const rest  =filtered.filter(n=>!n.pinned);

  // ── NOTE CARD (v7: strip HTML in preview) ───────────────────────────────
  const nCard=n=>{
    const mem=getMem(n.member_id);
    const grp=groups.find(g=>g.id===n.group_id);
    const done=(n.checklist||[]).filter(c=>c.done).length;
    const total=(n.checklist||[]).length;
    // v7: strip HTML tags so rich-text markup doesn't show in the card preview
    const previewText=stripHTML(n.content||'');
    return`<div class="note-card" style="background:${n.color}" onclick="openNote('${n.id}')">
      ${(n.pinned||n.is_private)?`<div style="display:flex;align-items:center;gap:5px;font-size:10px;margin-bottom:3px">${n.pinned?'<span>📌</span>':''}${n.is_private?'<span>🔒</span>':''}</div>`:''}
      <div style="font-weight:800;font-size:13px;color:${T.ink};margin-bottom:5px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.title||'Untitled'}</div>
      ${previewText?`<div style="font-size:12px;color:${T.muted};line-height:1.5;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px">${previewText}</div>`:''}
      ${total>0?`<div style="font-size:11px;color:${T.muted};margin-bottom:5px">✅ ${done}/${total}</div>`:''}
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
        ${grp?`<span style="font-size:10px;font-weight:700;background:rgba(255,255,255,.55);border-radius:99px;padding:2px 6px;color:${T.ink}">${grp.name}</span>`:''}
        ${mem?av(mem,16):''}
      </div>
    </div>`;
  };

  // ── RIBBON BUILDER ───────────────────────────────────────────────────────
  // v9: open-state width auto-sizes to content (fit-content) instead of a
  // hardcoded pixel value, so long group names don't get cut off and short
  // ones don't leave excess whitespace. min/max keep it within sane bounds.
  const rWCss=ribbonOpen
    ?'width:fit-content;min-width:100px;max-width:190px;'
    :'width:32px;min-width:32px;max-width:32px;';

  // Renders one ribbon section button.
  // Expanded: tap selects the group.
  // Collapsed: tap expands the ribbon (stopPropagation so outer div doesn't double-fire).
  // v7: user-created groups also get a small ✏️ edit icon when ribbon is open.
  // v9: `color` is kept in the signature (some callers still pass a group's
  // color field) but is intentionally NOT used for any visual styling —
  // note_groups.color was never meant to drive ribbon appearance and can be
  // too light to read against the ribbon background. Selected/unselected
  // states now always use fixed sage-green styling instead.
  const rSection=(id,name,color,isUserGroup=false)=>{
    const isActive=A.noteFGroup===id;
    const clickAction=ribbonOpen
      ? `A.noteFGroup='${id}';renderNB()`
      : `event.stopPropagation();A.noteRibbonOpen=true;renderNB()`;
    return`<div style="display:flex;align-items:center;border-bottom:1px solid ${T.border}33;border-left:3px solid ${isActive?T.sage:'transparent'};background:${isActive?T.sageLight:'transparent'}">
      <button onclick="${clickAction}" title="${name}"
        style="flex:1;display:flex;align-items:center;padding:${ribbonOpen?'10px 4px 10px 0':'10px 0'};border:none;background:transparent;color:${isActive?T.sage:T.muted};font-size:11px;font-weight:${isActive?'800':'600'};cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent">
        ${ribbonOpen?`<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:9px;line-height:1.4">${name}</span>`:''}
      </button>
      ${ribbonOpen&&isUserGroup&&!isSampleMode()?`<button onclick="event.stopPropagation();openEditGroup('${id}')" title="Edit group" style="background:none;border:none;color:${T.muted};cursor:pointer;font-size:11px;padding:4px 8px 4px 2px;-webkit-tap-highlight-color:transparent">✏️</button>`:''}
    </div>`;
  };

  // Section order: user groups first, then a divider, then All Notes + Uncategorized at bottom
  const userGroupSections=groups.map(g=>rSection(g.id,g.name,g.color||T.sage,true)).join('');
  // Divider only rendered when user has at least one group (separates user groups from defaults)
  const dividerEl=groups.length>0
    ? `<div style="height:1px;background:${T.border};margin:${ribbonOpen?'3px 8px 3px 12px':'3px 0'};opacity:.5"></div>`
    : '';
  const allSection =rSection('all','All Notes',T.sage,false);
  const uncatSection=showUncategorized?rSection('none','Uncategorized',T.muted,false):'';

  // "+ New Group" only visible when ribbon is expanded (no room when collapsed)
  const addGroupBtn=ribbonOpen&&!isSampleMode()
    ? `<button onclick="openAddGroup()"
        style="display:flex;align-items:center;gap:7px;padding:9px 8px 9px 12px;border:none;border-top:1px dashed ${T.border};background:transparent;color:${T.muted};font-size:11px;font-weight:700;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent">
        <span>+</span><span style="white-space:nowrap">New Group</span>
      </button>`
    : '';

  // ── PAGE RENDER ──────────────────────────────────────────────────────────
  document.getElementById('page-notebook').innerHTML=`
    <div class="page-header">
      <div class="page-title">Notebook <button class="btn btn-primary btn-sm" onclick="openNote(null)">+ Note</button></div>
    </div>
    <!-- Search bar — full width above the split layout -->
    <div style="padding:8px 16px 6px">
      <input class="inp" id="nb-search-inp" placeholder="🔍  Search notes…" value="${A.noteSearch}"
        oninput="A.noteSearch=this.value;clearTimeout(A._nT);A._nT=setTimeout(()=>renderNB(),350)"
        onkeydown="if(event.key==='Enter'){clearTimeout(A._nT);renderNB();}">
    </div>
    <!-- Body: ribbon (left) + notes grid (right) -->
    <div style="display:flex;align-items:flex-start">
      <!-- Left Ribbon
           position:sticky keeps the ribbon in view as the notes column scrolls.
           When collapsed, a click anywhere on the ribbon expands it. -->
      <div style="${rWCss}flex-shrink:0;background:${T.parchment};border-right:1px solid ${T.border};display:flex;flex-direction:column;position:sticky;top:0;align-self:flex-start;${!ribbonOpen?'cursor:pointer;':''}"
        ${!ribbonOpen?`onclick="A.noteRibbonOpen=true;renderNB()" title="Tap to expand sections"`:''}> 
        <!-- Ribbon header: "Sections" label + collapse / expand toggle -->
        <div style="display:flex;align-items:center;justify-content:${ribbonOpen?'space-between':'center'};padding:7px ${ribbonOpen?'8px':'6px'};border-bottom:1px solid ${T.border};flex-shrink:0">
          ${ribbonOpen?`<span style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:${T.muted}">Sections</span>`:''}
          <button onclick="event.stopPropagation();A.noteRibbonOpen=!A.noteRibbonOpen;renderNB()"
            style="background:none;border:none;color:${T.muted};cursor:pointer;font-size:13px;padding:2px;line-height:1;-webkit-tap-highlight-color:transparent"
            title="${ribbonOpen?'Collapse sections':'Expand sections'}">
            ${ribbonOpen?'◀':'▶'}
          </button>
        </div>
        <!-- Section buttons: user groups first, then All Notes + Uncategorized -->
        ${userGroupSections}
        ${dividerEl}
        ${allSection}
        ${uncatSection}
        ${addGroupBtn}
      </div>
      <!-- Notes grid -->
      <div style="flex:1;min-width:0;padding:10px 10px 16px 10px">
        ${pinned.length?`
          <div style="font-size:11px;font-weight:700;color:${T.muted};text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">📌 Pinned</div>
          <div class="note-grid" style="margin-bottom:14px">${pinned.map(nCard).join('')}</div>`:''}
        ${rest.length?`<div class="note-grid">${rest.map(nCard).join('')}</div>`:''}
        ${filtered.length===0?`<div style="text-align:center;color:${T.muted};padding:48px 0;font-size:14px">No notes yet ✍️</div>`:''}
      </div>
    </div>`;
}

function openAddGroup(){
  if(isSampleMode()){toast('Switch to My Family to add real entries.',true);return;}
  showModal('New Group',`
    <div class="form-row"><label class="lbl">Group name</label><input class="inp" id="ng-name" placeholder="e.g. 🏠 Household" autofocus></div>
    <button class="btn btn-primary btn-full" onclick="saveGroup()">Create Group</button>`);
}
window.openAddGroup=openAddGroup;

async function saveGroup(){
  if(!A.family)return;
  const name=document.getElementById('ng-name')?.value?.trim();
  if(!name){toast('Please add a name.',true);return;}
  // v9: immediate button-disable + saving toast, sbWrite() for idle-safety
  const _saveBtn=document.querySelector('.modal-body button.btn-primary');
  if(_saveBtn){_saveBtn.disabled=true;_saveBtn.dataset.origText=_saveBtn.textContent;_saveBtn.textContent='Saving…';_saveBtn.style.opacity='0.7';}
  showSavingToast();
  let _saveOk=false;
  try{
    const{data,error}=await sbWrite(()=>sb.from('note_groups').insert({family_id:A.family.id,name}).select().single());
    if(error){toast('Error creating group.',true);console.error(error);return;}
    A.noteGroups.push(data);
    _saveOk=true;
    closeModal();toast('Group created!');renderNB();
  }catch(e){
    toast('Something went wrong — please try again.',true);console.error(e);
  }finally{
    hideSavingToast();
    if(!_saveOk&&_saveBtn){_saveBtn.disabled=false;_saveBtn.textContent=_saveBtn.dataset.origText||'Create Group';_saveBtn.style.opacity='';}
  }
}
window.saveGroup=saveGroup;

// ── GROUP MANAGEMENT (v7) ─────────────────────────────────────────────────────
// Edit group name and colour, with option to delete the group.
function openEditGroup(groupId){
  if(isSampleMode()){toast('Switch to My Family to edit groups.',true);return;}
  const grp=A.noteGroups.find(g=>g.id===groupId);
  if(!grp)return;
  showModal('Edit Group',`
    <div class="form-row"><label class="lbl">Group name</label><input class="inp" id="eg-name" value="${grp.name||''}" autofocus></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary" style="flex:1" onclick="saveGroupName('${groupId}')">Save Name</button>
      <button class="btn btn-danger" onclick="deleteGroupPrompt('${groupId}')">🗑 Delete Group</button>
    </div>`);
}
window.openEditGroup=openEditGroup;

async function saveGroupName(groupId){
  const name=document.getElementById('eg-name')?.value?.trim();
  if(!name){toast('Please enter a name.',true);return;}
  // v9: brief button-disable + sbWrite() for idle-safety
  const _saveBtn=document.querySelector('.modal-body button.btn-primary');
  if(_saveBtn){_saveBtn.disabled=true;_saveBtn.dataset.origText=_saveBtn.textContent;_saveBtn.textContent='Saving…';_saveBtn.style.opacity='0.7';}
  // v10 (UX hardening): was missing showSavingToast()/hideSavingToast() —
  // button-disable alone isn't enough feedback, add the toast too.
  showSavingToast();
  let _saveOk=false;
  try{
    const{data,error}=await sbWrite(()=>sb.from('note_groups').update({name}).eq('id',groupId).select().single());
    if(error){toast('Error saving group name.',true);console.error(error);return;}
    A.noteGroups=A.noteGroups.map(g=>g.id===groupId?data:g);
    _saveOk=true;
    closeModal();toast('Group renamed! ✅');renderNB();
  }catch(e){
    toast('Something went wrong — please try again.',true);console.error(e);
  }finally{
    hideSavingToast();
    if(!_saveOk&&_saveBtn){_saveBtn.disabled=false;_saveBtn.textContent=_saveBtn.dataset.origText||'Save Name';_saveBtn.style.opacity='';}
  }
}
window.saveGroupName=saveGroupName;

function deleteGroupPrompt(groupId){
  const grp=A.noteGroups.find(g=>g.id===groupId);
  if(!grp)return;
  const notesInGroup=A.notes.filter(n=>n.group_id===groupId).length;
  showModal('Delete Group',`
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:40px;margin-bottom:12px">🗑</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:8px">Delete "${grp.name}"?</div>
      ${notesInGroup>0
        ?`<div style="font-size:13px;color:${T.muted};margin-bottom:16px">${notesInGroup} note${notesInGroup!==1?'s':''} in this group will become uncategorized — they will not be deleted.</div>`

async function confirmDeleteGroup(groupId){
  // v9: sbWrite() for idle-safety, brief button-disable to prevent double-tap
  const _delBtn=document.querySelector('.modal-body button.btn-danger');
  if(_delBtn){_delBtn.disabled=true;_delBtn.dataset.origText=_delBtn.textContent;_delBtn.textContent='Deleting…';_delBtn.style.opacity='0.7';}
  // v10 (UX hardening): was missing showSavingToast()/hideSavingToast().
  showSavingToast();
  let _delOk=false;
  try{
    const{error}=await sbWrite(()=>sb.from('note_groups').delete().eq('id',groupId));
    if(error){toast('Error deleting group.',true);console.error(error);return;}
    // notes inside become ungrouped (group_id → null) via ON DELETE SET NULL in DB
    A.notes=A.notes.map(n=>n.group_id===groupId?{...n,group_id:null}:n);
    A.noteGroups=A.noteGroups.filter(g=>g.id!==groupId);
    // If we were viewing the now-deleted group, fall back to All Notes
    if(A.noteFGroup===groupId) A.noteFGroup='all';
    _delOk=true;
    closeModal();toast('Group deleted.');renderNB();
  }catch(e){
    toast('Something went wrong — please try again.',true);console.error(e);

    hideSavingToast();
    if(!_delOk&&_delBtn){_delBtn.disabled=false;_delBtn.textContent=_delBtn.dataset.origText||'Delete';_delBtn.style.opacity='';}
  }
}

      if(clCont){
        clCont.innerHTML='';

      A._noteDirty=true;
      const _stEl=document.getElementById('note-autosave-status');

  document.getElementById('ne-grp').addEventListener('change',function(){

// v14: creates the new note group and updates the target <select> in place.
// Looked up by id at call time (not via closure) -- this is the fix for the
// "New Group does nothing" bug. Also now has proper error handling, which
// the old inline version never had.
async function createInlineNoteGroup(selectId){
  const nameInput=document.getElementById('ng-inline-name');
  const n=nameInput?.value.trim();
  if(!n||!A.family)return;
  const {data,error}=await sbWrite(()=>sb.from('note_groups').insert({family_id:A.family.id,name:n}).select().single());
  if(error){ toast('Error creating group.', true); console.error('New group insert error', error); return; }
  if(data){
    A.noteGroups.push(data);
    const sel=document.getElementById(selectId);
    if(sel){
      const opt=document.createElement('option');
      opt.value=data.id;opt.textContent=data.name;opt.selected=true;
      const newOpt=sel.querySelector('option[value="__new__"]');
      if(newOpt) sel.insertBefore(opt,newOpt); else sel.appendChild(opt);
      sel.value=data.id;

  document.getElementById('ng-inline-overlay')?.remove();
}
window.createInlineNoteGroup=createInlineNoteGroup;

function addCLItem(text='', done=false){
  const cont=document.getElementById('ne-cl');
  if(!cont)return;
  const i=cont.children.length;
  const div=document.createElement('div');
  div.draggable=true;
  div.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px';
  div.innerHTML=`<span class="drag-handle" style="cursor:grab;color:#c8bfb0;font-size:14px;flex-shrink:0;user-select:none;touch-action:none">⠿</span><input type="checkbox" id="nc-${i}" ${done?'checked':''}><input class="inp" id="nt-${i}" value="${text}" style="flex:1;font-size:13px;padding:6px 10px${done?';text-decoration:line-through;opacity:0.6':''}" placeholder="Item…"><button onclick="this.parentElement.remove()" style="background:none;border:none;color:${T.muted};font-size:16px;cursor:pointer;padding:4px">×</button>`;
  const inp=div.querySelector('input:not([type="checkbox"])');
  const cb=div.querySelector('input[type="checkbox"]');
  // Instant-save: update strikethrough visually and persist to DB on each toggle
  cb.addEventListener('change',()=>{
    inp.style.textDecoration = cb.checked ? 'line-through' : 'none';
    inp.style.opacity = cb.checked ? '0.6' : '1';
    const nId = document.getElementById('ne-cl')?.dataset?.noteId || '';
    if (nId) {
      const idx = Array.from(cont.children).indexOf(div);
      toggleNoteItem(nId, idx, cb.checked);
    }
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addCLItem();setTimeout(()=>{const rows=cont.querySelectorAll('input:not([type="checkbox"])');rows[rows.length-1]?.focus();},50);}});
  // Drag mouse
  div.addEventListener('dragstart',e=>{e.dataTransfer.effectAllowed='move';div.style.opacity='0.4';cont._dragging=div;});
  div.addEventListener('dragend',()=>{div.style.opacity='1';cont._dragging=null;});
  div.addEventListener('dragover',e=>{e.preventDefault();const d=cont._dragging;if(!d||d===div)return;const r=div.getBoundingClientRect();if(e.clientY<r.top+r.height/2)cont.insertBefore(d,div);else cont.insertBefore(d,div.nextSibling);});
  // Touch drag
  div.querySelector('.drag-handle').addEventListener('touchstart',e=>{div.style.opacity='0.5';cont._dragging=div;},{passive:true});
  div.querySelector('.drag-handle').addEventListener('touchmove',e=>{e.preventDefault();const y=e.touches[0].clientY;Array.from(cont.children).forEach(el=>{if(el===cont._dragging)return;const r=el.getBoundingClientRect();if(y>r.top&&y<r.bottom){if(y<r.top+r.height/2)cont.insertBefore(cont._dragging,el);else cont.insertBefore(cont._dragging,el.nextSibling);}});},{passive:false});
  div.querySelector('.drag-handle').addEventListener('touchend',()=>{div.style.opacity='1';cont._dragging=null;});
  cont.appendChild(div);
  if(!text)inp.focus();
  return div;
}
window.addCLItem=addCLItem;

async function saveNote(noteId){
  if(!A.family){toast('Set up your family first.',true);return;}
  // v13: cancel any pending auto-save — we're saving manually right now
  clearTimeout(A._noteAutoSaveTimer);
  A._noteAutoSaveTimer=null;
  // v14: block a concurrently-firing auto-save from racing this manual save
  // and overwriting it with stale data (see _doNoteAutoSave's matching guard)
  A._noteSavingManually=true;
  // v9: button-disable + saving toast fire IMMEDIATELY on tap, before any
  // form reading or the Supabase call — previously users saw nothing for
  // up to 7s (the sbWrite timeout) which caused double-taps. Whole body is
  // now wrapped in try/catch/finally so this cleanup always runs.
  const _saveBtn=document.querySelector('.modal-body button.btn-primary');
  if(_saveBtn){_saveBtn.disabled=true;_saveBtn.dataset.origText=_saveBtn.textContent;_saveBtn.textContent='Saving…';_saveBtn.style.opacity='0.7';}
  showSavingToast();
  let _saveOk=false;
  try{
    const checklist=[];
    document.querySelectorAll('#ne-cl > div').forEach((row,i)=>{
      const cb=row.querySelector('input[type="checkbox"]');
      const inp=row.querySelector('input:not([type="checkbox"])');
      if(inp?.value?.trim())checklist.push({id:'c'+i,text:inp.value.trim(),done:cb?.checked||false});
    });
    const grpVal=document.getElementById('ne-grp')?.value;
    // v7: read HTML from the rich-text contenteditable editor instead of a textarea
    const editorEl=document.getElementById('ne-editor');
    const content=editorEl?editorEl.innerHTML:'';
    // v8: privacy — read the toggle if it's visible (user is creator or new note).
    // If the toggle is not shown (non-creator editing a shared note), preserve
    // the existing is_private value so it is never accidentally cleared.
    const _notePrivToggle = document.getElementById('ne-private');
    const _existNote = noteId ? A.notes.find(n => n.id === noteId) : null;
    const data={
      family_id:A.family.id,
      title:document.getElementById('ne-t')?.value||'',
      content,
      color:document.getElementById('ne-col')?.value||NOTE_COLORS[0],
      group_id:grpVal&&grpVal!=='__new__'?grpVal:null,
      member_id:document.getElementById('ne-mem')?.value||null,
      pinned:document.getElementById('ne-pin')?.checked||false,
      checklist,
      is_private: _notePrivToggle ? _notePrivToggle.checked : (_existNote?.is_private || false),
    };
    // Set created_by_user_id only when creating a new note — never overwrite on edits.
    if (!noteId) data.created_by_user_id = A.user?.id || null;
    // v7: sbWrite() for idle-safety
    let res;
    if(noteId)res=await sbWrite(()=>sb.from('notes').update(data).eq('id',noteId).select().single());
    else res=await sbWrite(()=>sb.from('notes').insert(data).select().single());
    if(res.error){toast('Error saving note: '+(res.error.message||'please try again.'),true);console.error(res.error);return;}
    const savedNote = res.data;
    if(noteId)A.notes=A.notes.map(n=>n.id===noteId?savedNote:n);
    else A.notes.push(savedNote);
    _saveOk=true;
    A._noteDirty=false; // v13: mark note as clean after explicit manual save
    clearNoteDraftLS(); // v14: saved successfully — discard the localStorage draft
    // v8: notify other family members
    writeNotif('note', noteId ? 'updated' : 'created',
      noteId ? `${getActorName()} updated a note` : `${getActorName()} added a new note`,
      data.title || 'Untitled'
    );
    closeModal();toast(noteId?'Note updated!':'Note saved!');renderNB();
  }catch(e){
    console.error('saveNote error', e);
    toast('Something went wrong — please try again.', true);
  }finally{
    hideSavingToast();
    A._noteSavingManually=false; // v14: release the guard regardless of outcome
    if(!_saveOk&&_saveBtn){_saveBtn.disabled=false;_saveBtn.textContent=_saveBtn.dataset.origText||'Save';_saveBtn.style.opacity='';}
  }
}
window.saveNote=saveNote;

// ── NOTE AUTO-SAVE (v13) ────────────────────────────────────────────────────────
// Debounced auto-save for the Notebook note editor.
// Fires 4 seconds after the user stops typing, saves to DB in the background.
// Status indicator in the modal shows current state without interrupting writing.

function scheduleNoteAutoSave(){
  A._noteDirty=true;
  const status=document.getElementById('note-autosave-status');
  if(status){status.textContent='● Unsaved changes';status.style.color='#c4892a';}
  // v14: snapshot to localStorage on every keystroke-triggered cycle, not just
  // when the 4-second remote debounce completes — protects against the tab
  // being backgrounded/discarded before that timer ever gets to fire.
  saveNoteDraftLS();
  clearTimeout(A._noteAutoSaveTimer);
  A._noteAutoSaveTimer=setTimeout(_doNoteAutoSave,4000);
}
window.scheduleNoteAutoSave=scheduleNoteAutoSave;

async function _doNoteAutoSave(){
  if(!A.family||!A.user) return;
  // v14: a manual Save is currently in flight — bail out so this auto-save
  // can't land after it and overwrite the just-saved data with stale content
  if(A._noteSavingManually) return;
  // Bail out if the note modal has been closed while the timer was running
  if(!document.getElementById('ne-editor')) return;
  const title=document.getElementById('ne-t')?.value||'';
  const content=document.getElementById('ne-editor')?.innerHTML||'';
  // Don't auto-save a completely empty note — wait until there's something worth keeping
  if(!title&&(!content||content.replace(/<[^>]*>/g,'').trim()==='')) return;
  const status=document.getElementById('note-autosave-status');
  if(status){status.textContent='● Saving…';status.style.color='#7a7060';}
  // Collect current form state — mirrors saveNote logic but without closing the modal
  const checklist=[];
  document.querySelectorAll('#ne-cl > div').forEach((row,i)=>{
    const cb=row.querySelector('input[type="checkbox"]');
    const inp=row.querySelector('input:not([type="checkbox"])');
    if(inp?.value?.trim())checklist.push({id:'c'+i,text:inp.value.trim(),done:cb?.checked||false});
  });
  const grpVal=document.getElementById('ne-grp')?.value;
  const _notePrivToggle=document.getElementById('ne-private');
  const _existNote=A._noteEditingId?A.notes.find(n=>n.id===A._noteEditingId):null;
  const data={
    family_id:A.family.id,
    title,
    content,
    color:document.getElementById('ne-col')?.value||NOTE_COLORS[0],
    group_id:grpVal&&grpVal!=='__new__'?grpVal:null,
    member_id:document.getElementById('ne-mem')?.value||null,
    pinned:document.getElementById('ne-pin')?.checked||false,
    checklist,
    is_private:_notePrivToggle?_notePrivToggle.checked:(_existNote?.is_private||false),
  };
  if(!A._noteEditingId) data.created_by_user_id=A.user?.id||null;
  // Use update if we already have an ID, insert if this is the first auto-save of a new note
  const res=A._noteEditingId
    ?await sbWrite(()=>sb.from('notes').update(data).eq('id',A._noteEditingId).select().single())
    :await sbWrite(()=>sb.from('notes').insert(data).select().single());
  // If modal was closed during the async write, exit quietly — don't update a removed status element
  if(!document.getElementById('note-autosave-status')) return;
  if(res.error){
    if(status){status.textContent='⚠ Auto-save failed — click Save';status.style.color='#b85070';}
    return;
  }
  // Update local note state
  if(A._noteEditingId){
    A.notes=A.notes.map(n=>n.id===A._noteEditingId?res.data:n);
  }else{
    A._noteEditingId=res.data.id; // remember the new ID so subsequent auto-saves use update
    A.notes.push(res.data);
  }
  A._noteDirty=false;
  clearNoteDraftLS(); // v14: successfully synced to the DB — discard the localStorage draft
  const now=new Date();
  const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  if(status){status.textContent=`✓ Auto-saved at ${t}`;status.style.color='#5e8b62';}
}

// ── NOTEBOOK DRAFT SAFETY (v14) ──────────────────────────────────────────────
// Mirrors the Event form's v13 localStorage draft pattern (see saveEvDraft /
// checkAndOfferEvDraft / restoreEvDraft above). Notebook's 4-second auto-save
// writes only to Supabase — if the tab/PWA is backgrounded (screen lock, app
// switch) before that timer fires, mobile browsers commonly pause or fully
// discard JS execution, losing the draft entirely. This gives Notebook the
// same safety net: a localStorage copy kept current on every edit, flushed
// immediately via a visibilitychange/pagehide listener (see bottom of file),
// with a restore prompt offered on next app open.

const _noteDraftKey=()=>'ks_note_draft_'+(A.user?.id||'anon');
const _noteDraftMaxAge=2*60*60*1000; // discard drafts older than 2 hours

function saveNoteDraftLS(){
  if(!A.user||!A.family) return;
  const editorEl=document.getElementById('ne-editor');
  if(!editorEl) return; // note editor isn't open right now — nothing to draft
  const checklist=[];
  document.querySelectorAll('#ne-cl > div').forEach((row,i)=>{
    const cb=row.querySelector('input[type="checkbox"]');
    const inp=row.querySelector('input:not([type="checkbox"])');
    if(inp?.value?.trim())checklist.push({id:'c'+i,text:inp.value.trim(),done:cb?.checked||false});
  });
  const grpVal=document.getElementById('ne-grp')?.value;
  const draft={
    noteId:A._noteEditingId||null,
    timestamp:Date.now(),
    fields:{
      title:document.getElementById('ne-t')?.value||'',
      content:editorEl.innerHTML||'',
      color:document.getElementById('ne-col')?.value||NOTE_COLORS[0],
      group_id:grpVal&&grpVal!=='__new__'?grpVal:null,
      member_id:document.getElementById('ne-mem')?.value||null,
      pinned:document.getElementById('ne-pin')?.checked||false,
      is_private:document.getElementById('ne-private')?.checked||false,
    },
    checklist,
  };
  try{localStorage.setItem(_noteDraftKey(),JSON.stringify(draft));}catch(_){}
}
window.saveNoteDraftLS=saveNoteDraftLS;

function clearNoteDraftLS(){
  try{localStorage.removeItem(_noteDraftKey());}catch(_){}
}
window.clearNoteDraftLS=clearNoteDraftLS;

// Checked once at app boot (see boot() below) — offers to restore an
// unfinished note draft left over from a lost session.
function checkAndOfferNoteDraft(){
  if(!A.user||!A.family) return;
  let draft;
  try{
    const raw=localStorage.getItem(_noteDraftKey());
    if(!raw) return;
    draft=JSON.parse(raw);
  }catch(_){return;}
  if(!draft||!draft.timestamp||Date.now()-draft.timestamp>_noteDraftMaxAge){
    clearNoteDraftLS();return;
  }
  const existing=document.getElementById('note-draft-banner');
  if(existing) existing.remove();
  const banner=document.createElement('div');
  banner.id='note-draft-banner';
  banner.style.cssText='position:fixed;bottom:72px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:#1e1b16;color:#fff;border-radius:12px;padding:12px 14px;z-index:500;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fadeUp .3s ease';
  const noteTitle=draft.fields?.title;
  const draftDate=new Date(draft.timestamp);
  const tStr=draftDate.getHours().toString().padStart(2,'0')+':'+draftDate.getMinutes().toString().padStart(2,'0');
  banner.innerHTML=`
    <div style="min-width:0">
      <div style="font-weight:700;font-size:13px">📝 Unfinished note</div>
      <div style="font-size:11px;opacity:.75;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${noteTitle?'"'+noteTitle+'"':'No title yet'} · Draft from ${tStr}</div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="document.getElementById('note-draft-banner')?.remove();clearNoteDraftLS()" style="background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent">Discard</button>
      <button onclick="document.getElementById('note-draft-banner')?.remove();restoreNoteDraftLS()" style="background:#5e8b62;border:none;border-radius:8px;color:#fff;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent">Restore ✓</button>
    </div>`;
  document.body.appendChild(banner);
  setTimeout(()=>document.getElementById('note-draft-banner')?.remove(),15000); // auto-dismiss
}
window.checkAndOfferNoteDraft=checkAndOfferNoteDraft;

// Queues the saved draft, then opens the note editor — restoration itself
// happens inside openNote()'s setTimeout, mirroring restoreEvDraft/openEvForm.
function restoreNoteDraftLS(){
  let draft;
  try{
    const raw=localStorage.getItem(_noteDraftKey());
    if(!raw) return;
    draft=JSON.parse(raw);
  }catch(_){return;}
  if(!draft) return;
  A._noteDraftRestore=draft;
  openNote(draft.noteId||null);
}
window.restoreNoteDraftLS=restoreNoteDraftLS;

function renderMeds(targetId){
  let dm=getFilteredMeds(),s=symC();
  const daysLeft=med=>{const td=(med.member_ids||[]).length*(med.dose_per_day||1);if(!td)return null;return Math.floor((med.stock_today||0)/td);};
  // "Stock lasts until" counts forward from the date stock was last confirmed,
  // not always from today. Falls back to today if no date is set yet.
  const stockBase=med=>med.stock_date?new Date(med.stock_date+'T00:00:00'):todayD();
  const lastsUntilDate=med=>{const d=daysLeft(med);return d===null?null:addDays(stockBase(med),d);};
  const lastsUntil=med=>{const d=lastsUntilDate(med);return d?fmt(d):'—';};
  const orderPrice=med=>((parseInt(med.new_order_pkgs)||0)*(med.price_per_pkg||0)).toFixed(2);
  // v15: "Updated Stock" is now a persisted, cumulative value (set only when
  // an order is confirmed — see confirmOrder()), not a live preview of the
  // currently-typed order. "Updated stock lasts until" counts forward from
  // the SAME Stock count date as "Stock lasts until" (not from today).
  const hasUpdated=med=>med.updated_stock!==null&&med.updated_stock!==undefined;
  const updLastsUntilDate=med=>{
    if(!hasUpdated(med))return null;
    const td=(med.member_ids||[]).length*(med.dose_per_day||1);
    if(!td)return null;
    return addDays(stockBase(med),Math.floor(med.updated_stock/td));
  };
  const updLastsUntil=med=>{const d=updLastsUntilDate(med);return d?fmt(d):'—';};
  const expDays=d=>Math.floor((new Date(d)-new Date())/(1000*60*60*24));
  const expSt=d=>{const n=expDays(d);if(n<0)return'expired';if(n<30)return'critical';if(n<90)return'soon';return'ok';};
  const totalOrder=dm.reduce((sum,m)=>sum+(parseInt(m.new_order_pkgs)||0)*(m.price_per_pkg||0),0);
  const grand=(totalOrder+(parseFloat(A.family?.transport_cost)||0)).toFixed(2);

  // ── COLUMN SORTING (v15) ────────────────────────────────────────────────
  // Every column header is clickable: first click sorts ascending, a second
  // click on the same column reverses it. A.medSortCol / A.medSortDir hold
  // the active sort (see state object A near the top of the file) so it
  // survives re-renders (search, edits, order confirmations) until changed.
  // Rows with no value for the sorted column (e.g. "Updated Stock" before
  // any order has ever been confirmed) always sort to the bottom, regardless
  // of direction, rather than jumping to the top on descending sorts.
  const sortGetters={
    name:med=>(med.name||'').toLowerCase(),
    members:med=>getMembers().filter(m=>(med.member_ids||[]).includes(m.id)).map(m=>m.name).sort().join(', ').toLowerCase()||null,
    dose:med=>med.dose_per_day||0,
    stock:med=>med.stock_today||0,
    stockDate:med=>med.stock_date?new Date(med.stock_date+'T00:00:00').getTime():null,
    lastsUntil:med=>{const d=lastsUntilDate(med);return d?d.getTime():null;},
    pkgUnits:med=>med.units_per_pkg||0,
    pkgPrice:med=>med.price_per_pkg||0,
    newOrder:med=>parseInt(med.new_order_pkgs)||0,
    orderCost:med=>parseFloat(orderPrice(med))||0,
    updStock:med=>hasUpdated(med)?med.updated_stock:null,
    updLastsUntil:med=>{const d=updLastsUntilDate(med);return d?d.getTime():null;},
    lastOrdered:med=>med.last_ordered?new Date(med.last_ordered).getTime():null,
  };
  if(A.medSortCol&&sortGetters[A.medSortCol]){
    const getter=sortGetters[A.medSortCol];
    const dir=A.medSortDir==='desc'?-1:1;
    dm=dm.slice().sort((a,b)=>{
      const va=getter(a),vb=getter(b);
      const aNull=(va===null||va===undefined||va==='');
      const bNull=(vb===null||vb===undefined||vb==='');
      if(aNull&&bNull)return 0;
      if(aNull)return 1;   // nulls always last, regardless of sort direction
      if(bNull)return -1;
      if(typeof va==='string')return va.localeCompare(vb)*dir;
      return (va-vb)*dir;
    });
  }
  const sortArrow=col=>A.medSortCol===col?(A.medSortDir==='asc'?' ▲':' ▼'):'';
  // Column definitions in final on-screen order, tagged with which of the 4
  // grouped sections (grp) they belong to, so the header can render both the
  // grouped label row and the per-column sortable row from one source list.
  const medCols=[
    {key:'name',label:'Medication',grp:1},
    {key:'members',label:'Members',grp:1},
    {key:'dose',label:'Dose/day',grp:1},
    {key:'stock',label:'In stock',grp:2},
    {key:'stockDate',label:'Stock count date',grp:2},
    {key:'lastsUntil',label:'Stock lasts until',grp:2},
    {key:'pkgUnits',label:'Pkg units',grp:3},
    {key:'pkgPrice',label:'Pkg price',grp:3},
    {key:'newOrder',label:'New order',grp:3},
    {key:'orderCost',label:'Order cost',grp:3},
    {key:'updStock',label:'Updated Stock',grp:4},
    {key:'updLastsUntil',label:'Updated stock lasts until',grp:4},
    {key:'lastOrdered',label:'Last order received',grp:4},
    {key:null,label:'',grp:0},
  ];
  const medGroupLabels={1:'Meds Identification',2:'Current Stock',3:'New Order',4:'Updated Stock'};
  // v15.1: alternating tint per group + a visible divider line between
  // groups, on BOTH header rows (group label row and column label row) —
  // previously every group cell shared one flat background with no
  // separator, making it hard to tell where one group ends and the next
  // begins (reported by Roxana while testing on staging).
  const medGroupTint={0:'#fff',1:T.parchment,2:'#fff',3:T.parchment,4:'#fff'};
  const medGroupHeaderRow=(()=>{
    let cells='',i=0;
    while(i<medCols.length){
      const grp=medCols[i].grp;
      const isFirst=(i===0);
      let span=0;
      while(i<medCols.length&&medCols[i].grp===grp){span++;i++;}
      cells+=`<th colspan="${span}" style="text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:${T.muted};background:${medGroupTint[grp]||T.parchment};border-bottom:1px solid ${T.border};${isFirst?'':`border-left:2px solid ${T.border};`}padding:7px 10px">${medGroupLabels[grp]||''}</th>`;
    }
    return cells;
  })();
  const medColHeaderRow=medCols.map((c,i)=>{
    const isGroupStart=i>0&&medCols[i].grp!==medCols[i-1].grp;
    const bg=medGroupTint[c.grp]!==undefined?medGroupTint[c.grp]:'#fff';
    const borderLeft=isGroupStart?`border-left:2px solid ${T.border};`:'';
    return c.key
      ?`<th onclick="sortMeds('${c.key}')" style="cursor:pointer;user-select:none;white-space:nowrap;background:${bg};${borderLeft}padding:6px 8px" title="Click to sort">${c.label}${sortArrow(c.key)}</th>`
      :`<th style="background:${bg}"></th>`;
  }).join('');

  // ── TARGET CONTAINER (v7) ──────────────────────────────────────────────────
  // renderMeds() can render in two places:
  //  - '#inv-meds-container' → the LIVE Inventory > "Frequent meds" tab.
  //    Only the "Frequent Medications" block is shown (table + buttons) —
  //    Inventory already has its own page header, so we skip duplicating it.
  //  - '#page-meds' (default/fallback) → legacy hidden page, kept only for
  //    backward compatibility. Includes the full header + currency selector.
  // No HTML is copied between elements anymore — whichever container is the
  // target gets written to directly.
  const onInvTreatments = A.page==='inventory' && A.invTab==='treatments';
  const tid = targetId || (onInvTreatments ? 'inv-meds-container' : 'page-meds');
  const target = document.getElementById(tid);
  if(!target) return;

  const headerHtml = `
    <div class="page-header">
      <div class="page-title">Meds & Supplies</div>
    </div>
    <div style="padding:10px 16px 0;display:flex;gap:8px;align-items:center">
      <select class="sel" style="width:auto;font-size:12px" onchange="updateCurrency(this.value)">
        ${CURRENCIES.map(c=>`<option value="${c.code}"${(A.family?.currency||'EUR')===c.code?' selected':''}>${c.code} (${c.sym})</option>`).join('')}
      </select>
      <span style="font-size:12px;color:${T.muted}">All prices in ${s}</span>
    </div>`;

  const contentHtml = `
    <div style="padding:14px 16px 0">
      <div style="font-family:'Playfair Display',serif;font-size:17px;color:${T.ink};margin-bottom:10px">Frequent Medications</div>
      <div style="margin-bottom:10px;position:relative">
        <input class="inp" id="med-search-inp" placeholder="🔍  Search by medication or member…" value="${A.medSearch}"
          style="padding-right:${A.medSearch?'36px':'12px'}"
          oninput="A.medSearch=this.value;clearTimeout(A._mT);A._mT=setTimeout(renderMeds,300);document.getElementById('med-search-x').style.display=this.value?'flex':'none'">
        <button id="med-search-x" onclick="A.medSearch='';document.getElementById('med-search-inp').value='';renderMeds();this.style.display='none'"

async function confirmOrder(id){
  const med=A.dailyMeds.find(m=>m.id===id);if(!med)return;

  // ── v15: "In stock" IS NOW FROZEN ─────────────────────────────────────────
  // Confirming an order no longer touches "In stock" (stock_today) or
  // "Stock count date" (stock_date) at all — those only ever change when the
  // user manually edits them (see saveEditDM()). Instead, "Updated Stock" is
  // a cumulative running total: it starts from "In stock" the first time an
  // order is confirmed, then keeps adding each subsequent order on top of
  // itself. The old "subtract what's been consumed since the last count"
  // adjustment has been removed per spec — this is now a simple sum.
  const ordered=(parseInt(med.new_order_pkgs)||0)*(med.units_per_pkg||0);
  const priorUpdated=(med.updated_stock===null||med.updated_stock===undefined)?(med.stock_today||0):med.updated_stock;
  const newUpdated=priorUpdated+ordered;

  // v7: sbWrite() for idle-safety
  const{data,error}=await sbWrite(()=>sb.from('daily_meds').update({
    updated_stock:newUpdated,
    new_order_pkgs:0,               // Group 3's "New order" qty clears after confirming
    last_ordered:new Date().toISOString()
  }).eq('id',id).select().single());
  if(error){toast('Error updating stock: '+(error.message||'please try again.'),true);return;}
  if(data){A.dailyMeds=A.dailyMeds.map(m=>m.id===id?data:m);toast('Stock updated! ✅');renderMeds();}
}
window.confirmOrder=confirmOrder;

async function saveEditDM(id){
  if(!A.family)return;
  // v8: disable button immediately so double-tap can't fire two saves
  const _saveBtn=document.querySelector('.modal-body button.btn-primary');
  if(_saveBtn){_saveBtn.disabled=true;_saveBtn.dataset.origText=_saveBtn.textContent;_saveBtn.textContent='Saving…';_saveBtn.style.opacity='0.7';}
  showSavingToast();
  let _saveOk=false;
  try{
    const memberIds=Array.from(document.querySelectorAll('#dm-mems button[data-sel="true"]')).map(b=>b.dataset.mid).filter(Boolean);
    const name=document.getElementById('dm-n')?.value?.trim();
    if(!name){toast('Please add a name.',true);return;}
    // v8: last order received — read date-only input and convert to local noon timestamp
    const loVal=document.getElementById('dm-lo')?.value;
    const med=A.dailyMeds.find(m=>m.id===id);
    const newStock=parseInt(document.getElementById('dm-s')?.value)||0;
    // v15: "In stock" is the source of truth once manually edited — if the
    // user actually changed it, wipe Group 3 (pending order) & Group 4
    // (Updated Stock / Last order received) rather than keep stale numbers
    // that no longer relate to the freshly-counted stock.
    const stockChanged = med ? (newStock !== (med.stock_today||0)) : false;
    const data={
      name,member_ids:memberIds,
      dose_per_day:parseFloat(document.getElementById('dm-d')?.value)||1,
      units_per_pkg:parseInt(document.getElementById('dm-u')?.value)||30,
      price_per_pkg:parseFloat(document.getElementById('dm-p')?.value)||0,
      stock_today:newStock,
      stock_date:document.getElementById('dm-sd')?.value||toISOLocal(new Date()),
      shared:memberIds.length>1,
      note:document.getElementById('dm-note')?.value||'',
    };
    if(stockChanged){
      data.new_order_pkgs=0;
      data.updated_stock=null;
      data.last_ordered=null;
    }else{
      data.last_ordered=loVal?loVal+'T12:00:00':null;
    }
    const{data:result,error}=await sbWrite(()=>sb.from('daily_meds').update(data).eq('id',id).select().single());
    if(error){toast('Error saving medication: '+(error.message||'please try again.'),true);console.error(error);return;}
    A.dailyMeds=A.dailyMeds.map(m=>m.id===id?result:m);
    _saveOk=true;
    // v8: notify other family members
    writeNotif('inventory_meds','updated',`${getActorName()} updated a medication`,data.name);
    closeModal();toast('Medication updated! ✅');renderMeds();
  }catch(e){
    toast('Something went wrong — please try again.',true);console.error(e);
  }finally{
    hideSavingToast();
    if(!_saveOk&&_saveBtn){_saveBtn.disabled=false;_saveBtn.textContent=_saveBtn.dataset.origText||'Save Changes';_saveBtn.style.opacity='';}
  }
}
window.saveEditDM=saveEditDM;

// ── INSIGHTS ──────────────────────────────────────────────────────────────────
function renderInsights(){
  const wLogs=getEvents().filter(e=>e.type==='wellness');
  const hEvs=getEvents().filter(e=>e.type==='health');
  const avg=(arr,k)=>{const v=arr.map(e=>parseFloat(e[k])).filter(v=>!isNaN(v)&&v>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;};
  if(!A.insightsMember)A.insightsMember='all';

  // Pick challenge based on week number
  const weekNum=Math.floor((new Date()-new Date(new Date().getFullYear(),0,1))/(7*24*60*60*1000));
  const challenge=CHALLENGES[weekNum%CHALLENGES.length];
  const insights=genInsights(wLogs,hEvs);

  // Filter logs by selected member
  const filteredLogs = A.insightsMember==='all' ? wLogs : wLogs.filter(e=>e.member_id===A.insightsMember);

  const memberCards=getMembers()
    .filter(m=>A.insightsMember==='all'||A.insightsMember===m.id)
    .map(member=>{
    const logs=filteredLogs.filter(e=>e.member_id===member.id);
    if(!logs.length)return'';
    const aSlp=avg(logs,'sleep'),aEn=avg(logs,'energy'),aHy=avg(logs,'hydration');
    const exDays=logs.filter(l=>l.exercised).length;
    const acts={};logs.filter(l=>l.exercised&&l.activity).forEach(l=>{acts[l.activity]=(acts[l.activity]||0)+1;});
    const topAct=Object.entries(acts).sort((a,b)=>b[1]-a[1])[0]?.[0];
    const ill=hEvs.filter(e=>(e.participants||[]).includes(member.id)&&e.appt_type==='Illness').length;
    return`<div class="card" style="margin-bottom:12px;overflow:hidden">
      <div style="padding:12px 14px;border-bottom:1px solid ${T.border};display:flex;align-items:center;gap:10px">
        ${av(member,36)}<div><div style="font-weight:800;font-size:14px">${member.name}</div><div style="font-size:11px;color:${T.muted}">${logs.length} logs recorded</div></div>
      </div>
      <div style="padding:12px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${[['😴','Sleep',aSlp?`${aSlp.toFixed(1)}h`:'-',aSlp&&aSlp>=7,aSlp&&aSlp<6],
           ['⚡','Energy',aEn?`${Math.round(aEn)}%`:'-',aEn&&aEn>=70,aEn&&aEn<50],
           ['💧','H₂O',aHy?`${Math.round(aHy)}ml`:'-',aHy&&aHy>=1800,aHy&&aHy<1200],
           ['🏃','Exercise',`${exDays}/${logs.length}`,exDays/Math.max(logs.length,1)>=0.5,false]
        ].map(([ic,lb,val,good,warn])=>`

        </div>

    ${getMembers().map(m=>`<button onclick="A.insightsMember='${m.id}';renderInsights()" style="padding:4px 12px;border-radius:99px;border:1.5px solid ${A.insightsMember===m.id?m.color:T.border};background:${A.insightsMember===m.id?m.color+'22':'#fff'};color:${A.insightsMember===m.id?m.color:T.muted};font-weight:700;font-size:12px;cursor:pointer;flex-shrink:0">${m.name}</button>`).join('')}
  </div>`;

  document.getElementById('page-insights').innerHTML=`
    <div class="page-header">
      <div class="page-title">Insights</div>
    </div>
    ${memberFilter}
    <div style="padding:4px 16px 0">
      <div style="background:linear-gradient(135deg,${T.sage},${T.sageMid});border-radius:17px;padding:18px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden">
        <div style="position:absolute;right:-10px;top:-10px;font-size:68px;opacity:.12">🌿</div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;opacity:.8;margin-bottom:5px">This Week's Family Challenge</div>

      <div style="font-family:'Playfair Display',serif;font-size:17px;color:${T.ink};margin-bottom:12px">Smart Observations</div>
      ${insights.map(ins=>`<div class="card" style="padding:12px 14px;margin-bottom:10px;border-left:4px solid ${ins.color}">

      ${filteredLogs.length===0?`<div class="card" style="padding:20px;text-align:center;color:${T.muted};margin-bottom:16px">

        <div style="font-weight:700;margin-bottom:5px">No wellness data yet</div>
        <div style="font-size:13px">Add Wellness Logs in the Calendar to see personalised insights here.</div>
      </div>`:memberCards}

  // Render per-member charts into each member card
  setTimeout(()=>{
    getMembers()
      .filter(m=>A.insightsMember==='all'||A.insightsMember===m.id)
      .forEach(m=>{
        const mLogs = filteredLogs.filter(e=>e.member_id===m.id);
        if(mLogs.length>=2) renderInsightCharts(mLogs, 'charts-'+m.id);
      });
  },50);
}

// ── INSIGHT CHARTS ────────────────────────────────────────────────────────────
function renderInsightCharts(logs, containerId) {
  const cont = document.getElementById(containerId || 'insights-charts');
  if (!cont) return;

  // Sort logs by date
  const sorted = [...logs].sort((a,b)=>new Date(a.date)-new Date(b.date));

  // Metrics to chart: [key, label, unit, colour, goal]
  // Get selected member's data for reference values
  const selMem = A.insightsMember!=='all' ? getMembers().find(m=>m.id===A.insightsMember) : null;
  const memAge = selMem?.age || null;
  const avgWeight = logs.filter(l=>l.member_id===selMem?.id&&l.weight).map(l=>l.weight);
  const latestKg = avgWeight.length ? avgWeight[avgWeight.length-1] : null;
  // Hydration reference: ~35ml per kg bodyweight, min 1.5L, max 3.5L
  const hydRef = latestKg ? Math.min(3.5, Math.max(1.5, latestKg * 0.035)).toFixed(1) : 1.8;
  const metrics = [
    ['weight', 'Weight', 'kg', T.sage, null,
      memAge ? (memAge<12?'Reference: healthy range varies by age & height':memAge<18?'Teens: BMI 18.5–24.9 range':'Adults: BMI 18.5–24.9 range') : null],
    ['sleep',  'Sleep',  'h',  T.sky,  8,
      memAge ? (memAge<6?'Ages 3–5: 10–13h recommended':memAge<12?'Ages 6–12: 9–12h recommended':memAge<18?'Teens: 8–10h recommended':'Adults: 7–9h recommended') : 'Recommended: 7–9h for adults'],
    ['energy', 'Energy', '%',  T.honey, 70,
      'Aim for 70%+ — low energy often links to sleep or hydration'],
    ['hydration','Hydration','L', T.plum, parseFloat(hydRef),
      latestKg ? `~${hydRef}L recommended for ${latestKg}kg (35ml/kg)` : 'Recommended: 1.8–2.5L per day'],
  ];

  const charts = metrics.map(([key, label, unit, colour, goal]) => {
    const points = sorted
      .map(e=>({d:new Date(e.date), v:parseFloat(e[key])}))
      .filter(p=>!isNaN(p.v)&&p.v>0);
    if (points.length < 2) return '';

    const vals = points.map(p=>p.v);
    const minV = Math.min(...vals);
    const maxV = Math.max(...vals);
    const range = maxV - minV || 1;
    const padded_min = minV - range*0.15;
    const padded_max = maxV + range*0.15;
    const padded_range = padded_max - padded_min;

    const W = 320, H = 100, PL = 36, PR = 12, PT = 10, PB = 24;
    const cW = W - PL - PR, cH = H - PT - PB;
    const xScale = i => PL + (i / (points.length-1)) * cW;
    const yScale = v => PT + cH - ((v - padded_min) / padded_range) * cH;

    // Line path
    const pathD = points.map((p,i)=>`${i===0?'M':'L'}${xScale(i).toFixed(1)},${yScale(p.v).toFixed(1)}`).join(' ');
    // Fill path
    const fillD = pathD + ` L${xScale(points.length-1).toFixed(1)},${(PT+cH).toFixed(1)} L${PL},${(PT+cH).toFixed(1)} Z`;

    // X-axis labels (max 5)
    const step = Math.max(1, Math.floor(points.length/5));
    const xLabels = points.filter((_,i)=>i%step===0||i===points.length-1).map((p,_,arr)=>{
      const idx = points.indexOf(p);
      const d = p.d;
      const label = `${d.getDate()}/${d.getMonth()+1}`;
      return `<text x="${xScale(idx)}" y="${H-6}" text-anchor="middle" font-size="9" fill="${T.muted}">${label}</text>`;
    }).join('');

    // Y-axis labels (min, max)
    const yMin = `<text x="${PL-4}" y="${(PT+cH+4).toFixed(1)}" text-anchor="end" font-size="9" fill="${T.muted}">${minV.toFixed(1)}</text>`;
    const yMax = `<text x="${PL-4}" y="${(PT+8).toFixed(1)}" text-anchor="end" font-size="9" fill="${T.muted}">${maxV.toFixed(1)}</text>`;

    // Goal line
    const goalLine = (goal && goal >= padded_min && goal <= padded_max)
      ? `<line x1="${PL}" y1="${yScale(goal).toFixed(1)}" x2="${W-PR}" y2="${yScale(goal).toFixed(1)}" stroke="${colour}" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
         <text x="${W-PR-2}" y="${(yScale(goal)-3).toFixed(1)}" text-anchor="end" font-size="8" fill="${colour}" opacity="0.7">goal</text>`
      : '';

    // Data points
    const dots = points.map((p,i)=>`<circle cx="${xScale(i).toFixed(1)}" cy="${yScale(p.v).toFixed(1)}" r="3" fill="${colour}" stroke="#fff" stroke-width="1.5"/>`).join('');

    // Latest value badge
    const latest = points[points.length-1];
    const latestStr = key==='hydration' ? latest.v.toFixed(1) : (Number.isInteger(latest.v)?latest.v:latest.v.toFixed(1));

    // Trend arrow
    const first = points[0].v, last_v = latest.v;
    const trendUp = last_v > first;
    const trendSame = Math.abs(last_v-first)<0.05*first;
    const trendStr = trendSame ? '→' : (trendUp ? '↑' : '↓');
    const trendCol = key==='weight'?(trendUp?T.rose:T.sage):(trendUp?T.sage:T.rose);

    const [mKey,mLabel,mUnit,mCol,,mRef] = [key,label,unit,colour,null,metrics.find(m=>m[0]===key)?.[5]];
    return `<div class="card" style="padding:12px 14px;margin-bottom:10px;overflow:hidden">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px">
        <div style="font-weight:700;font-size:13px;color:${T.ink}">${label}</div>
        <div style="display:flex;align-items:baseline;gap:6px">
          <span style="font-size:18px;font-weight:800;color:${colour}">${latestStr}${unit}</span>
          <span style="font-size:13px;font-weight:700;color:${trendCol}">${trendStr}</span>
        </div>
      </div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible">
        <!-- Grid lines -->
        <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+cH}" stroke="${T.border}" stroke-width="0.5"/>
        <line x1="${PL}" y1="${PT+cH}" x2="${W-PR}" y2="${PT+cH}" stroke="${T.border}" stroke-width="0.5"/>
        ${goalLine}
        <!-- Fill -->
        <path d="${fillD}" fill="${colour}" opacity="0.08"/>
        <!-- Line -->
        <path d="${pathD}" fill="none" stroke="${colour}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Dots -->
        ${dots}
        <!-- Labels -->
        ${yMin}${yMax}${xLabels}
      </svg>
      ${metrics.find(m=>m[0]===key)?.[5]?`<div style="font-size:10px;color:${T.muted};margin-top:4px;padding-top:4px;border-top:1px solid ${T.border}">ℹ️ ${metrics.find(m=>m[0]===key)[5]}</div>`:''}
    </div>`;
  }).join('');

  cont.innerHTML = `
    <div style="font-family:'Playfair Display',serif;font-size:17px;color:${T.ink};margin-bottom:12px">Trends</div>
    ${charts || '<div style="color:'+T.muted+';font-size:13px">Not enough data for charts yet.</div>'}`;
}
window.renderInsightCharts = renderInsightCharts;

function genInsights(wLogs,hEvs){
  const ins=[];
  const avg=(arr,k)=>{const v=arr.map(e=>parseFloat(e[k])).filter(v=>!isNaN(v)&&v>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;};
  getMembers().forEach(m=>{
    const logs=wLogs.filter(e=>e.member_id===m.id);
    if(logs.length<2)return;
    const aSlp=avg(logs,'sleep'),aHy=avg(logs,'hydration'),aEn=avg(logs,'energy');
    const exPct=logs.filter(l=>l.exercised).length/logs.length;
    if(aSlp&&aSlp<7)ins.push({icon:'😴',title:`${m.name} is sleeping less than recommended`,body:`Average sleep is ${aSlp.toFixed(1)}h — the goal is 7–9h. Even 30 extra minutes can improve mood and energy significantly!`,color:T.honey});
    if(aHy&&aHy<1500)ins.push({icon:'💧',title:`${m.name} could drink more water`,body:`Average hydration is ${Math.round(aHy)}ml/day. Aim for 1800ml+. A visible water bottle nearby is a surprisingly effective habit.`,color:T.sky});
    if(exPct<0.3&&logs.length>=3)ins.push({icon:'🏃',title:`${m.name}'s exercise consistency has room to grow`,body:`Only ${Math.round(exPct*100)}% of logged days included exercise. Even a 15-minute walk makes a real difference!`,color:T.sage});
    if(aEn&&aEn<55)ins.push({icon:'⚡',title:`${m.name}'s energy levels seem low`,body:`Average energy is ${Math.round(aEn)}%. This often links to sleep or hydration — two quick wins if improved together.`,color:T.plum});
  });
  const ill=hEvs.filter(e=>e.appt_type==='Illness');
  if(ill.length>=2)ins.push({icon:'🤒',title:`${ill.length} illness events recorded`,body:`Worth checking if these are recurring for the same person. Vitamin D, zinc, and consistent sleep all support immunity.`,color:T.rose});
  if(!ins.length)ins.push({icon:'🌟',title:'Looking great overall!',body:"No major concerns in your family's wellness data. Keep logging consistently for richer, more personalised insights over time.",color:T.sage});
  return ins;
}


// ── HOME PAGE ──────────────────────────────────────────────────────────────────
function renderHome(){
  const now=new Date(); // device clock — reference for past/future timed events
  const today=todayD();
  const fmtT=d=>{if(!d)return'';const x=new Date(d);return x.getHours().toString().padStart(2,'0')+':'+x.getMinutes().toString().padStart(2,'0');};

  // ── MEMBER LABEL HELPER (v7) ─────────────────────────────────────────────
  // Returns a short text label identifying who an event/task is assigned/linked to.
  const memberLabel=e=>{
    if(e.participants_all_family) return '👨‍👩‍👧‍👦 Family';
    const ids = e.member_id ? [e.member_id] : (e.participants||[]);
    if(!ids.length) return '';
    if(ids.length===1){ const m=getMem(ids[0]); return m?m.name:''; }
    return ids.length+' members';
  };

  // ── TODAY SECTION ──────────────────────────────────────────────────────────
  // Include: events starting today + multi-day events spanning through today
  // Exclude: wellness logs, timed events whose start time has already passed,
  //          and Tasks that have already been marked complete (v7)
  const todayEvs=getEvents().filter(e=>{
    if(e.type==='wellness') return false;
    if(e.type==='task' && e.completed_at) return false; // v7: hide completed tasks
    const evStart=new Date(e.date);
    const evStartDay=new Date(evStart); evStartDay.setHours(0,0,0,0);

    // Case A: event starts today
    if(isSameDay(evStart,today)){
      if(e.all_day) return true; // all-day events always show
      return evStart>=now;       // timed: only if not yet past
    }

    // Case B: multi-day event that started before today but spans through today
    if(e.end_date){
      const evEndDay=new Date(e.end_date); evEndDay.setHours(23,59,59,999);
      return evStartDay<today && evEndDay>=today;
    }
    return false;
  });

  // Sort: all-day first, then chronologically by start time
  todayEvs.sort((a,b)=>{
    const aAllDay=a.all_day||(new Date(a.date)<today);
    const bAllDay=b.all_day||(new Date(b.date)<today);
    if(aAllDay&&!bAllDay) return -1;
    if(!aAllDay&&bAllDay) return 1;
    return new Date(a.date)-new Date(b.date);
  });

  // ── COMING UP SECTION ──────────────────────────────────────────────────────
  // Determine if today is Sunday (Mon=0 ... Sun=6)
  const isSunday=((today.getDay()+6)%7)===6;

  let weekStart, weekEnd, upcomingLabel;
  if(isSunday){
    // Show NEXT week (Mon–Sun)
    weekStart=addDays(today,1);       // next Monday
    weekEnd=addDays(today,7);         // next Sunday
    upcomingLabel='Coming up next week';
  } else {
    // Show remainder of THIS calendar week (tomorrow → this Sunday)
    weekStart=addDays(today,1);       // tomorrow
    // Find this Sunday: days until Sunday = 6 - current weekday (Mon=0)
    const daysUntilSunday=6-((today.getDay()+6)%7);
    weekEnd=addDays(today,daysUntilSunday);
    upcomingLabel='Coming up this week';
  }
  weekEnd.setHours(23,59,59,999);

  const upcomingEvs=getEvents().filter(e=>{
    if(e.type==='wellness') return false;
    if(e.type==='task' && e.completed_at) return false; // v7: hide completed tasks
    const evStart=new Date(e.date); evStart.setHours(0,0,0,0);
    return evStart>=weekStart && evStart<=weekEnd;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  // ── OTHER ACTIONS (v7 — renamed from "Summary To Do") ───────────────────────
  // Scope: overdue, today, and up to 7 days ahead — but ONLY items that are
  // NOT already shown above in Today / Coming Up, to avoid duplicates.
  const weekAhead = addDays(today, 7); weekAhead.setHours(23,59,59,999);
  // IDs already visible in Today / Coming Up — exclude these from Other Actions
  const todayUpcomingIds = new Set([...todayEvs.map(e=>e.id), ...upcomingEvs.map(e=>e.id)]);
  // Calendar items: Tasks + non-task events with open actions — merged, sorted by date
  const todoCalendar = [
    // Incomplete Task events within scope, not already shown above
    ...getEvents().filter(e => e.type === 'task' && !e.completed_at && new Date(e.date) <= weekAhead && !todayUpcomingIds.has(e.id)),
    // Non-task calendar events with at least one open action item, within scope, not already shown above
    ...getEvents().filter(e => e.type !== 'task' && e.actions?.length > 0 && e.actions.some(a => !a.done) && new Date(e.date) <= weekAhead && !todayUpcomingIds.has(e.id)),
  ].sort((a,b) => new Date(a.date) - new Date(b.date));
  // Notebook notes with open checklist items (no date — sorted after calendar items)
  const todoNotes = getNotes()
    .filter(n => n.checklist?.length > 0 && n.checklist.some(c => !c.done));
  const hasToDo = todoCalendar.length > 0 || todoNotes.length > 0;

  // ── EVENT CARD (v7: sky border, member label) ──────────────────────────────
  // showDate: when true, prefix subtitle with compact "Mon 4/6 · " date label
  const evCard=(e,showDate=false)=>{
    const evStart=new Date(e.date);
    const isSpanning=e.end_date&&!isSameDay(e.date,e.end_date)&&evStart<today;
    const timeStr=e.all_day||isSpanning?'All day':fmtT(e.date);
    let subtitle='';
    if(showDate){
      const dn=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const dayLabel=dn[(evStart.getDay()+6)%7];
      const dateLabel=`${evStart.getDate()}/${evStart.getMonth()+1}`;
      subtitle=`${dayLabel} ${dateLabel} · ${timeStr}`;
    } else {
      subtitle=timeStr;
    }
    const mLbl=memberLabel(e);
    if(mLbl) subtitle+=' · '+mLbl;
    if(e.location) subtitle+=' · '+e.location;
    // v7: all Today/Coming Up cards use a consistent sky-blue border (matches legend)
    return `<div onclick="viewEv('${e.id}')" style="display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;background:#fff;border-left:3px solid ${T.sky};margin-bottom:6px;cursor:pointer">
      <span style="font-size:16px">${ET[e.type].icon}</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.series_id?'🔁 ':''}${e.title||ET[e.type].label}</div>
        <div style="font-size:11px;color:${T.muted}">${subtitle}</div>
      </div>
    </div>`;
  };

  document.getElementById('page-home').innerHTML=`
    <div class="page-header">
      <div class="page-title" style="font-size:20px">Good ${new Date().getHours()<12?'morning':'afternoon'} 👋</div>
    </div>
    <div style="padding:12px 16px">

      <div style="display:flex;gap:8px;margin-bottom:14px">
        <button onclick="showPicker(new Date())" style="flex:1;padding:12px;border-radius:12px;background:${T.sage};color:#fff;border:none;font-weight:700;font-size:13px;cursor:pointer">+ Calendar Entry</button>
        <button onclick="A.mealsTab='shopping';goTo('meals')" style="flex:1;padding:12px;border-radius:12px;background:${T.honeyLight};color:${T.honey};border:1px solid ${T.honey}44;font-weight:700;font-size:13px;cursor:pointer">🛒 Shopping</button>
      </div>

      <div style="font-weight:800;font-size:14px;color:${T.ink};margin-bottom:8px">Today — ${fmt(today)}</div>
      ${todayEvs.length?todayEvs.map(e=>evCard(e,false)).join(''):`<div style="font-size:13px;color:${T.muted};padding:10px 0;font-style:italic">No upcoming events today. Enjoy the rest of the day!</div>`}

      ${upcomingEvs.length?`
      <div style="font-weight:800;font-size:14px;color:${T.ink};margin:14px 0 8px">${upcomingLabel}</div>
      ${upcomingEvs.map(e=>evCard(e,true)).join('')}`:''}

      ${hasToDo ? `
      <div style="font-weight:800;font-size:14px;color:${T.ink};margin:14px 0 4px">Other Actions</div>
      <div style="font-size:11px;color:${T.muted};margin-bottom:8px;line-height:1.5">Tasks and notes with open action items due within the next 7 days, or already overdue, that aren't already shown above.</div>
      ${todoCalendar.map(e => {
        const isTask = e.type === 'task';
        const isOverdue = new Date(e.date) < today;
        const openCount = (e.actions||[]).filter(a=>!a.done).length;
        const icon = isTask ? '✅' : ET[e.type].icon;
        const mLbl = memberLabel(e);
        const subtitle = isTask
          ? `${isOverdue?'⚠️ Overdue · ':''}Due: ${fmt(e.date)}${mLbl?' · '+mLbl:''}${openCount>0?' · '+openCount+' open item'+(openCount!==1?'s':''):''}`
          : `${fmt(e.date)} · ${openCount} open item${openCount!==1?'s':''}${mLbl?' · '+mLbl:''}`;

function renderShoppingTab(){
  if(isSampleMode()){
    return `<div style="text-align:center;padding:24px;color:${T.muted}">
      <div style="font-size:36px;margin-bottom:10px">🛒</div>
      <div style="font-weight:700;margin-bottom:6px">Sample Mode</div>
      <div style="font-size:13px">Switch to My Family to create shopping lists.</div>
    </div>`;
  }
  const lists=A.shoppingLists||[];
  const q=(A.shopSearchAll||'').toLowerCase().trim();

  // v15: header row now includes a global search box (left of "+ New List")
  // that searches item text across every list, not just this one.
  const headerHtml=`<div style="margin-bottom:12px">
    <div style="font-weight:700;font-size:14px;margin-bottom:8px">Shopping Lists</div>
    <div style="display:flex;gap:8px;align-items:center">
      <div style="position:relative;flex:1;min-width:0">
        <input class="inp" id="shop-search-all-inp" placeholder="🔍  Search all lists…" value="${A.shopSearchAll||''}"
          style="padding-right:${A.shopSearchAll?'36px':'12px'}"
          oninput="A.shopSearchAll=this.value;clearTimeout(A._ssT);A._ssT=setTimeout(renderMeals,300);document.getElementById('shop-search-all-x').style.display=this.value?'flex':'none'">
        <button id="shop-search-all-x" onclick="A.shopSearchAll='';document.getElementById('shop-search-all-inp').value='';renderMeals();this.style.display='none'"
          style="display:${A.shopSearchAll?'flex':'none'};position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:${T.muted};font-size:16px;cursor:pointer;width:24px;height:24px;align-items:center;justify-content:center;border-radius:50%">×</button>
      </div>
      <button class="btn btn-primary btn-sm" onclick="createShoppingList()" style="flex-shrink:0">+ New List</button>
    </div>
  </div>`;

  // v15: while a global search query is active, show matching items flattened
  // across every list (tagged with which list + checked state) instead of
  // the normal list-of-lists cards — answers "is X on any list, and is it
  // already checked?" without opening each list one by one.
  if(q){
    const matches=[];
    lists.forEach(l=>{
      (l.items||[]).forEach(item=>{
        if((item.text||'').toLowerCase().includes(q)) matches.push({listId:l.id,listName:l.name,item});
      });
    });
    const resultsHtml=matches.length?matches.map(m=>`
      <div class="card" style="padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer" onclick="openShoppingList('${m.listId}')">
        <span style="font-size:16px;flex-shrink:0">${m.item.done?'✅':'⬜'}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:${m.item.done?T.muted:T.ink};text-decoration:${m.item.done?'line-through':'none'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.item.text||''}</div>
          <div style="font-size:11px;color:${T.muted}">in "${m.listName}"</div>
        </div>
      </div>`).join(''):`
      <div style="text-align:center;padding:20px;color:${T.muted}">
        <div style="font-size:32px;margin-bottom:8px">🔍</div>
        <div style="font-weight:700;margin-bottom:6px">No matches</div>
        <div style="font-size:12px">No items across any list match your search.</div>
      </div>`;
    return headerHtml+`<div style="font-size:11px;color:${T.muted};margin-bottom:8px">${matches.length} match${matches.length!==1?'es':''} across all lists</div>`+resultsHtml;
  }

  return headerHtml+(lists.length?lists.map(l=>{
    const items=l.items||[];
    const left=items.filter(i=>!i.done).length;
    const done=items.length-left;
    return`<div class="card" style="padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
      <span style="font-size:22px;flex-shrink:0;cursor:pointer" onclick="openShoppingList('${l.id}')">🛒</span>
      <div style="flex:1;cursor:pointer;min-width:0" onclick="openShoppingList('${l.id}')">
        <div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.name}</div>
        <div style="font-size:11px;color:${T.muted}">${left} item${left!==1?'s':''} left${done?' · '+done+' checked':''}</div>
      </div>
      <button onclick="renameShoppingList('${l.id}')" style="background:${T.parchment};border:1px solid ${T.border};border-radius:7px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;color:${T.muted};flex-shrink:0" title="Rename list">✏️</button>

  }).join(''):
  `<div style="text-align:center;padding:20px;color:${T.muted}">
    <div style="font-size:32px;margin-bottom:8px">🛒</div>
    <div style="font-weight:700;margin-bottom:6px">No shopping lists yet</div>
    <button class="btn btn-primary" onclick="createShoppingList()">Create your first list</button>
  </div>`);
}
